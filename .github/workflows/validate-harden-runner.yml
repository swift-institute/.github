# validate-harden-runner.yml — verify [CI-080] harden-runner audit-mode floor.
#
# Pilot 15 of `/promote-rule` (2026-05-14). Migrated to thin caller of
# validate-base.yml in Phase B-2 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14
# (wrapper-host-multi-file mode per manifest).
#
# Rules checked: [CI-080]. See companion script for details.

name: validate-harden-runner

# Self-firing push/pull_request triggers ACTIVATED 2026-05-14 after the
# [CI-080] baseline batch-fix landed (3 weekly orchestrator config jobs
# gained SHA-pinned harden-runner as the new first step; see
# `Audits/PROMOTE-CI-080-2026-05-14.md` Pending section, now closed).

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**.yml'
      - '.github/scripts/validate-harden-runner.py'
      - '.github/workflows/validate-harden-runner.yml'
  pull_request:
    paths:
      - '.github/workflows/**.yml'
      - '.github/scripts/validate-harden-runner.py'
      - '.github/workflows/validate-harden-runner.yml'
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of the wrapper-host repo to validate (default: this repo).'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        description: 'Total count of individual violations.'
        value: ${{ jobs.scan.outputs.total-violations }}

  workflow_dispatch:
    inputs:
      repo:
        description: 'Owner/name of the wrapper-host repo to validate (optional).'
        type: string
        required: false
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false

jobs:
  scan:
    uses: ./.github/workflows/validate-base.yml
    with:
      validator-script: .github/scripts/validate-harden-runner.py
      rule-id-regex: '^CI-080'
      discovery-mode: wrapper-host-multi-file
      target-repo: ${{ inputs.repo }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
