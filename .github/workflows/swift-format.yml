name: Swift Format (reusable)

# Reusable swift-format workflow for Swift Institute packages. Consume from a
# caller package's .github/workflows/swift-format.yml via:
#
#   jobs:
#     format:
#       uses: swift-institute/.github/.github/workflows/swift-format.yml@main
#
# Behavior:
#   - Runs inside swift:6.3. swift-format is bundled in the Swift 6+ toolchain
#     (verified swift:6.3 ships swift-format 6.3.1 at /usr/bin/), so no install
#     step — the tool tracks the toolchain version.
#   - Formats Sources/ and Tests/ in place using the caller repo's
#     `.swift-format` config at its root.
#   - Auto-commits changes to main. Requires `contents: write`.
#
# Triggers are owned by the caller. Typical pattern: push to main only —
# auto-commit on pull_request would create a feedback loop.

on:
  workflow_call:

jobs:
  format:
    name: swift-format
    runs-on: ubuntu-latest
    container: swift:6.3
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Print swift-format version
        run: swift-format --version

      - name: Format
        run: swift-format format --recursive --in-place --ignore-unparsable-files Sources Tests

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Run swift-format"
          branch: main
