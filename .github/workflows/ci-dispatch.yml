# ci-dispatch.yml — on-demand single-job CI dispatch surface (debug-only).
#
# PURPOSE
# Lets an operator run exactly ONE job of the universal swift-ci.yml against a
# chosen package, on demand, without pushing to that package. Useful for
# reproducing a single failing leg (e.g. linux-release) of a target repo from a
# central place. Per the ratified D3 CI-refactor design.
#
# CALL CHAIN (depth 3 — safely under GitHub's 4-level workflow_call limit):
#   ci-dispatch.yml  (1, workflow_dispatch)
#     -> swift-ci.yml  (2, workflow_call; universal matrix + quality gates)
#       -> advisory reusables  (3, e.g. lint-yaml.yml / lint-license-header.yml)
#
# THE `job` ENUM — the 13 dispatch-meaningful jobs of swift-ci.yml:
#   macos-release, linux-release, linux-nightly, linux-6-4, windows-release,
#   apple-simulator-build, format, lint, swift-linter, lint-yaml,
#   lint-broken-symlink, lint-license-header, lint-test-support-spine.
# Each is selected by swift-ci.yml's per-job guard
# `inputs.job == '' || inputs.job == '<id>'`.
#
# EXCLUDED from the enum (ruled by the seat):
#   - ci-ok            — the conclusion aggregator, not a unit of work. A
#                        single-job dispatch sets `inputs.job != ''`, and
#                        ci-ok's `if:` requires `inputs.job == ''`, so ci-ok is
#                        skipped on any dispatch — offering it would run nothing
#                        and only muddy the result.
#   - advisory-summary — the informational advisory-leg renderer, not a unit of
#                        work. Excluded identically to ci-ok: its `if:` also
#                        requires `inputs.job == ''`, so it skips on any
#                        single-job dispatch — offering it would render nothing.
#   - lint-api-breakage,
#     lint-pr-title    — PR-only jobs (`if: github.event_name ==
#                        'pull_request'`). A workflow_dispatch is not a
#                        pull_request event, so selecting either would silently
#                        no-op (the job's own gate skips it).
#
# CAVEATS — this is a DEBUG surface, NOT a gating surface:
#   - Runs appear in THIS repo's (swift-institute/.github) Actions tab, not the
#     target's. They satisfy NO branch protection on the target and never count
#     toward a target's required checks.
#   - Private targets are UNSUPPORTED BY DESIGN — this is a public-target-only
#     debug surface (seat-ratified 2026-07-03). Do NOT "fix" the checkout to
#     credential a private target: it enables a dead path and re-expands the
#     credential surface Slice C hardened. The target checkout stays
#     `repository:`-only — no token mint.
#   - Mechanism ([CI-095]/[CI-032]): the `!github.event.repository.private`
#     gate on every swift-ci.yml selector evaluates against the TRIGGERING repo,
#     which for a dispatch is public swift-institute/.github — NOT the target —
#     so the gate PASSES regardless of the target's privacy. A private-target
#     dispatch therefore schedules its jobs and then fails at the target
#     checkout (the ambient GITHUB_TOKEN, scoped to .github, cannot read a
#     cross-org private repo); it does not silently skip. Net: nothing to gain
#     but a red checkout, and nothing to credential. PUBLIC targets check out
#     fine and are the only supported use.

name: CI dispatch (single-job, debug)
# run-name self-labels each dispatch with its target + job so batch runs are
# correlatable in the Actions UI and via `gh run list --json displayTitle`
# (the workflow otherwise has no per-run discriminator — all runs share the
# workflow name). Enables harvesting fan-out assessments by target.
run-name: "ci-dispatch → ${{ inputs.target-repo }} · ${{ inputs.job }} @ ${{ inputs.ref }}"

# [CI-090] standalone workflow (workflow_dispatch only, no workflow_call) MUST
# declare a top-level permissions floor. Deny-all here; the routing job below
# grants exactly the `contents: read` the universal's jobs need ([CI-106]).
permissions: {}

on:
  workflow_dispatch:
    inputs:
      target-repo:
        description: "Target package to run CI against, as owner/name (e.g. swift-primitives/swift-cardinal-primitives). Public repositories only — a private or inaccessible target fails at the checkout step by design (see the file header for the mechanism)."
        type: string
        required: true
      job:
        description: "Which single swift-ci.yml job to run against the target."
        type: choice
        required: true
        options:
          - macos-release
          - linux-release
          - linux-nightly
          - linux-6-4
          - windows-release
          - apple-simulator-build
          - format
          - lint
          - swift-linter
          - lint-yaml
          - lint-broken-symlink
          - lint-license-header
          - lint-test-support-spine
      ref:
        description: "Git ref (branch/tag/SHA) of `target-repo` to build. Forwarded to swift-ci.yml's `ref` input and threaded into the 9 target checkouts, so it selects WHAT CODE is built. Different axis from `gh workflow run --ref <branch>`, which selects the CI-DEFINITION version (which swift-ci.yml / ci-dispatch.yml runs). Default `main`."
        type: string
        required: false
        default: main

jobs:
  dispatch:
    # Pure `uses:` routing job: no harden-runner ([CI-080] pure-`uses:`
    # carve-out — the called workflow's own jobs run harden-runner) and no
    # visibility gate ([CI-032] is workflow_call-scoped; this workflow is
    # dispatch-only). [CI-105]: no `continue-on-error` on a `uses:` job.
    # [CI-106]: grant >= the called reusable's per-job needs (contents: read).
    permissions:
      contents: read
    uses: ./.github/workflows/swift-ci.yml
    secrets: inherit
    with:
      target-repo: ${{ inputs.target-repo }}
      job: ${{ inputs.job }}
      ref: ${{ inputs.ref }}
