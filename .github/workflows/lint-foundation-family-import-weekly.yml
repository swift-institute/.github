# lint-foundation-family-import-weekly.yml — scheduled cross-org
# Foundation-family import sweep (γ-1a).
#
# Calls audit-foundation-import.py against every public, non-archived
# repo in each in-scope org via a matrix strategy at 06:35 UTC every
# Monday (offset from spine sweep at 06:30 + readme-presence at 06:00).
# When any org has Foundation-import drift (ERRORS), opens or updates a
# single aggregated tracking issue in swift-institute/.github
# summarising the findings.
#
# Pilot scope: swift-primitives only. Expansion candidates after pilot
# (Phases 2b/c/d): swift-standards, swift-foundations, swift-iso. Foundation-
# free policy ([PRIM-FOUND-001], [CI-022]) applies to L1+L2+L3 main targets.
#
# Audit script source: swift-institute/.github/.github/scripts/audit-foundation-import.py
#
# Two-track flip per Decision #8: γ-1a → gating requires BOTH this public
# CI sweep AND principal-side on-disk audit clean for 2 consecutive weeks.
# This orchestrator only opens an issue on findings, so "no issue" is the
# success signal.
#
# Provenance: research §3.4.2 (the rule), [CI-022], [README-167]
# (tracking-issue pattern), [PRIM-FOUND-001]. Skeleton extracted to
# cron-audit-base.yml@main reusable.

name: lint-foundation-family-import-weekly

on:
  schedule:
    - cron: '35 6 * * 1'   # weekly Monday 06:35 UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run audit but skip aggregated issue create/update.'
        type: boolean
        required: false
        default: false

jobs:
  config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      orgs: ${{ steps.read.outputs.orgs }}
    steps:
      - id: read
        uses: swift-institute/.github/.github/actions/read-orgs@main
        with:
          filter: 'select(.name=="swift-primitives") | .name'

  audit:
    needs: config
    uses: ./.github/workflows/cron-audit-base.yml
    secrets: inherit
    with:
      matrix-orgs: ${{ needs.config.outputs.orgs }}
      audit-script-url: https://raw.githubusercontent.com/swift-institute/.github/main/.github/scripts/audit-foundation-import.py
      count-labels: errors,warnings
      issue-title-prefix: Foundation-import sweep
      issue-label: foundation-audit
      dry-run: ${{ inputs.dry-run || false }}
      audit-step: |
        set -euo pipefail
        mapfile -t targets < <(gh repo list "$ORG" --limit 2000 \
          --visibility public \
          --json nameWithOwner,isArchived \
          --jq '.[] | select(.isArchived==false) | .nameWithOwner')
        total_errors=0
        total_warnings=0
        for target in "${targets[@]}"; do
          workdir=$(mktemp -d)
          json="/tmp/${target//\//__}.json"
          git clone --depth 1 --quiet \
            "https://x-access-token:${GH_TOKEN}@github.com/${target}.git" \
            "$workdir" 2>/dev/null || { rm -rf "$workdir"; continue; }
          python3 /tmp/audit-script.py \
            --package-dir "$workdir" \
            --json "$json" 2>/dev/null || true
          counts=$(python3 -c "import json; t=json.load(open('$json'))['totals']; print(t['errors'], t['warnings'])" 2>/dev/null || echo "0 0")
          read -r e w <<< "$counts"
          total_errors=$((total_errors + e))
          total_warnings=$((total_warnings + w))
          rm -rf "$workdir"
        done
        {
          echo "## Org $ORG — Foundation-import sweep (γ-1a)"
          echo "- ERRORS total:   $total_errors"
          echo "- WARNINGS total: $total_warnings"
        } >> "$GITHUB_STEP_SUMMARY"
        echo "${total_errors},${total_warnings}" > "/tmp/${ORG}-counts.txt"
      issue-body-template: |
        The weekly Foundation-import sweep at 06:35 UTC on ${TODAY} found drift.

        ## Aggregate
        - ERRORS total:   ${COUNT_ERRORS}
        - WARNINGS total: ${COUNT_WARNINGS}

        ## Per-org

        ${PER_ORG_LIST}

        See the per-org run summaries for the file-level breakdown.

        ## What this means

        One or more packages drifted from [PRIM-FOUND-001]/[CI-022] Foundation-free policy.
        `Sources/**` and `Tests/Support/**` MUST NOT `import Foundation`,
        `import FoundationEssentials`, or `import FoundationInternationalization`
        (any attribute/access-modifier permutation).

        ## What to do

        - Run the audit script locally to identify the drifted files:
          ```
          python3 swift-institute/.github/.github/scripts/audit-foundation-import.py --package-dir <package>
          ```
        - Replace Foundation usage with primitives equivalents (Time, Buffer, etc.).
        - For Foundation interop: move to a separate `* Foundation Integration` subtarget per the established pattern.
        - Close this issue when fixed; the next weekly sweep reopens it if drift recurs.

        γ-1a → gating flip authorization requires 2 consecutive clean weeks
        on BOTH this public CI sweep AND the principal-side on-disk audit
        (Two-Track audit per Decision #8).

        *Idempotent: this issue is updated in place.*
