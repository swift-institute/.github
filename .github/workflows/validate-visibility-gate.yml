# validate-visibility-gate.yml — verify [CI-032] public/private visibility
# gate on every job in every workflow_call reusable.
#
# Pilot 13 of `/promote-rule` (2026-05-14). Migrated to thin caller of
# validate-base.yml in Phase B-2 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14
# (wrapper-host-multi-file mode per manifest).
#
# Rules checked: [CI-032]. See companion script for details.

name: validate-visibility-gate

# Self-firing push/pull_request triggers ACTIVATED 2026-05-14 after the
# [CI-032] baseline batch-fix landed (11 jobs across 9 files; see
# `Audits/PROMOTE-CI-032-2026-05-14.md` Pending section, now closed).

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**.yml'
      - '.github/scripts/validate-visibility-gate.py'
      - '.github/workflows/validate-visibility-gate.yml'
  pull_request:
    paths:
      - '.github/workflows/**.yml'
      - '.github/scripts/validate-visibility-gate.py'
      - '.github/workflows/validate-visibility-gate.yml'
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of the wrapper-host repo to validate (default: this repo).'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        description: 'Total count of individual violations.'
        value: ${{ jobs.scan.outputs.total-violations }}

  workflow_dispatch:
    inputs:
      repo:
        description: 'Owner/name of the wrapper-host repo to validate (optional).'
        type: string
        required: false
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false

jobs:
  scan:
    uses: ./.github/workflows/validate-base.yml
    with:
      validator-script: .github/scripts/validate-visibility-gate.py
      rule-id-regex: '^CI-032'
      discovery-mode: wrapper-host-multi-file
      target-repo: ${{ inputs.repo }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
