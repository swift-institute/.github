name: lint-org-bot-coverage-weekly

# Weekly orchestrator for lint-org-bot-coverage.yml. Runs the 3-axis
# coverage audit (App install + PRIVATE_REPO_TOKEN org secret +
# layer-wrapper file presence) and posts/updates a tracking issue at
# swift-institute/.github when gaps surface.
#
# Cadence: weekly (Sunday 06:30 UTC), with manual workflow_dispatch.
# Cadence rationale: gaps in this audit reflect operational state that
# changes rarely (App install + secret config are admin out-of-band
# operations; wrapper-file presence changes only with skill-rule
# rollouts). Weekly is sufficient.
#
# Provenance: swift-institute/Research/ci-cd-cross-ecosystem-reuse.md
# v1.1.1 (2026-05-06, Tier 2 RECOMMENDATION) §Q5.

on:
  schedule:
    - cron: '30 6 * * 0'   # weekly Sunday 06:30 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    uses: ./.github/workflows/lint-org-bot-coverage.yml
    secrets: inherit

  report:
    needs: audit
    if: always() && needs.audit.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Mint installation token (issue write)
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: swift-institute
          repositories: .github
          permission-issues: write

      - name: Download issue-body artifact
        uses: actions/download-artifact@v8
        with:
          name: lint-org-bot-coverage-body
          path: ${{ runner.temp }}/coverage-body
        continue-on-error: true   # absent body = audit reported no gaps

      - name: Upsert tracking issue
        if: ${{ needs.audit.outputs.gap-count != '0' && needs.audit.outputs.gap-count != '' }}
        uses: swift-institute/.github/.github/actions/upsert-tracking-issue@main
        with:
          token: ${{ steps.token.outputs.token }}
          owner: swift-institute
          repo: .github
          title-prefix: '[Org coverage]'
          title: '[Org coverage] Bot App / org secret / wrapper-file coverage gaps'
          label: 'org-coverage'
          body-path: ${{ runner.temp }}/coverage-body/issue-body.md

      - name: Close tracking issue when clean
        if: ${{ needs.audit.outputs.gap-count == '0' }}
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          # Find any open issue with the org-coverage label and close it.
          existing=$(gh issue list \
            --repo swift-institute/.github \
            --state open \
            --label org-coverage \
            --json number \
            --jq '.[].number' || echo "")
          for n in $existing; do
            gh issue close "$n" \
              --repo swift-institute/.github \
              --comment "All 3 coverage axes clean as of ${{ github.run_id }}; auto-closing."
          done
