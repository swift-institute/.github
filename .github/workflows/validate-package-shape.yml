# validate-package-shape.yml — verify Swift package shape conventions.
#
# Wave 2 mechanization (2026-05-11). Migrated to thin caller of
# validate-base.yml in Phase B-2 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14
# (single-target mode per manifest).
#
# Rules checked: [PATTERN-001], [PATTERN-003], [PATTERN-004], [PATTERN-004b],
# [PATTERN-004c], [PATTERN-005], [PATTERN-006], [PATTERN-022]. See companion
# script for details.

name: validate-package-shape

on:
  push:
    branches: [main]
    paths:
      - '.github/scripts/validate-package-shape.py'
      - '.github/workflows/validate-package-shape.yml'
  pull_request:
    paths:
      - '.github/scripts/validate-package-shape.py'
      - '.github/workflows/validate-package-shape.yml'
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of the target repo to validate (default: this repo).'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        description: 'Total count of individual violations.'
        value: ${{ jobs.scan.outputs.total-violations }}
  workflow_dispatch:
    inputs:
      repo:
        description: 'Owner/name of the target repo to validate (optional).'
        type: string
        required: false
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false

jobs:
  scan:
    uses: ./.github/workflows/validate-base.yml
    with:
      validator-script: .github/scripts/validate-package-shape.py
      rule-id-regex: '^PATTERN-'
      discovery-mode: single-target
      target-repo: ${{ inputs.repo }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
