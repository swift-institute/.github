name: SwiftLint (reusable)

# Reusable SwiftLint workflow for Swift Institute packages. Consume from a
# caller package's .github/workflows/swiftlint.yml via:
#
#   jobs:
#     lint:
#       uses: swift-institute/.github/.github/workflows/swiftlint.yml@v1
#
# Behavior:
#   - Runs inside swift:6.3. SwiftLint's dynamic binary needs the Swift
#     runtime libraries (libswiftCore, etc.) that the container provides.
#   - Downloads SwiftLint 0.63.2 from the GitHub release, caches the binary
#     for subsequent runs, executes against the caller repo using its own
#     `.swiftlint.yml` config (including any remote `parent_config` URL).
#   - --strict — SwiftLint warnings fail the job.

on:
  workflow_call:

jobs:
  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    container: swift:6.3
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache SwiftLint binary
        id: cache-swiftlint
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/swiftlint
          key: ${{ runner.os }}-swiftlint-0.63.2

      - name: Install SwiftLint 0.63.2
        if: steps.cache-swiftlint.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -qq -y curl
          curl -fsSL -o /tmp/swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/0.63.2/swiftlint_linux_amd64.zip"
          unzip -q /tmp/swiftlint.zip -d /tmp/swiftlint_extracted
          mv /tmp/swiftlint_extracted/swiftlint /usr/local/bin/
          chmod +x /usr/local/bin/swiftlint
          rm -rf /tmp/swiftlint.zip /tmp/swiftlint_extracted

      - name: Print SwiftLint version
        run: swiftlint --version

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging
