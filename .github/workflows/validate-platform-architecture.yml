# validate-platform-architecture.yml — verify platform-stack invariants.
#
# Wave 2b finalization (2026-05-10); Wave 2 consolidation (2026-05-11)
# moved PATTERN-005 / PATTERN-006 to validate-package-shape.yml.
# Migrated to thin caller of validate-base.yml in Phase B-2 of
# CI-REVIEW-PHASE-B-DESIGN-2026-05-14 (single-target mode per manifest).
#
# Rules checked: [PLAT-ARCH-007], [PLAT-ARCH-008c], [PLAT-ARCH-008i],
# [PLAT-ARCH-008j], [PLAT-ARCH-023]. See companion script.

name: validate-platform-architecture

on:
  push:
    branches: [main]
    paths:
      - '.github/scripts/validate-platform-architecture.py'
      - '.github/workflows/validate-platform-architecture.yml'
  pull_request:
    paths:
      - '.github/scripts/validate-platform-architecture.py'
      - '.github/workflows/validate-platform-architecture.yml'
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of the target repo to validate (default: this repo).'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        description: 'Total count of individual violations.'
        value: ${{ jobs.scan.outputs.total-violations }}
  workflow_dispatch:
    inputs:
      repo:
        description: 'Owner/name of the target repo to validate (optional).'
        type: string
        required: false
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false

jobs:
  scan:
    uses: ./.github/workflows/validate-base.yml
    with:
      validator-script: .github/scripts/validate-platform-architecture.py
      rule-id-regex: '^PLAT-ARCH-'
      discovery-mode: single-target
      target-repo: ${{ inputs.repo }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
