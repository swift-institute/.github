name: Swift DocC (reusable)

# Reusable DocC build workflow for Swift Institute packages using the
# umbrella-module single-catalog pattern ([DOC-019a]). Consume from a caller
# package's .github/workflows/docs.yml via:
#
#   jobs:
#     docs:
#       uses: swift-institute/.github/.github/workflows/swift-docs.yml@v1
#       with:
#         umbrella-module: Property_Primitives
#         umbrella-display-name: "Property Primitives"
#         umbrella-bundle-id: "swift-property-primitives.Property-Primitives"
#         umbrella-docc-path: "Sources/Property Primitives/Property Primitives.docc"
#         exclude-modules: "Property_Primitives_Test_Support"
#         sanity-check-json-path: "data/documentation/property_primitives/property/init(_:).json"
#       secrets: inherit
#
# Pipeline:
#   1. `swift build` with symbol-graph emission (preserves @_exported doc comments)
#   2. Pool per-module graphs, excluding caller-specified modules (e.g. Test Support)
#   3. Isolate the umbrella graph via patch-umbrella-symbol-graph.py. This step
#      is load-bearing for in-catalog `Symbol` cross-reference resolution —
#      passing the full pool to `docc convert` triggers cross-module
#      ambiguity and every symbol reference fails silently. The script's
#      doc-comment injection is a defensive no-op under `swift build` but
#      catches any future regression of @_exported preservation.
#   4. `xcrun docc convert` on the umbrella catalog pointed at ONLY the
#      isolated umbrella graph — single-archive output, clean cross-refs.
#   5. (Optional) sanity-check that the archive contains non-empty abstracts.
#   6. Upload as an artifact.
#
# Details: swift-institute/Research/docc-multi-target-documentation-aggregation.md

on:
  workflow_call:
    inputs:
      xcode-version:
        type: string
        default: "26.4"
      macos-runner:
        type: string
        default: "macos-26"
      umbrella-module:
        type: string
        required: true
        description: "Umbrella module name (underscore form, e.g. Property_Primitives)."
      umbrella-display-name:
        type: string
        required: true
        description: "Human-readable module name (e.g. 'Property Primitives')."
      umbrella-bundle-id:
        type: string
        required: true
        description: "DocC bundle identifier (e.g. swift-property-primitives.Property-Primitives)."
      umbrella-docc-path:
        type: string
        required: true
        description: "Path to the umbrella .docc catalog (e.g. 'Sources/Property Primitives/Property Primitives.docc')."
      exclude-modules:
        type: string
        default: ""
        description: "Space-separated module names to exclude from the distribution symbol-graph pool (e.g. 'Test_Support_Module')."
      sanity-check-json-path:
        type: string
        default: ""
        description: "Optional relative path inside the archive to a JSON file whose 'abstract' field must be non-empty."
      retention-days:
        type: number
        default: 14
      enable-private-repos:
        type: boolean
        default: false
      cache-key-prefix:
        type: string
        default: "swift63-docs-v1"
        description: "Cache-key prefix for .build. Bump when invalidating caches is desired."
    secrets:
      PRIVATE_REPO_TOKEN:
        required: false

jobs:
  docs:
    name: DocC archive
    runs-on: ${{ inputs.macos-runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Select Xcode ${{ inputs.xcode-version }}
        run: sudo xcode-select -s /Applications/Xcode_${{ inputs.xcode-version }}.app

      - name: Print Swift version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: macos-${{ inputs.cache-key-prefix }}-${{ hashFiles('Package.swift', 'Package@*.swift') }}
          restore-keys: |
            macos-${{ inputs.cache-key-prefix }}-

      - name: swift build — emit per-module symbol graphs
        env:
          DOCS_WORK: ${{ runner.temp }}/docs-work
        run: |
          echo "DOCS_WORK=${DOCS_WORK}" >> $GITHUB_ENV
          rm -rf "${DOCS_WORK}"
          mkdir -p "${DOCS_WORK}/symbol-graphs-raw"
          swift build -c release \
            -Xswiftc -emit-symbol-graph \
            -Xswiftc -emit-symbol-graph-dir -Xswiftc "${DOCS_WORK}/symbol-graphs-raw"
          echo "Raw symbol graphs:"
          ls "${DOCS_WORK}/symbol-graphs-raw/"

      - name: Pool distribution symbol graphs
        run: |
          mkdir -p "${DOCS_WORK}/symbol-graphs"
          cp "${DOCS_WORK}/symbol-graphs-raw"/*.symbols.json "${DOCS_WORK}/symbol-graphs/"
          for excluded in ${{ inputs.exclude-modules }}; do
            rm -f "${DOCS_WORK}/symbol-graphs/${excluded}.symbols.json"
            rm -f "${DOCS_WORK}/symbol-graphs/${excluded}@"*.symbols.json
          done
          echo "Distribution symbol graphs:"
          ls "${DOCS_WORK}/symbol-graphs/"

      - name: Fetch patch-umbrella-symbol-graph.py
        uses: actions/checkout@v6
        with:
          repository: swift-institute/.github
          ref: v1
          path: .swift-institute-github
          sparse-checkout: .github/scripts/patch-umbrella-symbol-graph.py
          sparse-checkout-cone-mode: false

      - name: Isolate umbrella symbol graph
        run: |
          python3 .swift-institute-github/.github/scripts/patch-umbrella-symbol-graph.py \
            --symbol-graph-dir "${DOCS_WORK}/symbol-graphs" \
            --umbrella-module "${{ inputs.umbrella-module }}" \
            --output-dir "${DOCS_WORK}/umbrella-symbol-graph"
          echo "Isolated umbrella graph(s):"
          ls "${DOCS_WORK}/umbrella-symbol-graph/"

      - name: Build distribution archive (xcrun docc convert)
        run: |
          mkdir -p "${DOCS_WORK}/archives"
          rm -rf "${DOCS_WORK}/archives/${{ inputs.umbrella-display-name }}.doccarchive"
          xcrun docc convert "${{ inputs.umbrella-docc-path }}" \
            --additional-symbol-graph-dir "${DOCS_WORK}/umbrella-symbol-graph" \
            --fallback-display-name "${{ inputs.umbrella-display-name }}" \
            --fallback-bundle-identifier "${{ inputs.umbrella-bundle-id }}" \
            --output-path "${DOCS_WORK}/archives/${{ inputs.umbrella-display-name }}.doccarchive" \
            2>&1 | tail -20
          echo "Top-level documentation routes:"
          ls "${DOCS_WORK}/archives/${{ inputs.umbrella-display-name }}.doccarchive/data/documentation/" | sort

      - if: inputs.sanity-check-json-path != ''
        name: Sanity check — verify abstract present
        run: |
          python3 - "${DOCS_WORK}/archives/${{ inputs.umbrella-display-name }}.doccarchive/${{ inputs.sanity-check-json-path }}" <<'PY'
          import json, sys
          with open(sys.argv[1]) as f:
              d = json.load(f)
          if not d.get('abstract'):
              print('error: sanity check failed — abstract missing on the specified symbol', file=sys.stderr)
              sys.exit(1)
          print(f"verified: abstract present = {d['abstract'][0]['text']!r}")
          PY

      - name: Upload distribution DocC archive
        uses: actions/upload-artifact@v7
        with:
          name: docc-archive
          path: ${{ env.DOCS_WORK }}/archives/${{ inputs.umbrella-display-name }}.doccarchive
          retention-days: ${{ inputs.retention-days }}
