# validate-layer-deps.yml — verify platform-stack layer & dep invariants.
#
# Wave 2 mechanization (2026-05-11). Migrated to thin caller of
# validate-base.yml in Phase B-2 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14
# (single-target mode per manifest).
#
# Rules checked: [PLAT-ARCH-008], [PLAT-ARCH-008h]. See companion script
# header for the full mechanized/non-mechanized rule list.

name: validate-layer-deps

on:
  push:
    branches: [main]
    paths:
      - '.github/scripts/validate-layer-deps.py'
      - '.github/workflows/validate-layer-deps.yml'
  pull_request:
    paths:
      - '.github/scripts/validate-layer-deps.py'
      - '.github/workflows/validate-layer-deps.yml'
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of the target repo to validate (default: this repo).'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        description: 'Total count of individual violations.'
        value: ${{ jobs.scan.outputs.total-violations }}
  workflow_dispatch:
    inputs:
      repo:
        description: 'Owner/name of the target repo to validate (optional).'
        type: string
        required: false
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false

jobs:
  scan:
    uses: ./.github/workflows/validate-base.yml
    with:
      validator-script: .github/scripts/validate-layer-deps.py
      rule-id-regex: '^PLAT-ARCH-008'
      discovery-mode: single-target
      target-repo: ${{ inputs.repo }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
