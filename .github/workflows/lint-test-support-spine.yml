# lint-test-support-spine.yml — advisory CI gate for [MOD-024] Test Support
# Spine Discipline.
#
# Reusable workflow. For the checked-out package, runs the per-package audit
# (audit-test-support-spine.py --package-dir .) and exits 1 on VIOLATION
# or MISSING findings. The advisory-vs-gating decision is made at the CALLING
# site via the `advisory` input: `with: { advisory: true }` for Phase β
# (warnings only, exit 0); omitted for Phase γ (default false, exit 1 on
# findings).
#
# Phase β (current): called from swift-institute/.github/.github/workflows/
# swift-ci.yml with `with: { advisory: true }`. Findings surface in the
# job log + step summary as warnings; the workflow exits 0 regardless
# (parent CI is not gated).
#
# Phase γ (future, after two consecutive weeks of ecosystem-wide zero
# violations confirmed by lint-test-support-spine-weekly.yml): drop the
# `with:` block at the calling site (advisory defaults to false → gating).
# The audit becomes gating; drift recurrence fails the parent CI.
#
# Why an input instead of `continue-on-error: true` on the `uses:` job:
# GitHub Actions does NOT permit `continue-on-error` on workflow_call
# jobs, only on regular jobs and steps. The advisory/gating switch
# therefore lives as a workflow input that gates the `exit 1` line below.
#
# Audit script source:
#   swift-institute/.github/.github/scripts/audit-test-support-spine.py
# Public fetch URL (used by the run step below):
#   https://raw.githubusercontent.com/swift-institute/.github/main/.github/scripts/audit-test-support-spine.py
#
# Provenance: [MOD-024] (the rule); [CI-001]+[CI-002] (architecture);
# [CI-021] (continue-on-error precedent); [README-167] (tracking-issue
# reporting via the weekly orchestrator). Research:
# `swift-institute/Research/centralized-swift-ci-and-spine-gate.md`.

name: lint-test-support-spine

on:
  workflow_call:
    inputs:
      advisory:
        type: boolean
        default: false
        description: |
          If true, findings emit warnings only and the workflow exits 0
          regardless of VIOLATION/MISSING counts. Used during Phase β.
          Phase γ flip omits this input (default false) → workflow
          exits 1 on findings (gating).
      swift-version:
        type: string
        default: "6.3"
        description: |
          Swift toolchain pin (per [CI-011]). Used as the container tag
          since this audit invokes `swift package dump-package`. Mirrors
          the universal reusable's input so callers bumping the floor
          flip every container reference in lockstep.
    outputs:
      ok-count:
        description: 'Number of OK findings (TS targets that satisfy [MOD-024]).'
        value: ${{ jobs.audit.outputs.ok-count }}
      violation-count:
        description: 'Number of VIOLATION findings (TS targets with non-TS cross-package deps).'
        value: ${{ jobs.audit.outputs.violation-count }}
      missing-count:
        description: 'Number of MISSING findings (packages with tests but no TS target).'
        value: ${{ jobs.audit.outputs.missing-count }}

  workflow_dispatch: {}

# Workflow-level deny-all default per [CI-080]; per-job permissions: blocks
# override. workflow_call reusables: top-level permissions: is inert at call
# time (caller's job-level grants apply); kept for consistency + dispatch path.
permissions: {}

jobs:
  audit:
    name: Test Support Spine audit
    if: ${{ !github.event.repository.private }}     # [CI-032]
    runs-on: ubuntu-latest
    container: swift:${{ inputs.swift-version }}    # [CI-011] toolchain pin
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      ok-count: ${{ steps.audit.outputs.ok-count }}
      violation-count: ${{ steps.audit.outputs.violation-count }}
      missing-count: ${{ steps.audit.outputs.missing-count }}
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Install dependencies (python3, git for sparse-checkout)
        shell: bash
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -qq -y python3 git

      - name: Fetch audit script (sparse-checkout from swift-institute/.github)
        uses: actions/checkout@v6
        with:
          repository: swift-institute/.github
          ref: main
          path: .swift-institute-github
          sparse-checkout: .github/scripts/audit-test-support-spine.py
          sparse-checkout-cone-mode: false

      - name: Run audit
        id: audit
        shell: bash
        run: |
          set -euo pipefail
          python3 .swift-institute-github/.github/scripts/audit-test-support-spine.py \
            --package-dir . \
            --json /tmp/audit.json \
            | tee /tmp/audit.log
          read -r ok viol miss < <(python3 - <<'PYEOF'
          import json
          t = json.load(open('/tmp/audit.json'))['aggregate']['totals']
          print(t['ok_findings'], t['violation_findings'], t['missing_findings'])
          PYEOF
          )
          echo "ok-count=$ok"          >> "$GITHUB_OUTPUT"
          echo "violation-count=$viol" >> "$GITHUB_OUTPUT"
          echo "missing-count=$miss"   >> "$GITHUB_OUTPUT"
          {
            echo "## Test Support Spine — [MOD-024]"
            echo ""
            echo "- OK:        $ok"
            echo "- VIOLATION: $viol"
            echo "- MISSING:   $miss"
            echo ""
            if [[ "$viol" -gt 0 || "$miss" -gt 0 ]]; then
              echo "### Findings"
              echo ""
              echo '```'
              cat /tmp/audit.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "$viol" -gt 0 || "$miss" -gt 0 ]]; then
            echo "::warning::[MOD-024] spine drift detected — $viol violations, $miss missing"
            if [[ "${{ inputs.advisory }}" != "true" ]]; then
              exit 1
            fi
          fi
