# validate-diagnostic-format.yml — verify lint-rule diagnostic message format.
#
# Wave 4 mechanization (2026-05-11). Migrated to thin caller of
# validate-base.yml in Phase B-2 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14
# (single-target mode per manifest).
#
# Rules checked: [API-NAME-009]. See companion script for details.

name: validate-diagnostic-format

on:
  push:
    branches: [main]
    paths:
      - '.github/scripts/validate-diagnostic-format.py'
      - '.github/workflows/validate-diagnostic-format.yml'
  pull_request:
    paths:
      - '.github/scripts/validate-diagnostic-format.py'
      - '.github/workflows/validate-diagnostic-format.yml'
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of the target repo to validate (default: this repo).'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        description: 'Total count of individual violations.'
        value: ${{ jobs.scan.outputs.total-violations }}
  workflow_dispatch:
    inputs:
      repo:
        description: 'Owner/name of the target repo to validate (optional).'
        type: string
        required: false
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false

jobs:
  scan:
    uses: ./.github/workflows/validate-base.yml
    with:
      validator-script: .github/scripts/validate-diagnostic-format.py
      rule-id-regex: '^API-NAME-009'
      discovery-mode: single-target
      target-repo: ${{ inputs.repo }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
