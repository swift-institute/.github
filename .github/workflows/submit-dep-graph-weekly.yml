# submit-dep-graph-weekly.yml — centralized GitHub dep-graph submission (γ-2b).
#
# Per-org cron orchestrator that submits a SwiftPM dependency-graph snapshot
# for every public, non-archived, non-fork repo in each in-scope org. Runs
# Mondays 06:50 UTC (offset from spine 06:30 + foundation 06:35 +
# license 06:40 + mechanical-hygiene 06:45 + readme-presence 06:00).
#
# Architecture (per research §3.4.5b + v1.3.0 §3.5.4 lessons):
#   - The `vapor-community/swift-dependency-submission` action submits to
#     ${{ github.repository }} and can't be redirected to other repos. Per-
#     package opt-in workflow files would fan out 132+ files. Per-org cron
#     submission via direct API gives single-workflow context with
#     centralized logic — matches sync-metadata-nightly.yml's shape.
#   - Each org gets ONE installation token (swift-institute-bot has cross-
#     org code:write per the App's permissions). The same token works for
#     POSTing dep-graph snapshots to any repo in that org.
#   - Snapshot JSON is generated by build-dep-graph-snapshot.py from
#     `swift package show-dependencies --format json` output.
#
# Snapshot helper:
#   swift-institute/.github/.github/scripts/build-dep-graph-snapshot.py
# API endpoint:
#   POST /repos/<owner>/<repo>/dependency-graph/snapshots
#   https://docs.github.com/en/rest/dependency-graph/dependency-submission
#
# Provenance: research §3.4.5b (γ-2b spec); v1.3.0 §3.5.4 (permissions-chain
# lesson — why centralized over transitive); [README-167] tracking-issue;
# [PRIM-FOUND-001]/[CI-041] (Package.resolved gitignored ecosystem-wide;
# explicit dep-graph submission compensates for absent autodetection).

name: submit-dep-graph-weekly

# Swift toolchain pin per [CI-011]. Mirrors the universal reusable's
# default; bump in lockstep when the floor advances.
env:
  SWIFT_VERSION: "6.3"

on:
  schedule:
    - cron: '50 6 * * 1'   # weekly Monday 06:50 UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Build snapshots but skip POSTing them.'
        type: boolean
        required: false
        default: false

jobs:
  sweep:
    strategy:
      fail-fast: false
      matrix:
        org:
          - swift-primitives
          # Expansion candidates as ecosystem orgs accept dep-graph submission:
          # - swift-standards
          # - swift-foundations
    runs-on: ubuntu-latest
    container: swift:${{ env.SWIFT_VERSION }}
    permissions:
      contents: read
    steps:
      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ matrix.org }}
          repositories: ''

      - name: Install dependencies (curl, python3, gh, jq)
        shell: bash
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -qq -y curl python3 jq ca-certificates gnupg
          mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            > /etc/apt/sources.list.d/github-cli.list
          apt-get update -qq
          apt-get install -qq -y gh

      - name: Fetch snapshot helper
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/build-dep-graph-snapshot.py \
            https://raw.githubusercontent.com/swift-institute/.github/main/.github/scripts/build-dep-graph-snapshot.py

      - name: Sweep org
        shell: bash
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ORG: ${{ matrix.org }}
          DRY_RUN: ${{ inputs.dry-run || 'false' }}
        run: |
          set -euo pipefail
          mapfile -t targets < <(gh repo list "$ORG" --limit 2000 \
            --visibility public \
            --json nameWithOwner,isArchived,isFork \
            --jq '.[] | select(.isArchived==false and .isFork==false) | .nameWithOwner')
          echo "Targets enumerated: ${#targets[@]}"
          successes=0
          failures=0
          skipped=0
          per_target_failures=()
          for target in "${targets[@]}"; do
            workdir=$(mktemp -d)
            if ! git clone --depth 1 --quiet \
                "https://x-access-token:${GH_TOKEN}@github.com/${target}.git" \
                "$workdir" 2>/dev/null; then
              failures=$((failures+1))
              per_target_failures+=("- \`${target}\`: clone failed")
              rm -rf "$workdir"
              continue
            fi
            if [[ ! -f "$workdir/Package.swift" ]]; then
              skipped=$((skipped+1))
              rm -rf "$workdir"
              continue
            fi
            (
              cd "$workdir"
              # `swift package resolve` may fail for branch-pinned private deps
              # if the token doesn't have read access; tolerate and continue.
              swift package resolve 2>/dev/null || true
              swift package show-dependencies --format json > /tmp/deps.json 2>/dev/null
            )
            if [[ ! -s /tmp/deps.json ]]; then
              failures=$((failures+1))
              per_target_failures+=("- \`${target}\`: show-dependencies failed")
              rm -rf "$workdir"
              continue
            fi
            sha=$(cd "$workdir" && git rev-parse HEAD)
            if ! GITHUB_SHA="$sha" GITHUB_REF=refs/heads/main \
                 GITHUB_RUN_ID="${GITHUB_RUN_ID:-0}" \
                 python3 /tmp/build-dep-graph-snapshot.py /tmp/deps.json \
                 > /tmp/snapshot.json 2>/dev/null; then
              failures=$((failures+1))
              per_target_failures+=("- \`${target}\`: snapshot build failed")
              rm -rf "$workdir"
              continue
            fi
            if [[ "$DRY_RUN" == "true" ]]; then
              dep_count=$(jq '.manifests."Package.swift".resolved | length' /tmp/snapshot.json)
              echo "(dry-run) ${target}: $dep_count deps"
              successes=$((successes+1))
              rm -rf "$workdir"
              continue
            fi
            if gh api -X POST "repos/${target}/dependency-graph/snapshots" \
                 --input /tmp/snapshot.json > /dev/null 2>&1; then
              successes=$((successes+1))
            else
              failures=$((failures+1))
              per_target_failures+=("- \`${target}\`: POST failed")
            fi
            rm -rf "$workdir"
          done
          {
            echo "## Org $ORG — dep-graph submission (γ-2b)"
            echo "- Targets:    ${#targets[@]}"
            echo "- Successes:  $successes"
            echo "- Skipped:    $skipped (no Package.swift)"
            echo "- Failures:   $failures"
            if (( failures > 0 )); then
              echo ""
              echo "### Failed targets"
              echo ""
              printf '%s\n' "${per_target_failures[@]}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          echo "${successes},${failures},${skipped}" > "/tmp/${ORG}-counts.txt"
          printf '%s\n' "${per_target_failures[@]}" > "/tmp/${ORG}-failures.txt" 2>/dev/null || true

      - uses: actions/upload-artifact@v7
        with:
          name: depgraph-counts-${{ matrix.org }}
          path: |
            /tmp/${{ matrix.org }}-counts.txt
            /tmp/${{ matrix.org }}-failures.txt

  report:
    needs: sweep
    runs-on: ubuntu-latest
    if: always() && needs.sweep.result != 'skipped'
    steps:
      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: swift-institute
          repositories: .github
          permission-issues: write

      - uses: actions/download-artifact@v8
        with:
          path: /tmp/counts

      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          DRY_RUN: ${{ inputs.dry-run || 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          today=$(date -u '+%Y-%m-%d')
          total_s=0
          total_f=0
          total_skip=0
          per_org=()
          all_failures=""
          for f in /tmp/counts/*/*-counts.txt; do
            org=$(basename "$(dirname "$f")" | sed 's/^depgraph-counts-//')
            IFS=',' read -r s fl sk < "$f"
            total_s=$((total_s + s))
            total_f=$((total_f + fl))
            total_skip=$((total_skip + sk))
            per_org+=("- \`${org}\`: $s succeeded, $fl failed, $sk skipped")
          done
          for f in /tmp/counts/*/*-failures.txt; do
            [[ -s "$f" ]] && all_failures="${all_failures}$(cat "$f")"$'\n'
          done
          if [[ "$total_f" -eq 0 ]]; then
            echo "Dep-graph submission clean across all orgs — no tracking issue."
            exit 0
          fi
          [[ "$DRY_RUN" == "true" ]] && { echo "(dry-run; would have opened/updated issue)"; exit 0; }
          title="Dep-graph submission sweep ${today}"
          body=$(cat <<EOF
          The weekly γ-2b dep-graph submission sweep at 06:50 UTC on ${today}
          had failures.

          ## Aggregate
          - Successes: ${total_s}
          - Failures:  ${total_f}
          - Skipped:   ${total_skip} (no Package.swift)

          ## Per-org

          $(printf '%s\n' "${per_org[@]}")

          ## Failed targets

          ${all_failures}

          ## What this means

          γ-2b explicitly submits a SwiftPM dependency-graph snapshot for each
          public consumer repo, compensating for the [CI-041] gitignored
          \`Package.resolved\` (which prevents Dependabot autodetection of
          resolved versions). Failures are typically infra-class — clone
          failed, swift package resolve failed for branch-pinned private deps,
          or the API call returned non-2xx.

          ## What to do

          - Inspect the failed-targets list above; classify by failure mode.
          - If clone failures cluster on private repos: swift-institute-bot's
            installation scope on that org needs widening.
          - If show-dependencies failures cluster on packages that have
            transitive private deps: the install token needs read access to
            those private dep repos (cross-org token scope).
          - If POST failures: check rate limiting / API status.
          - Close this issue when fixed; the next weekly sweep reopens it
            if drift recurs.

          *Idempotent: this issue is updated in place.*
          EOF
          )
          existing=$(gh issue list --repo swift-institute/.github \
            --state open --search "Dep-graph submission sweep in:title" \
            --json number --jq '.[0].number // ""')
          if [[ -n "$existing" ]]; then
            gh issue edit "$existing" --repo swift-institute/.github --title "$title" --body "$body"
          else
            gh issue create --repo swift-institute/.github --title "$title" --body "$body" --label "dep-graph"
          fi
