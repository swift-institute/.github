# validate-permissions-shape.yml — verify [CI-090] + [CI-097] trigger-shape permissions.
#
# Pilot 27 of `/promote-rule` (2026-05-14). Migrated to thin caller of
# validate-base.yml in Phase B-2 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14
# (wrapper-host-multi-file mode per manifest).
#
# Self-firing push/pull_request triggers active 2026-05-14 (CI-090 batch-fix
# landed in commits 5161e33..74ae3d0; manifest flip e0a9155; trigger
# uncomment 8babe6a). Outcome record: `Audits/PROMOTE-CI-090-CI-097-2026-05-14.md`.
#
name: validate-permissions-shape

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**.yml'
      - '.github/scripts/validate-permissions-shape.py'
      - '.github/workflows/validate-permissions-shape.yml'
  pull_request:
    paths:
      - '.github/workflows/**.yml'
      - '.github/scripts/validate-permissions-shape.py'
      - '.github/workflows/validate-permissions-shape.yml'
  workflow_call:
    inputs:
      repo:
        type: string
        required: false
        default: ''
      dry-run:
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        value: ${{ jobs.scan.outputs.total-violations }}
  workflow_dispatch:
    inputs:
      repo:
        type: string
        required: false
      dry-run:
        type: boolean
        required: false
        default: false

jobs:
  scan:
    uses: ./.github/workflows/validate-base.yml
    with:
      validator-script: .github/scripts/validate-permissions-shape.py
      rule-id-regex: '^CI-09[07]'
      discovery-mode: wrapper-host-multi-file
      target-repo: ${{ inputs.repo }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
