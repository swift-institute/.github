# validate-docc-structure.yml — verify DocC catalog layout per documentation skill.
#
# Wave 2b finalization (2026-05-10). Migrated to thin caller of
# validate-base.yml in Phase B-2 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14
# (single-target mode per manifest).
#
# Rules checked: [DOC-020], [DOC-021], [DOC-026], [DOC-070], [DOC-071], [DOC-101].
# See companion script for exact detection logic.

name: validate-docc-structure

on:
  push:
    branches: [main]
    paths:
      - '.github/scripts/validate-docc-structure.py'
      - '.github/workflows/validate-docc-structure.yml'
  pull_request:
    paths:
      - '.github/scripts/validate-docc-structure.py'
      - '.github/workflows/validate-docc-structure.yml'
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of the target repo to validate (default: this repo).'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        description: 'Total count of individual violations.'
        value: ${{ jobs.scan.outputs.total-violations }}
  workflow_dispatch:
    inputs:
      repo:
        description: 'Owner/name of the target repo to validate (optional).'
        type: string
        required: false
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false

jobs:
  scan:
    uses: ./.github/workflows/validate-base.yml
    with:
      validator-script: .github/scripts/validate-docc-structure.py
      rule-id-regex: '^DOC-'
      discovery-mode: single-target
      target-repo: ${{ inputs.repo }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
