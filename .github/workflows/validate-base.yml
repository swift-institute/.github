# validate-base.yml — reusable workflow extracting the 7-step skeleton
# shared by all per-rule validate-*.yml workflows.
#
# Phase B-1 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14. Per-rule callers become
# thin wrappers (~25 lines) declaring only the validator-script, the
# rule-id-regex for finding aggregation, the discovery-mode, and optional
# overrides. The base owns the boilerplate (harden-runner, App-token mint,
# checkout, target resolution, validator invocation, aggregation, summary).
#
# Three discovery modes per design doc §1:
#
#   single-target            — clone one repo; run validator once.
#   wrapper-host-multi-file  — clone one repo; validator iterates files
#                              internally (e.g., every .github/workflows/*.yml).
#                              Workflow body identical to single-target.
#   per-package-org-sweep    — matrix over consumer repos in target-org.
#                              DEFERRED to Phase B-2; callers with this mode
#                              fail-fast at the discovery-mode guard step.
#
# Chain-depth accounting per [CI-004b] (4-level workflow_call limit):
# Phase B-1 callers (e.g., validate-cache-policy.yml) sit at L1 when
# triggered by their own paths-trigger or workflow_dispatch, so nesting
# validate-base.yml puts the chain at L2 — well within budget. The two
# universal-nested validators (validate-thin-callers.yml at swift-ci.yml:496
# and validate-file-naming.yml at :504) sit at L4 already; they MUST NOT
# migrate to validate-base.yml — manifest entries flag them with
# `migrate-to-base: no (chain-C)` per CI-REVIEW-PHASE-B-DESIGN §5.
#
# Per [CI-090] this is a workflow_call reusable so NO top-level
# `permissions:` block — per-job permissions provide the floor, the
# caller's permissions cap the intersection.

name: validate-base

on:
  workflow_call:
    inputs:
      validator-script:
        description: 'Path within swift-institute/.github to the per-rule validator (e.g., .github/scripts/validate-cache-policy.py).'
        type: string
        required: true
      rule-id-regex:
        description: 'awk-compatible regex matching column 2 of /tmp/findings.tsv (e.g., "^CI-04[02]"). Used for both the violations-count and the step-summary table filter.'
        type: string
        required: true
      discovery-mode:
        description: 'single-target | wrapper-host-multi-file | per-package-org-sweep. Phase B-1 supports the first two; per-package-org-sweep is deferred to B-2.'
        type: string
        required: true
      target-repo:
        description: 'Optional override of github.repository. Empty = default to caller repo.'
        type: string
        required: false
        default: ''
      target-org:
        description: 'Required for per-package-org-sweep (Phase B-2). Empty otherwise.'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        description: 'Count of findings matching rule-id-regex.'
        value: ${{ jobs.scan.outputs.total-violations }}

jobs:
  scan:
    if: ${{ !github.event.repository.private }}  # [CI-032]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      total-violations: ${{ steps.aggregate.outputs.total-violations }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Reject unsupported discovery-mode (B-1 scope)
        if: ${{ inputs.discovery-mode == 'per-package-org-sweep' }}
        shell: bash
        run: |
          echo "::error::discovery-mode=per-package-org-sweep is deferred to Phase B-2 per CI-REVIEW-PHASE-B-DESIGN §1. Use single-target or wrapper-host-multi-file for now, or keep the caller inline."
          exit 1

      - name: Validate discovery-mode value
        if: ${{ inputs.discovery-mode != 'single-target' && inputs.discovery-mode != 'wrapper-host-multi-file' }}
        shell: bash
        env:
          MODE: ${{ inputs.discovery-mode }}
        run: |
          echo "::error::Unknown discovery-mode: '${MODE}'. Valid values: single-target | wrapper-host-multi-file | per-package-org-sweep (deferred to B-2)."
          exit 1

      - name: Mint installation token (swift-institute-bot)
        id: mint-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout swift-institute/.github (validator host)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          repository: swift-institute/.github
          path: institute-github
          ref: main

      - name: Resolve target repo
        id: targets
        env:
          GH_TOKEN: ${{ steps.mint-token.outputs.token }}
          INPUT_REPO: ${{ inputs.target-repo }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_REPO" ]; then
            echo "$INPUT_REPO" > /tmp/target.txt
          else
            echo "${GITHUB_REPOSITORY:-swift-institute/.github}" > /tmp/target.txt
          fi

      - name: Run validator
        id: check
        env:
          GH_TOKEN: ${{ steps.mint-token.outputs.token }}
          VALIDATOR: ${{ github.workspace }}/institute-github/${{ inputs.validator-script }}
        run: |
          set -euo pipefail
          : > /tmp/findings.tsv
          repo="$(cat /tmp/target.txt)"
          workdir=$(mktemp -d)
          (
            cd "$workdir"
            if ! gh repo clone "$repo" . -- --depth 1 --quiet 2>/dev/null; then
              echo "$repo	clone-failed	-" >> /tmp/findings.tsv
              exit 0
            fi
            # Capture the validator's exit code without tripping `set -e`. The
            # validators are signal-via-TSV: `__main__` returns 0 even WITH
            # findings (e.g. validate-harden-runner.py calls main() without
            # sys.exit), so a nonzero rc genuinely means the validator crashed or
            # aborted (uncaught exception, or require_yaml()'s sys.exit(2) on
            # missing PyYAML) — NOT that it found violations. The old `|| true`
            # swallowed such a crash and left findings.tsv empty → "Total
            # violations: 0" → false-green, exactly the gap clone-failed closes.
            rc=0
            python3 "$VALIDATOR" "$repo" "$workdir" >> /tmp/findings.tsv || rc=$?
            if [ "$rc" -ne 0 ]; then
              echo "$repo	validator-crashed	-" >> /tmp/findings.tsv
            fi
          )
          rm -rf "$workdir"

      - name: Aggregate findings
        id: aggregate
        env:
          RULE_ID_REGEX: ${{ inputs.rule-id-regex }}
          DRY_RUN: ${{ inputs.dry-run }}
          VALIDATOR_SCRIPT: ${{ inputs.validator-script }}
        run: |
          set -euo pipefail
          # Count findings with the SAME field-match predicate the summary
          # table uses below (awk `$2 ~ re`), so the count and the rendered
          # table share one predicate and can never disagree. The prior
          # `grep -cE "<TAB>${RULE_ID_REGEX}"` was structurally inert: every
          # caller's rule-id-regex is `^`-anchored, so the effective pattern
          # `<TAB>^CI-NNN` placed a line-start anchor mid-pattern and matched
          # ZERO lines — violations pinned to 0, all validate-base consumers
          # false-green ([CI-110] tooling-trap cluster). awk|wc|tr each exit 0
          # (awk emits 0 records on empty input) so the pipeline is
          # pipefail-safe and yields 0 on an empty findings.tsv.
          violations=$(awk -F'\t' -v re="${RULE_ID_REGEX}" '$2 ~ re' /tmp/findings.tsv | wc -l | tr -d ' ')
          # Sentinel gates: the Run-validator step writes a
          # `<repo><TAB>clone-failed<TAB>-` row (clone failed) or a
          # `<repo><TAB>validator-crashed<TAB>-` row (cloned fine but the
          # validator exited nonzero), then continues, so a validator that
          # NEVER PRODUCED USABLE OUTPUT would otherwise pass silently (field 2
          # of either sentinel matches no rule regex, exactly like clone-failed).
          # Detect both row kinds explicitly and fail closed.
          clone_failures=$(awk -F'\t' '$2 == "clone-failed"' /tmp/findings.tsv | wc -l | tr -d ' ')
          validator_crashes=$(awk -F'\t' '$2 == "validator-crashed"' /tmp/findings.tsv | wc -l | tr -d ' ')
          echo "total-violations=$violations" >> "$GITHUB_OUTPUT"
          {
            echo "## ${VALIDATOR_SCRIPT} findings"
            echo "Total violations: $violations"
            echo
            if [ "$clone_failures" -gt 0 ]; then
              echo "> [!CAUTION]"
              echo "> ${clone_failures} target(s) FAILED TO CLONE — the validator did not run. The violation count above is unreliable (false-green risk); treat this run as FAILED and re-run to clear a transient clone error."
              echo
              awk -F'\t' '$2 == "clone-failed" { printf("- clone-failed: `%s`\n", $1) }' /tmp/findings.tsv
              echo
            fi
            if [ "$validator_crashes" -gt 0 ]; then
              echo "> [!CAUTION]"
              echo "> ${validator_crashes} target(s) CRASHED THE VALIDATOR — it cloned but exited nonzero (uncaught exception or aborted setup), producing no usable findings. The violation count above is unreliable (false-green risk); treat this run as FAILED and fix the validator or its environment."
              echo
              awk -F'\t' '$2 == "validator-crashed" { printf("- validator-crashed: `%s`\n", $1) }' /tmp/findings.tsv
              echo
            fi
            if [ "$violations" -gt 0 ]; then
              echo "| Repo | Rule | Message |"
              echo "|---|---|---|"
              awk -F'\t' -v re="${RULE_ID_REGEX}" '$2 ~ re {
                gsub(/\|/, "\\|", $3);
                printf("| `%s` | `%s` | %s |\n", $1, $2, $3)
              }' /tmp/findings.tsv
            fi
          } > "$GITHUB_STEP_SUMMARY"
          if [ "$clone_failures" -gt 0 ]; then
            if [ "$DRY_RUN" != "true" ]; then
              echo "::error::${clone_failures} validator target(s) failed to clone — a validator did NOT run, so a green result here would be false. Failing the aggregation gate (re-run to clear a transient clone error)."
            else
              echo "::warning::${clone_failures} validator target(s) failed to clone (dry-run: not failing) — a validator did not run; this run's counts are unreliable."
            fi
          fi
          if [ "$validator_crashes" -gt 0 ]; then
            if [ "$DRY_RUN" != "true" ]; then
              echo "::error::${validator_crashes} validator target(s) crashed — the validator exited nonzero and produced no usable findings, so a green result here would be false. Failing the aggregation gate (fix the validator or its environment)."
            else
              echo "::warning::${validator_crashes} validator target(s) crashed (dry-run: not failing) — the validator exited nonzero; this run's counts are unreliable."
            fi
          fi
          if { [ "$violations" -gt 0 ] || [ "$clone_failures" -gt 0 ] || [ "$validator_crashes" -gt 0 ]; } && [ "$DRY_RUN" != "true" ]; then
            exit 1
          fi
