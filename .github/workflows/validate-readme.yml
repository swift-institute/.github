# validate-readme.yml — verify per-family README structural rules.
#
# Wave 2b finalization (2026-05-10). Migrated to thin caller of
# validate-base.yml in Phase B-2 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14
# (single-target mode per manifest).
#
# Scope (v1):
#   Universal: [README-017], [README-026]
#   Family E:  [README-001], [README-003], [README-008], [README-013], [README-016]
#   Family C:  [README-137], [README-138]
#   Family F:  [README-150], [README-151]
#   Family G:  [README-116]
#
# Out-of-scope for v1: family-A user-profile rules, sub-tier G rules
# (top-level / org-of-orgs / leaf), version-currency check ([README-164])
# which is its own workflow trigger.

name: validate-readme

on:
  push:
    branches: [main]
    paths:
      - '.github/scripts/validate-readme.py'
      - '.github/workflows/validate-readme.yml'
  pull_request:
    paths:
      - '.github/scripts/validate-readme.py'
      - '.github/workflows/validate-readme.yml'
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of the target repo to validate (default: this repo).'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        description: 'Total count of individual violations.'
        value: ${{ jobs.scan.outputs.total-violations }}
  workflow_dispatch:
    inputs:
      repo:
        description: 'Owner/name of the target repo to validate (optional).'
        type: string
        required: false
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false

jobs:
  scan:
    uses: ./.github/workflows/validate-base.yml
    with:
      validator-script: .github/scripts/validate-readme.py
      rule-id-regex: '^README-'
      discovery-mode: single-target
      target-repo: ${{ inputs.repo }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
