# sync-metadata-nightly.yml — daily full-sweep autopilot.
#
# Calls sync-metadata.yml once per ecosystem org via a matrix strategy at
# 04:00 UTC daily. Each org gets its own auth scope. When any org applies
# edits, opens or updates a tracking issue in swift-institute/.github
# summarising what converged.
#
# Provenance: Skills/github-repository [GH-REPO-070] / [GH-REPO-071];
# Research/github-metadata-harmonization.md § 4.2 / § 7 Q8.

name: sync-metadata-nightly

on:
  schedule:
    - cron: '0 4 * * *'   # daily 04:00 UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Preview edits without applying.'
        type: boolean
        required: false
        default: false

jobs:
  config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      orgs: ${{ steps.read.outputs.orgs }}
    steps:
      - id: read
        uses: swift-institute/.github/.github/actions/read-orgs@main
        # Default filter `.name` emits all active orgs.

  sweep:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        org: ${{ fromJSON(needs.config.outputs.orgs) }}
    uses: ./.github/workflows/sync-metadata.yml
    with:
      org: ${{ matrix.org }}
      dry-run: ${{ inputs.dry-run || false }}
    secrets: inherit

  report:
    needs: sweep
    runs-on: ubuntu-latest
    if: always() && needs.sweep.result != 'skipped'
    permissions:
      contents: read
    steps:
      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: swift-institute
          repositories: .github
          permission-issues: write

      - name: Build issue body
        env:
          SWEEP_RESULT: ${{ needs.sweep.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          # Only post when a sweep actually applied or attempted edits.
          # The aggregated `result` from a matrix job is `success` if all
          # matrix entries succeeded, `failure` if any failed. We post on
          # failure (something to investigate) or when run from
          # workflow_dispatch with dry-run=false (signal of intent).
          if [[ "$SWEEP_RESULT" == "success" ]]; then
            echo "All orgs converged cleanly — no tracking issue needed."
            echo "FILE_ISSUE=false" >> "$GITHUB_ENV"
            exit 0
          fi

          today=$(date -u '+%Y-%m-%d')
          cat > "${RUNNER_TEMP}/issue-body.md" <<EOF
          The nightly metadata sweep at 04:00 UTC on ${today} completed with status: \`${SWEEP_RESULT}\`.

          See the [run summary](${RUN_URL}) for the per-org breakdown of edits applied (or attempted).

          ### What this means

          GitHub-side metadata had drifted from per-repo \`.github/metadata.yaml\` source-of-truth in one or more orgs. The sweep attempted to revert state to match the YAMLs.

          - To **accept** drift instead of reverting it, edit the relevant repo's \`.github/metadata.yaml\` to match GitHub state.
          - To **investigate** drift origins, check each affected repo's audit log around the change time.
          - If \`${SWEEP_RESULT}\` == \`failure\`, one or more matrix legs failed (auth, rate-limit, malformed YAML); follow the run logs.

          See \`Skills/github-repository\` § [GH-REPO-002] for the single-source discipline.
          EOF
          {
            echo "ISSUE_TITLE=Metadata sync run ${today} — ${SWEEP_RESULT}"
            echo "FILE_ISSUE=true"
          } >> "$GITHUB_ENV"

      - name: Upsert tracking issue
        if: env.FILE_ISSUE == 'true'
        uses: swift-institute/.github/.github/actions/upsert-tracking-issue@main
        with:
          repo: swift-institute/.github
          title: ${{ env.ISSUE_TITLE }}
          title-prefix: 'Metadata sync run'
          body-file: ${{ runner.temp }}/issue-body.md
          label: 'metadata-sync'
          gh-token: ${{ steps.token.outputs.token }}
