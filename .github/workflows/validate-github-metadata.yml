# validate-github-metadata.yml — JSON-Schema validate per-repo .github/metadata.yaml.
#
# Reusable workflow. For the given `org` (or single `repo`), enumerates
# non-archived repos, fetches each repo's .github/metadata.yaml from main
# (cheaper than full clone), and validates against
# `swift-institute/.github/metadata-schema.json` via the companion script.
#
# Wave 2b finalization (2026-05-10) — Decision 6 architectural pivot
# replaced the prior topic-registry.json lookup with this single-source
# JSON-Schema validation. Topics, README family, and other declarative
# metadata are validated structurally; the schema's enums encode the
# institutional rules from Skills/github-repository [GH-REPO-020..094].
#
# Out-of-scope for v1 (Wave 2b finalization): GitHub-state diffing
# (comparing schema-validated YAML against actual repo settings) — that
# remains in `sync-metadata.yml` per [GH-REPO-070]. This workflow is the
# pre-flight: catch schema drift in PRs before the sync tries to apply.
#
# Pattern mirrors `validate-package-structure.yml` (the Wave 2b reference
# reusable). Authentication uses the swift-institute-bot GitHub App.
#
# Provenance: HANDOFF-wave-2b-finalization.md Decision 6; Skills/github-
# repository [GH-REPO-021] (revised Wave 2b finalization 2026-05-10).

name: validate-github-metadata

on:
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of a single repo to scan.'
        type: string
        required: false
        default: ''
      org:
        description: 'Org to sweep (ignored if repo is set).'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false
      visibility:
        description: 'Filter by visibility (public | private | internal | all).'
        type: string
        required: false
        default: 'public'
    outputs:
      repos-scanned:
        description: 'Number of repos scanned.'
        value: ${{ jobs.scan.outputs.repos-scanned }}
      repos-with-violations:
        description: 'Number of repos with at least one violation.'
        value: ${{ jobs.scan.outputs.repos-with-violations }}
      total-violations:
        description: 'Total count of individual violations across all repos.'
        value: ${{ jobs.scan.outputs.total-violations }}

  workflow_dispatch:
    inputs:
      repo:
        description: 'Owner/name of a single repo (optional).'
        type: string
        required: false
      org:
        description: 'Org to sweep (optional; ignored if repo is set).'
        type: string
        required: false
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false
      visibility:
        description: 'Filter by visibility (public | private | internal | all).'
        type: string
        required: false
        default: 'public'

jobs:
  scan:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container: swift:6.3
    outputs:
      repos-scanned: ${{ steps.aggregate.outputs.repos-scanned }}
      repos-with-violations: ${{ steps.aggregate.outputs.repos-with-violations }}
      total-violations: ${{ steps.aggregate.outputs.total-violations }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Install Python tooling
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -y -qq python3 python3-pip python3-yaml curl jq
          pip3 install --break-system-packages --quiet jsonschema

      - name: Mint installation token (swift-institute-bot)
        id: mint-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ inputs.org || github.repository_owner }}

      - name: Checkout swift-institute/.github (schema + validator)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: swift-institute/.github
          path: institute-github
          ref: main

      - name: Set up gh
        env:
          GH_TOKEN: ${{ steps.mint-token.outputs.token }}
        run: |
          # gh ships in the swift:6.3 container's apt sources.list.d via the
          # CI-092 install pattern. Fail loudly if not present.
          which gh || (apt-get install -y -qq gh)

      - name: Resolve target repos
        id: targets
        env:
          GH_TOKEN: ${{ steps.mint-token.outputs.token }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_ORG: ${{ inputs.org }}
          INPUT_VISIBILITY: ${{ inputs.visibility }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_REPO" ]; then
            echo "$INPUT_REPO" > /tmp/targets.txt
          else
            : "${INPUT_ORG:?org or repo input required}"
            gh repo list "$INPUT_ORG" --no-archived --limit 1000 \
              --visibility "$INPUT_VISIBILITY" \
              --json nameWithOwner --jq '.[].nameWithOwner' > /tmp/targets.txt
          fi
          n=$(wc -l < /tmp/targets.txt | tr -d ' ')
          echo "Resolved $n target repo(s)."

      - name: Run metadata schema validation
        id: check
        env:
          GH_TOKEN: ${{ steps.mint-token.outputs.token }}
          SCHEMA: ${{ github.workspace }}/institute-github/metadata-schema.json
          VALIDATOR: ${{ github.workspace }}/institute-github/.github/scripts/validate-github-metadata.py
        run: |
          set -euo pipefail
          mkdir -p /tmp/findings
          : > /tmp/findings/all.tsv

          while IFS= read -r repo; do
            [ -z "$repo" ] && continue

            tmpyaml=$(mktemp --suffix=.yaml)
            if ! gh api "repos/${repo}/contents/.github/metadata.yaml" \
                  --jq '.content' 2>/dev/null \
                  | base64 -d > "$tmpyaml"; then
              echo "${repo}	metadata-missing	repo has no .github/metadata.yaml on default branch" >> /tmp/findings/all.tsv
              rm -f "$tmpyaml"
              continue
            fi

            python3 "$VALIDATOR" "$repo" "$tmpyaml" "$SCHEMA" >> /tmp/findings/all.tsv || true
            rm -f "$tmpyaml"
          done < /tmp/targets.txt

      - name: Aggregate findings
        id: aggregate
        run: |
          set -euo pipefail
          total_repos=$(wc -l < /tmp/targets.txt | tr -d ' ')
          violations=$(grep -cE "	(GH-REPO|README|metadata-)" /tmp/findings/all.tsv) || violations=0
          repos_with_violations=$(awk -F'\t' '$2 ~ /^(GH-REPO|README|metadata-)/{print $1}' /tmp/findings/all.tsv | sort -u | wc -l | tr -d ' ')

          echo "repos-scanned=$total_repos" >> "$GITHUB_OUTPUT"
          echo "repos-with-violations=$repos_with_violations" >> "$GITHUB_OUTPUT"
          echo "total-violations=$violations" >> "$GITHUB_OUTPUT"

          {
            echo "## validate-github-metadata findings"
            echo
            echo "Repos scanned: $total_repos"
            echo "Repos with violations: $repos_with_violations"
            echo "Total violations: $violations"
            echo
            if [ "$violations" -gt 0 ]; then
              echo "### Per-repo findings"
              echo
              echo "| Repo | Rule | Message |"
              echo "|---|---|---|"
              awk -F'\t' '$2 ~ /^(GH-REPO|README|metadata-)/{
                gsub(/\|/, "\\|", $3);
                printf("| `%s` | `%s` | %s |\n", $1, $2, $3)
              }' /tmp/findings/all.tsv
            fi
          } > "$GITHUB_STEP_SUMMARY"

          if [ "$violations" -gt 0 ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            exit 1
          fi
