# cron-audit-base.yml — reusable orchestrator skeleton for cross-org cron
# audits.
#
# Encodes the shared shape of the lint-license-header-weekly,
# lint-test-support-spine-weekly, and lint-mechanical-hygiene-weekly
# orchestrators (~80% structurally identical).
#
# (The lint-foundation-family-import-weekly orchestrator was a fourth
# consumer until 2026-05-05; it was retired when γ-1a migrated to a
# Tier 2 SwiftLint custom rule — see swift-institute/Research/
# rollout-phase-1-results.md.)
#
# Phase C of the 2026-05-14 CI review (Q2=B sealed) refactored the
# free-form `audit-step:` shell-string contract into the structured-
# input contract below. The cron-audit-runner.py driver is the only
# entry point; callers MUST NOT supply shell snippets. This closes the
# HIGH-CONDITIONAL template-injection finding from
# CI-REVIEW-security-2026-05-14.md (the prior `audit-step:` interpolated
# caller-supplied bash into a job that holds a cross-org App-installation
# token at the matrix-org scope).
#
# Each caller provides:
#
#   - audit-runner-path: optional override for the generic runner;
#     default '.github/scripts/cron-audit-runner.py' is the canonical
#     driver. All 3 current callers accept the default.
#   - audit-script-path: per-package audit script (Python). Receives
#     --package-dir <clone> --json <out>; produces the JSON shape its
#     callers expect (see existing audit-license-header.py /
#     audit-test-support-spine.py / audit-mechanical-hygiene.py).
#   - audit-setup-script-path: optional one-time pre-loop setup
#     (e.g. audit-setup-yamllint.py installs yamllint + writes
#     /tmp/yamllint.yml). Empty when no setup is needed.
#   - audit-runner-args: JSON-encoded config dict consumed by the
#     runner (json_totals_path, count_keys, extra_template,
#     extra_when_keys, summary_label). See cron-audit-runner.py
#     module docstring for the full schema.
#   - matrix-orgs: JSON array of org names to sweep.
#   - container: optional swift:* image for audits that need
#     `swift package dump-package`.
#   - issue-title-prefix / issue-label / issue-body-template: report
#     scaffolding (unchanged from pre-Phase-C).
#
# Substitutions in issue-body-template (envsubst with ${...} syntax):
#   ${TODAY}            UTC date YYYY-MM-DD
#   ${COUNT_<LABEL>}    Total across orgs for each label in count-labels
#                       (uppercased; e.g. count-labels=errors,warnings →
#                       ${COUNT_ERRORS}, ${COUNT_WARNINGS}).
#   ${PER_ORG_LIST}     Multi-line per-org breakdown built from
#                       /tmp/<ORG>-counts.txt files.
#   ${EXTRA}            Concatenated content of all /tmp/<ORG>-extra.txt
#                       artifact files (empty when no caller writes them).
#
# Per-org artifact convention: the runner writes /tmp/<ORG>-counts.txt
# (comma-separated, in count-labels order) and (when extras configured)
# /tmp/<ORG>-extra.txt (newline-separated per-package lines).
#
# Out of scope: submit-dep-graph-weekly's per-target POST-to-API pattern
# is structurally different and remains inline. link-check-weekly is also
# outside this template (different shape — matrix delegating to
# link-check.yml).
#
# Provenance: extracts the cron orchestrator skeleton repeated across 4
# weekly orchestrators. Per [CI-030] callers reference @main during
# active dev. Per [README-167] tracking-issue pattern preserved.
# Phase C refactor: Audits/Outcome-CI-REVIEW-Phase-C-2026-05-14.md.

name: cron-audit-base

# [CI-082] sha256sum -c pin for the gh CLI apt-keyring fetched from
# cli.github.com. The keyring is the trust root for downstream `apt-get
# install gh`; its integrity MUST be verified before placement in
# /etc/apt/keyrings/. Re-lock if/when GitHub rotates the keyring digest.
env:
  GH_KEYRING_SHA256: "6084d5d7bd8e288441e0e94fc6275570895da18e6751f70f057485dc2d1a811b"

on:
  workflow_call:
    inputs:
      matrix-orgs:
        type: string
        required: true
        description: >
          JSON array of org names to sweep (e.g. '["swift-primitives"]'
          or '["swift-primitives","swift-standards"]'). Parsed by
          fromJSON() at runtime.
      container:
        type: string
        required: false
        default: ''
        description: >
          Optional container image for the sweep job (e.g. swift:6.3
          when the audit invokes `swift package dump-package`). Default
          empty means run on bare ubuntu-latest. Accepts literal image
          names; env.* and matrix.* are unavailable at the container
          field per Actions context-availability rules.
      audit-runner-path:
        type: string
        required: false
        default: '.github/scripts/cron-audit-runner.py'
        description: >
          Path within swift-institute/.github to the per-target runner.
          Default points at the canonical cron-audit-runner.py. Override
          only when piloting a runner replacement (rare).
      audit-script-path:
        type: string
        required: true
        description: >
          Path within swift-institute/.github to the per-package audit
          script (e.g. `.github/scripts/audit-license-header.py`). The
          runner invokes it as `python3 <path> --package-dir <clone>
          --json <tmp>`; the script's JSON output is parsed via the
          json_totals_path + count_keys fields in audit-runner-args.
      audit-setup-script-path:
        type: string
        required: false
        default: ''
        description: >
          Optional path within swift-institute/.github to a one-time
          pre-loop setup script (e.g. audit-setup-yamllint.py installs
          the yamllint binary + writes /tmp/yamllint.yml). Empty means
          no setup needed. The setup script receives no CLI arguments.
      audit-runner-args:
        type: string
        required: true
        description: >
          JSON-encoded config object passed to the runner via
          --args-json. Required keys: count_keys (list[str]). Optional:
          json_totals_path (dotted, default 'totals'), extra_template
          (Python str.format, names: pkg + count_keys), extra_when_keys
          (list[str], subset of count_keys; default = count_keys),
          summary_label (str). See cron-audit-runner.py module docstring.
          Trust contract: the value is JSON-decoded inside the runner;
          NO shell expansion ever sees this content.
      count-labels:
        type: string
        required: true
        description: >
          Comma-separated list of count names (e.g. errors,warnings).
          Each label generates a ${COUNT_<LABEL>} substitution
          (uppercased) summed across orgs. The number of labels must
          match the column count in each /tmp/<ORG>-counts.txt file
          (which the runner writes in count_keys order; callers MUST
          keep count-labels and audit-runner-args.count_keys aligned).
      issue-title-prefix:
        type: string
        required: true
        description: >
          Title prefix for the tracking issue. Final title appends
          ' <YYYY-MM-DD>' (e.g. 'Foundation-import sweep 2026-05-12').
          Also used to search for an existing open issue to update
          (rather than creating a duplicate) — searched as
          '<prefix> in:title'.
      issue-label:
        type: string
        required: true
        description: >
          Label applied on issue creation (e.g. 'foundation-audit').
          When the label does not exist on swift-institute/.github,
          the reusable falls back to creating the issue without a
          label (matching the link-check.yml + sync-metadata-nightly
          fallback pattern).
      issue-body-template:
        type: string
        required: true
        description: >
          Markdown template body. Pre-substitution: may reference
          ${TODAY}, ${COUNT_<LABEL>} for each count-labels entry,
          ${PER_ORG_LIST}, and ${EXTRA}. Post-substitution: rendered
          via envsubst with explicit variable list.
      dry-run:
        type: boolean
        required: false
        default: false
        description: >
          When true, the reusable still runs the audit and aggregation,
          but skips the gh issue create/update. Used for canary runs
          to verify the audit logic without filing tracking issues.

jobs:
  sweep:
    strategy:
      fail-fast: false
      matrix:
        org: ${{ fromJSON(inputs.matrix-orgs) }}
    if: ${{ !github.event.repository.private }}     # [CI-032]
    runs-on: ubuntu-latest
    container: ${{ inputs.container }}
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Install dependencies
        if: ${{ inputs.container != '' }}
        shell: bash
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -qq -y curl python3 git
          # gh CLI install on swift:* container (not in base; required for `gh repo list`)
          type -p curl >/dev/null
          mkdir -p -m 755 /etc/apt/keyrings
          # [CI-082] fetch to file, sha256sum -c against pinned digest,
          # only then place in /etc/apt/keyrings/. Restructured from the
          # prior `curl | tee` pipe to enable verification (the keyring
          # is the trust root for subsequent apt-get install gh).
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /tmp/gh-keyring.gpg
          echo "${GH_KEYRING_SHA256}  /tmp/gh-keyring.gpg" | sha256sum -c -
          mv /tmp/gh-keyring.gpg /etc/apt/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt-get update -qq
          apt-get install -qq -y gh

      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ matrix.org }}
          repositories: ''

      - name: Fetch runner + audit + setup scripts (sparse-checkout from swift-institute/.github)
        uses: actions/checkout@v6
        with:
          repository: swift-institute/.github
          ref: main
          path: .swift-institute-github
          sparse-checkout: |
            ${{ inputs.audit-runner-path }}
            ${{ inputs.audit-script-path }}
            ${{ inputs.audit-setup-script-path }}
          sparse-checkout-cone-mode: false

      - name: Stage scripts at /tmp
        shell: bash
        env:
          AUDIT_RUNNER_PATH: ${{ inputs.audit-runner-path }}
          AUDIT_SCRIPT_PATH: ${{ inputs.audit-script-path }}
          AUDIT_SETUP_SCRIPT_PATH: ${{ inputs.audit-setup-script-path }}
        run: |
          set -euo pipefail
          # cp rather than mv so the sparse-checkout tree stays intact.
          cp ".swift-institute-github/${AUDIT_RUNNER_PATH}" /tmp/cron-audit-runner.py
          chmod +x /tmp/cron-audit-runner.py
          cp ".swift-institute-github/${AUDIT_SCRIPT_PATH}" /tmp/audit-script.py
          chmod +x /tmp/audit-script.py
          if [[ -n "${AUDIT_SETUP_SCRIPT_PATH}" ]]; then
            cp ".swift-institute-github/${AUDIT_SETUP_SCRIPT_PATH}" /tmp/audit-setup.py
            chmod +x /tmp/audit-setup.py
          fi

      - name: Run audit
        shell: bash
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ORG: ${{ matrix.org }}
          AUDIT_RUNNER_ARGS: ${{ inputs.audit-runner-args }}
        run: |
          set -euo pipefail
          # [CI-081] structured-input contract — no caller-supplied
          # shell. AUDIT_RUNNER_ARGS is JSON-decoded inside the runner;
          # /tmp/audit-script.py is the per-package script staged above.
          if [[ -e /tmp/audit-setup.py ]]; then
            python3 /tmp/audit-setup.py
          fi
          python3 /tmp/cron-audit-runner.py \
            --audit-script /tmp/audit-script.py \
            --org "${ORG}" \
            --args-json "${AUDIT_RUNNER_ARGS}"

      - uses: actions/upload-artifact@v7
        with:
          name: cron-audit-counts-${{ matrix.org }}
          path: |
            /tmp/${{ matrix.org }}-counts.txt
            /tmp/${{ matrix.org }}-extra.txt
          if-no-files-found: ignore

  report:
    needs: sweep
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.private && always() && needs.sweep.result != 'skipped' }}     # [CI-032]
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: swift-institute
          repositories: .github
          permission-issues: write

      - uses: actions/download-artifact@v8
        with:
          path: /tmp/counts

      - name: Aggregate + render
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          DRY_RUN: ${{ inputs.dry-run }}
          COUNT_LABELS: ${{ inputs.count-labels }}
          ISSUE_TITLE_PREFIX: ${{ inputs.issue-title-prefix }}
          ISSUE_LABEL: ${{ inputs.issue-label }}
          ISSUE_BODY_TEMPLATE: ${{ inputs.issue-body-template }}
        shell: bash
        run: |
          set -euo pipefail

          today=$(date -u '+%Y-%m-%d')

          # Parse count-labels into an array; uppercase-form for env-var names.
          IFS=',' read -ra labels <<< "${COUNT_LABELS}"
          declare -A totals
          for label in "${labels[@]}"; do
            totals["$label"]=0
          done

          # Aggregate counts across orgs. Layout-agnostic per Path A:
          # download-artifact@v8 flattens to /tmp/counts/<file> when only
          # one artifact matches and nests to /tmp/counts/<artifact>/<file>
          # otherwise. `find` walks at any depth; org is recovered from
          # the filename's <org>-counts.txt suffix-strip rather than from
          # the artifact-directory name. See Research/download-artifact-ladder-migration.md.
          per_org_lines=()
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            org=$(basename "$f" | sed 's/-counts\.txt$//')
            IFS=',' read -ra values < "$f"
            line="- \`${org}\`:"
            for i in "${!labels[@]}"; do
              label="${labels[$i]}"
              value="${values[$i]:-0}"
              totals["$label"]=$((totals["$label"] + value))
              line="${line} ${value} ${label}"
              [[ $i -lt $((${#labels[@]} - 1)) ]] && line="${line},"
            done
            per_org_lines+=("$line")
          done < <(find /tmp/counts -type f -name '*-counts.txt' 2>/dev/null)
          per_org_list=$(printf '%s\n' "${per_org_lines[@]}")

          # Concatenate any *-extra.txt files into ${EXTRA}.
          extra=""
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            [[ -s "$f" ]] && extra="${extra}$(cat "$f")"$'\n'
          done < <(find /tmp/counts -type f -name '*-extra.txt' 2>/dev/null)

          # Decide whether anything is non-zero.
          any_nonzero=0
          for label in "${labels[@]}"; do
            if [[ "${totals[$label]}" -gt 0 ]]; then
              any_nonzero=1
              break
            fi
          done
          if [[ "$any_nonzero" -eq 0 ]]; then
            echo "All counts zero across orgs — no tracking issue needed."
            echo "FILE_ISSUE=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "(dry-run; would have opened/updated issue)"
            echo "FILE_ISSUE=false" >> "$GITHUB_ENV"
            exit 0
          fi

          # Build envsubst variable list + export the values.
          export TODAY="$today"
          export PER_ORG_LIST="$per_org_list"
          export EXTRA="$extra"
          envsubst_vars='${TODAY} ${PER_ORG_LIST} ${EXTRA}'
          for label in "${labels[@]}"; do
            upper=$(echo "$label" | tr '[:lower:]' '[:upper:]')
            varname="COUNT_${upper}"
            export "${varname}=${totals[$label]}"
            envsubst_vars="${envsubst_vars} \${${varname}}"
          done

          # Render the body via envsubst, write to file for upsert composite.
          echo "${ISSUE_BODY_TEMPLATE}" | envsubst "${envsubst_vars}" > "${RUNNER_TEMP}/issue-body.md"
          {
            echo "ISSUE_TITLE=${ISSUE_TITLE_PREFIX} ${today}"
            echo "FILE_ISSUE=true"
          } >> "$GITHUB_ENV"

      - name: Upsert tracking issue
        if: env.FILE_ISSUE == 'true'
        uses: swift-institute/.github/.github/actions/upsert-tracking-issue@main
        with:
          repo: swift-institute/.github
          title: ${{ env.ISSUE_TITLE }}
          title-prefix: ${{ inputs.issue-title-prefix }}
          body-file: ${{ runner.temp }}/issue-body.md
          label: ${{ inputs.issue-label }}
          gh-token: ${{ steps.token.outputs.token }}
