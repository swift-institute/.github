# lint-validators-weekly.yml — weekly cross-org orchestrator for the
# per-package-org-sweep validator corpus.
#
# Phase D-2 execution of the 2026-05-14 CI Review arc. Operationalizes
# the four cross-org-consumer-sweep validators by dispatching each over
# the 17-active-org universe on a weekly schedule. Findings surface via
# per-cell $GITHUB_STEP_SUMMARY tables and a single aggregated tracking
# issue at swift-institute/.github (idempotent upsert; close-on-clean).
#
# Provenance:
#   Design doc:  Audits/CI-REVIEW-PHASE-D-DESIGN-2026-05-14.md (sealed by
#                principal adjudication 2026-05-14).
#   Handoff:     HANDOFF-phase-d-2-execution.md (Phase D-2 execution).
#   Structural precedent: .github/workflows/link-check-weekly.yml.
#   Phase D-2.1 fix-forward: see § Phase D-2.1 below.
#
# Validators in scope (manifest's discovery-mode: per-package-org-sweep
# + status: active):
#   - validate-thin-callers      [CI-030], [CI-059], [GH-REPO-074]
#   - validate-file-naming       [API-IMPL-006]
#   - validate-github-metadata   [GH-REPO-METADATA]
#   - validate-package-structure [MOD-PACKAGE-STRUCTURE]
#
# Out of scope: validate-sub-org-wrappers (already self-firing with its
# own hardcoded sub-org matrix; structurally different axis from the
# cross-org-consumer-sweep axis this orchestrator covers).
#
# Cadence: Tuesday 06:00 UTC. Picks an uncongested slot relative to the
# cron-audit-base cohort's Monday 06:00-06:45 cluster, link-check-weekly's
# Monday 06:00, validate-sub-org-wrappers' Monday 05:00, and
# lint-org-bot-coverage-weekly's Sunday 06:30.
#
# Chain depth (per [CI-004b] 4-level workflow_call limit):
#   orchestrator (L1) → validate-X.yml (L2). Depth 2 of 4; headroom 2.
#
# Per [CI-090] standalone workflow (no workflow_call: trigger) →
# top-level permissions: {} deny-all floor + explicit per-job grants.
#
# Token-mint pattern: orchestrator does NOT pre-mint per-org tokens for
# the scan jobs. Each validate-X.yml mints its own per-org-scoped
# swift-institute-bot App-installation token internally (via
# actions/create-github-app-token@v1.12.0). Orchestrator passes
# secrets: inherit per [CI-059]; called workflows use the inherited
# SWIFT_INSTITUTE_BOT_APP_ID + SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY
# secrets. The report job mints its own swift-institute-scoped token
# for issues:write.
#
# Tracking-issue grouping: one issue per orchestrator run, idempotent
# upsert via swift-institute/.github/.github/actions/upsert-tracking-issue
# (matches link-check-weekly.yml + cron-audit-base.yml report-job
# precedent). Per-validator readability via H3 sectioning in body.
# Auto-close when all 4 scan jobs report success across their respective
# 17-org matrix cells (4 × 17 = 68 reusable-workflow invocations total).
#
# dry-run posture: defaults to false (matrix cells fail naturally on
# findings; per-validator scan job result aggregates to 'failure'; report
# job fires when ANY scan job is not 'success'). Matches
# link-check-weekly.yml's `dry-run: ${{ inputs.dry-run || false }}`
# precedent exactly. The design doc's Phase D-2 spec text included a
# `dry-run: true` hardcode, but that posture is structurally
# incompatible with the cited link-check-weekly precedent (it would
# prevent the report job from distinguishing findings-present from
# findings-absent runs without per-cell artifact aggregation, which is
# forbidden under ground rule 7 "MUST NOT modify any per-validator
# workflow file"). The deviation is noted in
# Audits/Outcome-CI-REVIEW-Phase-D-2026-05-14.md.
#
# § Phase D-2.1 (2026-05-14) fix-forward
#
# The initial Phase D-2 commit (cec6778) authored the scan stage as a
# single 2D-matrix job (`matrix: { validator: [...], org: [...] }`) with
# matrix-interpolated `uses: ./.github/workflows/validate-${{ matrix.validator }}.yml`.
# GitHub Actions rejected this at workflow-load time with HTTP 422
# "Unrecognized named-value: 'matrix'" — the `uses:` field is resolved
# BEFORE matrix expansion, so `matrix.*` context is not available in
# `uses:` for reusable-workflow-call jobs at the job level. The
# `inputs.*` and `vars.*` contexts ARE supported in `uses:`; `matrix.*`
# is not.
#
# Phase D-2.1 rewrites the scan stage as 4 SEPARATE scan jobs, each
# with its own 1D matrix over `org` and a STATIC `uses:` reference to
# the corresponding validate-X.yml. Same effective coverage (4 × 17
# = 68 reusable-workflow invocations across the 4 scan jobs); different
# YAML shape. Matches link-check-weekly.yml's exact structural precedent
# (single 1D matrix + static uses) extended to 4 parallel-shaped
# scan jobs (one per validator).

name: lint-validators-weekly

# [CI-090] Standalone workflow → deny-all floor at workflow level;
# per-job permissions blocks below provide the actual grants.
permissions: {}

on:
  schedule:
    - cron: '0 6 * * 2'   # weekly Tuesday 06:00 UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run validators but skip aggregated issue create/update.'
        type: boolean
        required: false
        default: false
      visibility:
        description: 'Filter consumer repos by visibility (public | private | internal | all). Default public per [CI-094] + [CI-095].'
        type: string
        required: false
        default: 'public'

jobs:
  config:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      orgs: ${{ steps.read.outputs.orgs }}
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - id: read
        uses: swift-institute/.github/.github/actions/read-orgs@main
        with:
          # All 17 active orgs (.name); archived orgs auto-excluded by the
          # composite. Repo-level visibility filter is applied inside each
          # validate-X.yml's gh repo list call (default: public).
          filter: '.name'

  # Phase D Wave B (2026-05-15): resolve-targets enumerates (org, repo)
  # pairs across all 17 active orgs for the 6 single-target validators
  # whose org-sweep loops were dropped during Phase B-2's migration to
  # validate-base.yml's single-target mode. Wave B restores cross-org
  # coverage by dispatching each validator per (org, repo) pair from
  # the orchestrator's 2D matrix.
  resolve-targets:
    needs: config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      targets: ${{ steps.gen.outputs.targets }}
      count: ${{ steps.gen.outputs.count }}
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Enumerate (org, repo) pairs across all 17 active orgs
        id: gen
        env:
          GH_TOKEN: ${{ github.token }}
          ORGS_JSON: ${{ needs.config.outputs.orgs }}
          VISIBILITY: ${{ inputs.visibility || 'public' }}
        shell: bash
        run: |
          set -euo pipefail
          targets='[]'
          total=0
          for org in $(echo "$ORGS_JSON" | jq -r '.[]'); do
            # Public API endpoint: GITHUB_TOKEN can list public repos of
            # any org without per-org App-installation tokens. Visibility
            # filter defaults to public per [CI-094] / [CI-095].
            repos=$(gh api "/orgs/${org}/repos?type=${VISIBILITY}&per_page=100" \
              --paginate --jq '[.[] | select(.archived | not) | .full_name]' 2>/dev/null || echo '[]')
            count=$(echo "$repos" | jq 'length')
            if [[ "$count" -gt 0 ]]; then
              targets=$(jq -c -n --argjson a "$targets" --argjson b "$repos" --arg org "$org" \
                '$a + ($b | map({"org": $org, "repo": .}))')
            fi
            total=$((total + count))
            echo "${org}: ${count} repos"
          done
          echo "Total (org, repo) pairs: $total"
          # Matrix limit per strategy is 256. Sanity check before
          # downstream scan-* jobs explode at runtime.
          if [[ "$total" -gt 256 ]]; then
            echo "::error::Total targets ($total) exceeds GitHub Actions matrix limit (256). Wave B needs to split scan jobs by layer or org-group."
            exit 1
          fi
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "count=$total" >> "$GITHUB_OUTPUT"

  # Each scan-* job below: 1D matrix over orgs × static uses: to its
  # respective validate-X.yml. Per [CI-106] caller's per-job grant
  # (contents: read) must be ≥ the called reusable's per-job grant; each
  # validate-X.yml's scan job either declares contents: read explicitly
  # or inherits from caller. Verified by reading each .yml's scan: block.
  #
  # The first 4 scan-* jobs (per-package-org-sweep validators) use 1D
  # matrix.org from config.outputs.orgs (17 legs each). The 6 Wave-B
  # scan-* jobs use 1D matrix.target from resolve-targets.outputs.targets
  # — each target is a {org, repo} object (~120 legs each at present).

  scan-thin-callers:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        org: ${{ fromJSON(needs.config.outputs.orgs) }}
    permissions:
      contents: read
    uses: ./.github/workflows/validate-thin-callers.yml
    with:
      org: ${{ matrix.org }}
      dry-run: ${{ inputs.dry-run || false }}
      visibility: ${{ inputs.visibility || 'public' }}
    secrets: inherit

  scan-file-naming:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        org: ${{ fromJSON(needs.config.outputs.orgs) }}
    permissions:
      contents: read
    uses: ./.github/workflows/validate-file-naming.yml
    with:
      org: ${{ matrix.org }}
      dry-run: ${{ inputs.dry-run || false }}
      visibility: ${{ inputs.visibility || 'public' }}
    secrets: inherit

  scan-github-metadata:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        org: ${{ fromJSON(needs.config.outputs.orgs) }}
    permissions:
      contents: read
    uses: ./.github/workflows/validate-github-metadata.yml
    with:
      org: ${{ matrix.org }}
      dry-run: ${{ inputs.dry-run || false }}
      visibility: ${{ inputs.visibility || 'public' }}
    secrets: inherit

  scan-package-structure:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        org: ${{ fromJSON(needs.config.outputs.orgs) }}
    permissions:
      contents: read
    uses: ./.github/workflows/validate-package-structure.yml
    with:
      org: ${{ matrix.org }}
      dry-run: ${{ inputs.dry-run || false }}
      visibility: ${{ inputs.visibility || 'public' }}
    secrets: inherit

  # Phase D Wave B (2026-05-15): 6 single-target validators dispatched
  # per (org, repo) pair. Each takes `repo:` input (vs. existing 4 which
  # take `org:`). matrix.target is {org, repo} object from
  # resolve-targets.outputs.targets.

  scan-docc-structure:
    needs: resolve-targets
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.resolve-targets.outputs.targets) }}
    permissions:
      contents: read
    uses: ./.github/workflows/validate-docc-structure.yml
    with:
      repo: ${{ matrix.target.repo }}
      dry-run: ${{ inputs.dry-run || false }}
    secrets: inherit

  scan-package-shape:
    needs: resolve-targets
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.resolve-targets.outputs.targets) }}
    permissions:
      contents: read
    uses: ./.github/workflows/validate-package-shape.yml
    with:
      repo: ${{ matrix.target.repo }}
      dry-run: ${{ inputs.dry-run || false }}
    secrets: inherit

  scan-platform-architecture:
    needs: resolve-targets
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.resolve-targets.outputs.targets) }}
    permissions:
      contents: read
    uses: ./.github/workflows/validate-platform-architecture.yml
    with:
      repo: ${{ matrix.target.repo }}
      dry-run: ${{ inputs.dry-run || false }}
    secrets: inherit

  scan-readme:
    needs: resolve-targets
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.resolve-targets.outputs.targets) }}
    permissions:
      contents: read
    uses: ./.github/workflows/validate-readme.yml
    with:
      repo: ${{ matrix.target.repo }}
      dry-run: ${{ inputs.dry-run || false }}
    secrets: inherit

  scan-diagnostic-format:
    needs: resolve-targets
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.resolve-targets.outputs.targets) }}
    permissions:
      contents: read
    uses: ./.github/workflows/validate-diagnostic-format.yml
    with:
      repo: ${{ matrix.target.repo }}
      dry-run: ${{ inputs.dry-run || false }}
    secrets: inherit

  scan-layer-deps:
    needs: resolve-targets
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.resolve-targets.outputs.targets) }}
    permissions:
      contents: read
    uses: ./.github/workflows/validate-layer-deps.yml
    with:
      repo: ${{ matrix.target.repo }}
      dry-run: ${{ inputs.dry-run || false }}
    secrets: inherit

  report:
    needs:
      - scan-thin-callers
      - scan-file-naming
      - scan-github-metadata
      - scan-package-structure
      - scan-docc-structure
      - scan-package-shape
      - scan-platform-architecture
      - scan-readme
      - scan-diagnostic-format
      - scan-layer-deps
    if: always() && (needs.scan-thin-callers.result != 'skipped' || needs.scan-file-naming.result != 'skipped' || needs.scan-github-metadata.result != 'skipped' || needs.scan-package-structure.result != 'skipped' || needs.scan-docc-structure.result != 'skipped' || needs.scan-package-shape.result != 'skipped' || needs.scan-platform-architecture.result != 'skipped' || needs.scan-readme.result != 'skipped' || needs.scan-diagnostic-format.result != 'skipped' || needs.scan-layer-deps.result != 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Mint installation token (issues:write at swift-institute/.github)
        id: token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: swift-institute
          repositories: .github
          permission-issues: write

      - name: Build issue body
        env:
          RESULT_THIN_CALLERS: ${{ needs.scan-thin-callers.result }}
          RESULT_FILE_NAMING: ${{ needs.scan-file-naming.result }}
          RESULT_GITHUB_METADATA: ${{ needs.scan-github-metadata.result }}
          RESULT_PACKAGE_STRUCTURE: ${{ needs.scan-package-structure.result }}
          RESULT_DOCC_STRUCTURE: ${{ needs.scan-docc-structure.result }}
          RESULT_PACKAGE_SHAPE: ${{ needs.scan-package-shape.result }}
          RESULT_PLATFORM_ARCHITECTURE: ${{ needs.scan-platform-architecture.result }}
          RESULT_README: ${{ needs.scan-readme.result }}
          RESULT_DIAGNOSTIC_FORMAT: ${{ needs.scan-diagnostic-format.result }}
          RESULT_LAYER_DEPS: ${{ needs.scan-layer-deps.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          today=$(date -u '+%Y-%m-%d')

          # Aggregate per-validator scan job results. "Clean" = every scan
          # job result is 'success' or 'skipped'. Anything else (failure,
          # cancelled) ⇒ findings or validator error ⇒ file/update tracking issue.
          ALL_CLEAN=true
          for r in "$RESULT_THIN_CALLERS" "$RESULT_FILE_NAMING" "$RESULT_GITHUB_METADATA" "$RESULT_PACKAGE_STRUCTURE" \
                   "$RESULT_DOCC_STRUCTURE" "$RESULT_PACKAGE_SHAPE" "$RESULT_PLATFORM_ARCHITECTURE" \
                   "$RESULT_README" "$RESULT_DIAGNOSTIC_FORMAT" "$RESULT_LAYER_DEPS"; do
            case "$r" in
              success|skipped) ;;
              *) ALL_CLEAN=false ;;
            esac
          done

          if [[ "$ALL_CLEAN" == "true" ]]; then
            echo "All 10 scan jobs converged cleanly (success/skipped) — no tracking issue needed."
            echo "FILE_ISSUE=false" >> "$GITHUB_ENV"
            echo "CLEAN_RUN=true" >> "$GITHUB_ENV"
            exit 0
          fi

          cat > "${RUNNER_TEMP}/issue-body.md" <<EOF
          # Validators weekly sweep — ${today}

          See the [run summary](${RUN_URL}) for the per-cell breakdown; each
          matrix cell's step summary contains the per-org per-rule findings table.

          ## Per-validator coverage (cross-org per-package-org-sweep)

          ### validate-thin-callers ([CI-030] / [CI-059] / [GH-REPO-074])
          Job status: \`${RESULT_THIN_CALLERS}\`. Per-org breakdown in run summary;
          per-cell step summaries name the specific consumer repos with violations.

          ### validate-file-naming ([API-IMPL-006])
          Job status: \`${RESULT_FILE_NAMING}\`. Per-org breakdown in run summary.

          ### validate-github-metadata ([GH-REPO-METADATA])
          Job status: \`${RESULT_GITHUB_METADATA}\`. Per-org breakdown in run summary.

          ### validate-package-structure ([MOD-PACKAGE-STRUCTURE])
          Job status: \`${RESULT_PACKAGE_STRUCTURE}\`. Per-org breakdown in run summary.

          ## Per-validator coverage (cross-org single-target, Phase D Wave B)

          ### validate-docc-structure ([DOC-*])
          Job status: \`${RESULT_DOCC_STRUCTURE}\`. Per-(org, repo) breakdown in run summary.

          ### validate-package-shape ([PATTERN-*])
          Job status: \`${RESULT_PACKAGE_SHAPE}\`. Per-(org, repo) breakdown in run summary.

          ### validate-platform-architecture ([PLAT-ARCH-*])
          Job status: \`${RESULT_PLATFORM_ARCHITECTURE}\`. Per-(org, repo) breakdown in run summary.

          ### validate-readme ([README-*])
          Job status: \`${RESULT_README}\`. Per-(org, repo) breakdown in run summary.

          ### validate-diagnostic-format ([API-NAME-009])
          Job status: \`${RESULT_DIAGNOSTIC_FORMAT}\`. Per-(org, repo) breakdown in run summary.

          ### validate-layer-deps ([PLAT-ARCH-008])
          Job status: \`${RESULT_LAYER_DEPS}\`. Per-(org, repo) breakdown in run summary.

          ## What this means

          One or more of the ~788 matrix cells (4 cross-org validators × 17 orgs
          + 6 single-target validators × ~120 (org, repo) pairs) reported
          violations or a validator error. Drill into the failed cells via the
          run summary linked above.

          ## What to do

          - Review the per-cell step summaries for specific violations.
          - For each finding, either fix the consumer repo to conform or amend
            the rule via /promote-rule.
          - This issue is updated in place by the next weekly run; auto-closed
            when all 10 validators report 0 violations across their respective coverage.

          *Idempotent: this issue is updated in place.*
          EOF

          {
            echo "ISSUE_TITLE=Validators weekly sweep ${today}"
            echo "FILE_ISSUE=true"
            echo "CLEAN_RUN=false"
          } >> "$GITHUB_ENV"

      - name: Upsert tracking issue
        if: ${{ env.FILE_ISSUE == 'true' && inputs.dry-run != true }}
        uses: swift-institute/.github/.github/actions/upsert-tracking-issue@main
        with:
          repo: swift-institute/.github
          title: ${{ env.ISSUE_TITLE }}
          title-prefix: 'Validators weekly sweep'
          body-file: ${{ runner.temp }}/issue-body.md
          label: 'lint-validators'
          gh-token: ${{ steps.token.outputs.token }}

      - name: Close tracking issue when clean
        if: ${{ env.CLEAN_RUN == 'true' && inputs.dry-run != true }}
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          existing=$(gh issue list \
            --repo swift-institute/.github \
            --state open \
            --label lint-validators \
            --json number \
            --jq '.[].number' || echo "")
          for n in $existing; do
            gh issue close "$n" \
              --repo swift-institute/.github \
              --comment "All 10 validators clean as of ${{ github.run_id }}; auto-closing."
          done
