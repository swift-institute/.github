# sync-metadata.yml — propagate .github/metadata.yaml to GitHub state.
#
# Reusable workflow. Reads each in-scope repo's .github/metadata.yaml, diffs
# against current GitHub state, and applies divergent fields via `gh repo edit`.
#
# Provenance: Skills/github-repository [GH-REPO-070]; Research/github-metadata-
# harmonization.md § 4.2.
#
# Inputs:
#   repo:     "owner/name" form. When set, scope to one repo.
#   org:      org name. When set, scope to one org. Ignored if `repo` set.
#   dry-run:  when true, print proposed edits without applying.
# (When both repo and org are unset, sweeps all 17 ecosystem orgs.)
#
# Authentication: swift-institute-bot GitHub App (per Skills/github-repository
# [GH-REPO-073]). App secrets SWIFT_INSTITUTE_BOT_APP_CLIENT_ID + SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY at
# org level on swift-institute/.github.

name: sync-metadata

on:
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of a single repo to sync.'
        type: string
        required: false
        default: ''
      org:
        description: 'Org to sweep (ignored if repo is set).'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Print proposed edits without applying.'
        type: boolean
        required: false
        default: false
    outputs:
      edits-applied:
        description: 'Number of fields actually edited (0 in dry-run).'
        value: ${{ jobs.sync.outputs.edits-applied }}
      diffs-found:
        description: 'Number of fields divergent (whether or not applied).'
        value: ${{ jobs.sync.outputs.diffs-found }}

  workflow_dispatch:
    inputs:
      repo:
        description: 'Owner/name of a single repo to sync (optional).'
        type: string
        required: false
      org:
        description: 'Org to sweep (optional; ignored if repo is set).'
        type: string
        required: false
      dry-run:
        description: 'Print proposed edits without applying.'
        type: boolean
        required: false
        default: false

jobs:
  sync:
    if: ${{ !github.event.repository.private }}     # [CI-032]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      edits-applied: ${{ steps.sync.outputs.edits-applied }}
      diffs-found: ${{ steps.sync.outputs.diffs-found }}
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Validate inputs
        env:
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_ORG: ${{ inputs.org }}
        run: |
          if [[ -z "$INPUT_REPO" && -z "$INPUT_ORG" ]]; then
            echo "::error::Either 'repo' (owner/name) or 'org' input is required."
            echo "::error::For cross-org sweeps, use sync-metadata-nightly.yml which calls this workflow per-org via matrix."
            exit 1
          fi

      - name: Compute auth scope
        id: scope
        env:
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_ORG: ${{ inputs.org }}
        run: |
          if [[ -n "$INPUT_REPO" ]]; then
            owner="${INPUT_REPO%/*}"
            name="${INPUT_REPO#*/}"
            echo "owner=${owner}" >> "$GITHUB_OUTPUT"
            echo "repositories=${name}" >> "$GITHUB_OUTPUT"
          else
            echo "owner=${INPUT_ORG}" >> "$GITHUB_OUTPUT"
            # Empty repositories means: token covers all repos in the org installation.
            echo "repositories=" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ steps.scope.outputs.owner }}
          repositories: ${{ steps.scope.outputs.repositories }}

      - name: Enumerate org repos
        if: ${{ inputs.repo == '' }}
        id: enum
        uses: swift-institute/.github/.github/actions/enumerate-org-public-repos@main
        with:
          org: ${{ inputs.org }}
          visibility: 'public'
          gh-token: ${{ steps.token.outputs.token }}

      - name: Sync metadata
        id: sync
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          DRY_RUN: ${{ inputs.dry-run }}
          SINGLE_REPO: ${{ inputs.repo }}
          ENUM_REPOS: ${{ steps.enum.outputs.repos }}
        run: |
          set -euo pipefail

          edits_applied=0
          diffs_found=0
          summary_lines=()

          # Build target list — single-repo mode bypasses enumeration; org-mode
          # reads from the enumerate-org-public-repos composite output.
          if [[ -n "$SINGLE_REPO" ]]; then
            targets=("$SINGLE_REPO")
          else
            targets=()
            while IFS= read -r line; do
              [[ -n "$line" ]] && targets+=("$line")
            done <<< "$ENUM_REPOS"
          fi

          echo "Targets: ${#targets[@]} repos"

          # Per-repo sync -------------------------------------------------------
          for target in "${targets[@]}"; do
            # 1. Read .github/metadata.yaml from the target's main branch.
            yaml_content=$(gh api "repos/${target}/contents/.github/metadata.yaml" \
              --jq '.content' 2>/dev/null | base64 -d 2>/dev/null) || {
              echo "  ${target}: skipped (no .github/metadata.yaml)"
              continue
            }

            # 2. Parse YAML; bail loud on malformed.
            desired=$(echo "$yaml_content" | yq -o=json) || {
              echo "  ${target}: ERROR — malformed metadata.yaml"
              exit 1
            }

            desired_desc=$(echo "$desired" | jq -r '.description // ""')
            desired_homepage=$(echo "$desired" | jq -r '.homepage // ""')
            desired_topics=$(echo "$desired" | jq -r '.topics // [] | .[]' | sort -u)
            desired_issues=$(echo "$desired" | jq -r '.settings.hasIssuesEnabled // true')
            desired_disc=$(echo "$desired" | jq -r '.settings.hasDiscussionsEnabled // false')
            desired_wiki=$(echo "$desired" | jq -r '.settings.hasWikiEnabled // false')
            desired_projects=$(echo "$desired" | jq -r '.settings.hasProjectsEnabled // false')
            desired_branch=$(echo "$desired" | jq -r '.settings.defaultBranch // "main"')

            # 3. Read current GitHub state.
            current=$(gh repo view "$target" \
              --json description,repositoryTopics,homepageUrl,hasIssuesEnabled,hasDiscussionsEnabled,hasWikiEnabled,hasProjectsEnabled,defaultBranchRef,mergeCommitAllowed,squashMergeAllowed,rebaseMergeAllowed,deleteBranchOnMerge,visibility)

            current_desc=$(echo "$current" | jq -r '.description // ""')
            current_homepage=$(echo "$current" | jq -r '.homepageUrl // ""')
            current_topics=$(echo "$current" | jq -r '.repositoryTopics // [] | .[].name' | sort -u)
            current_issues=$(echo "$current" | jq -r '.hasIssuesEnabled')
            current_disc=$(echo "$current" | jq -r '.hasDiscussionsEnabled')
            current_wiki=$(echo "$current" | jq -r '.hasWikiEnabled')
            current_projects=$(echo "$current" | jq -r '.hasProjectsEnabled')
            current_branch=$(echo "$current" | jq -r '.defaultBranchRef.name // "main"')

            # 4. Compute diffs.
            edit_args=()
            repo_diffs=0

            if [[ "$desired_desc" != "$current_desc" ]]; then
              edit_args+=(--description "$desired_desc")
              repo_diffs=$((repo_diffs+1))
            fi
            if [[ "$desired_homepage" != "$current_homepage" ]]; then
              edit_args+=(--homepage "$desired_homepage")
              repo_diffs=$((repo_diffs+1))
            fi

            # Topic set-diff: add (desired ∖ current); remove (current ∖ desired).
            to_add=$(comm -23 <(echo "$desired_topics") <(echo "$current_topics") || true)
            to_remove=$(comm -13 <(echo "$desired_topics") <(echo "$current_topics") || true)
            while IFS= read -r t; do
              [[ -z "$t" ]] && continue
              edit_args+=(--add-topic "$t")
              repo_diffs=$((repo_diffs+1))
            done <<< "$to_add"
            while IFS= read -r t; do
              [[ -z "$t" ]] && continue
              edit_args+=(--remove-topic "$t")
              repo_diffs=$((repo_diffs+1))
            done <<< "$to_remove"

            # Settings diff. gh repo edit flag names are --enable-{feature}={bool}.
            if [[ "$desired_issues" != "$current_issues" ]]; then
              edit_args+=(--enable-issues="$desired_issues")
              repo_diffs=$((repo_diffs+1))
            fi
            if [[ "$desired_disc" != "$current_disc" ]]; then
              edit_args+=(--enable-discussions="$desired_disc")
              repo_diffs=$((repo_diffs+1))
            fi
            if [[ "$desired_wiki" != "$current_wiki" ]]; then
              edit_args+=(--enable-wiki="$desired_wiki")
              repo_diffs=$((repo_diffs+1))
            fi
            if [[ "$desired_projects" != "$current_projects" ]]; then
              edit_args+=(--enable-projects="$desired_projects")
              repo_diffs=$((repo_diffs+1))
            fi
            if [[ "$desired_branch" != "$current_branch" ]]; then
              edit_args+=(--default-branch "$desired_branch")
              repo_diffs=$((repo_diffs+1))
            fi

            # Merge-method + branch-cleanup settings per [GH-REPO-056].
            # gh repo edit exposes no flag for the merge-method allows, so
            # these apply via `gh api PATCH` (delete_branch_on_merge folded in).
            desired_mc=$(echo "$desired" | jq -r '.settings.allowMergeCommit // false')
            desired_sq=$(echo "$desired" | jq -r '.settings.allowSquashMerge // true')
            desired_rb=$(echo "$desired" | jq -r '.settings.allowRebaseMerge // false')
            desired_del=$(echo "$desired" | jq -r '.settings.deleteBranchOnMerge // true')
            current_mc=$(echo "$current" | jq -r '.mergeCommitAllowed')
            current_sq=$(echo "$current" | jq -r '.squashMergeAllowed')
            current_rb=$(echo "$current" | jq -r '.rebaseMergeAllowed')
            current_del=$(echo "$current" | jq -r '.deleteBranchOnMerge')
            merge_args=()
            [[ "$desired_mc"  != "$current_mc"  ]] && merge_args+=(-F "allow_merge_commit=$desired_mc")
            [[ "$desired_sq"  != "$current_sq"  ]] && merge_args+=(-F "allow_squash_merge=$desired_sq")
            [[ "$desired_rb"  != "$current_rb"  ]] && merge_args+=(-F "allow_rebase_merge=$desired_rb")
            [[ "$desired_del" != "$current_del" ]] && merge_args+=(-F "delete_branch_on_merge=$desired_del")
            repo_diffs=$((repo_diffs + ${#merge_args[@]}))

            # Secret scanning + push protection per [GH-REPO-057] (PUBLIC only;
            # private repos need GHAS and the PATCH would error). gh repo view
            # exposes no security surface, so current state is a dedicated call.
            sec_args=()
            desired_ss=false; desired_pp=false
            if [[ "$(echo "$current" | jq -r '.visibility')" == "PUBLIC" ]]; then
              desired_ss=$(echo "$desired" | jq -r '.settings.secretScanning // true')
              desired_pp=$(echo "$desired" | jq -r '.settings.secretScanningPushProtection // true')
              sec=$(gh api "repos/$target" --jq '{ss:(.security_and_analysis.secret_scanning.status // "disabled"), pp:(.security_and_analysis.secret_scanning_push_protection.status // "disabled")}')
              current_ss=$([[ "$(echo "$sec" | jq -r .ss)" == "enabled" ]] && echo true || echo false)
              current_pp=$([[ "$(echo "$sec" | jq -r .pp)" == "enabled" ]] && echo true || echo false)
              [[ "$desired_ss" != "$current_ss" ]] && sec_args+=(secret_scanning)
              [[ "$desired_pp" != "$current_pp" ]] && sec_args+=(secret_scanning_push_protection)
              repo_diffs=$((repo_diffs + ${#sec_args[@]}))
            fi

            diffs_found=$((diffs_found + repo_diffs))

            # 5. Apply (or print).
            if [[ $repo_diffs -eq 0 ]]; then
              echo "  ${target}: converged"
              continue
            fi

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "  ${target}: ${repo_diffs} diff(s) — would run:"
              if [[ ${#edit_args[@]} -gt 0 ]]; then
                printf '    gh repo edit %q' "$target"
                for a in "${edit_args[@]}"; do printf ' %q' "$a"; done
                printf '\n'
              fi
              if [[ ${#merge_args[@]} -gt 0 ]]; then
                printf '    gh api -X PATCH %q' "repos/$target"
                for a in "${merge_args[@]}"; do printf ' %q' "$a"; done
                printf '\n'
              fi
              if [[ ${#sec_args[@]} -gt 0 ]]; then
                printf '    gh api -X PATCH %q  # security_and_analysis: secret_scanning=%s push_protection=%s\n' "repos/$target" "$desired_ss" "$desired_pp"
              fi
              summary_lines+=("- \`${target}\`: ${repo_diffs} field(s) — dry-run preview")
            else
              echo "  ${target}: ${repo_diffs} diff(s) — applying"
              [[ ${#edit_args[@]} -gt 0 ]] && gh repo edit "$target" "${edit_args[@]}"
              [[ ${#merge_args[@]} -gt 0 ]] && gh api -X PATCH "repos/$target" "${merge_args[@]}" >/dev/null
              if [[ ${#sec_args[@]} -gt 0 ]]; then
                ss_status=$([[ "$desired_ss" == true ]] && echo enabled || echo disabled)
                pp_status=$([[ "$desired_pp" == true ]] && echo enabled || echo disabled)
                jq -nc --arg ss "$ss_status" --arg pp "$pp_status" \
                  '{security_and_analysis:{secret_scanning:{status:$ss},secret_scanning_push_protection:{status:$pp}}}' \
                  | gh api -X PATCH "repos/$target" --input - >/dev/null
              fi
              edits_applied=$((edits_applied + repo_diffs))
              summary_lines+=("- \`${target}\`: ${repo_diffs} field(s) applied")
            fi
          done

          echo "edits-applied=${edits_applied}" >> "$GITHUB_OUTPUT"
          echo "diffs-found=${diffs_found}" >> "$GITHUB_OUTPUT"

          {
            echo "## sync-metadata summary"
            echo ""
            echo "- targets: ${#targets[@]}"
            echo "- diffs found: ${diffs_found}"
            echo "- edits applied: ${edits_applied} (dry-run: ${DRY_RUN})"
            echo ""
            for line in "${summary_lines[@]}"; do echo "$line"; done
          } >> "$GITHUB_STEP_SUMMARY"
