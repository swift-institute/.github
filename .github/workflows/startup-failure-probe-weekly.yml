# startup-failure-probe-weekly.yml — weekly cross-org startup_failure probe.
#
# A `startup_failure` conclusion means a workflow never started (bad YAML, a
# missing reusable, a `workflow_call` permissions/chain mismatch per
# [CI-105]/[CI-106], a `permissions: {}` on a reusable per [CI-097]). It is
# invisible to every per-job gate because NO job runs: `startup_failure` is
# GitHub's own conclusion for such a zero-job abort (an empty `jobs` array, no
# fetchable logs), and that conclusion is the single signal this probe checks —
# so a broken CI-definition change to the shared reusables can lurk until the
# next scheduled firing. This probe queries the last 8 days of Actions runs
# (date-bounded and paginated) for the four shared `.github` repos every Monday
# and goes RED if any concluded `startup_failure`.
#
# Centralized per [CI-108] (the three tests are all NO — not run against a PR
# diff, does not commit back to a branch, does not gate a merge → centralize):
# it runs in swift-institute/.github (public → free minutes) and reads each
# target's runs via a per-org swift-institute-bot installation token, mirroring
# the cross-org token-mint pattern of cron-audit-base.yml / link-check-weekly.yml.
#
# Detection is a testable pure function in .github/scripts/detect-startup-
# failures.py; .github/scripts/tests/test-detect-startup-failures.py proves it
# flags synthetic startup_failure data (non-zero exit) and passes on clean data.
#
# [CI-104] canary: this is a schedule-only workflow — after any change, exercise
# it with `gh workflow run startup-failure-probe-weekly.yml --repo
# swift-institute/.github --ref main`; the consumer-CI canary does not reach it.

name: startup-failure-probe-weekly

# [CI-090] Standalone workflow (schedule + workflow_dispatch, no workflow_call)
# MUST declare a top-level permissions floor. Deny-all here; the probe job below
# grants exactly the `contents: read` its steps need (cross-org actions:read
# comes from the minted App token, not the ambient GITHUB_TOKEN).
permissions: {}

on:
  schedule:
    - cron: '55 6 * * 1'   # weekly Monday 06:55 UTC (offset from the 06:00–06:50 cron family)
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false   # check every shared repo even when one is already red
      matrix:
        include:
          - org: swift-institute
            repo: swift-institute/.github
          - org: swift-primitives
            repo: swift-primitives/.github
          - org: swift-standards
            repo: swift-standards/.github
          - org: swift-foundations
            repo: swift-foundations/.github
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout swift-institute/.github (detection script)
        uses: actions/checkout@v7

      - name: Mint installation token (swift-institute-bot)
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ matrix.org }}
          repositories: .github
          permission-actions: read

      - name: Query recent runs and detect startup_failure
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          TARGET: ${{ matrix.repo }}
        run: |
          set -euo pipefail
          # Date-bounded, paginated window: every run created in the last 8 days
          # (weekly cadence + 1 day margin) across all workflows in the target
          # repo. A single 100-run page covered only ~1.67 days on the busiest
          # repo (~60 runs/day) — a startup_failure older than ~40h was never
          # seen. `--paginate` walks every page; `--slurp` wraps the per-page
          # objects into one array (raw --paginate concatenates bare JSON
          # objects, which json.loads cannot parse); jq then merges the pages'
          # workflow_runs back into the single {workflow_runs:[...]} object the
          # detector already accepts. `created=>=` is GitHub's list-runs date
          # filter; runner is ubuntu-latest so GNU `date -d` is available.
          SINCE="$(date -u -d '8 days ago' +%Y-%m-%d)"
          gh api --paginate --slurp \
            "/repos/${TARGET}/actions/runs?per_page=100&created=>=${SINCE}" \
            | jq '{workflow_runs: (map(.workflow_runs) | add)}' > /tmp/runs.json
          # Exits 1 (RED) if any run concluded startup_failure; 0 if clean.
          python3 .github/scripts/detect-startup-failures.py /tmp/runs.json
