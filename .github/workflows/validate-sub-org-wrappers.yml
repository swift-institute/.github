# validate-sub-org-wrappers.yml — verify [CI-004b] sub-org wrapper absence.
#
# Pilot 28 of `/promote-rule` (2026-05-14).

name: validate-sub-org-wrappers

on:
  schedule:
    - cron: '0 5 * * 1'   # Mondays 05:00 UTC (before other weekly orchestrators)
  workflow_call:
    inputs:
      repo:
        type: string
        required: false
        default: ''
      dry-run:
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        value: ${{ jobs.scan.outputs.total-violations }}
  workflow_dispatch:
    inputs:
      repo:
        type: string
        required: false
      dry-run:
        type: boolean
        required: false
        default: false

# Top-level `permissions:` OMITTED per [CI-090] — this is a combined
# (workflow_call + schedule + workflow_dispatch) workflow, treated as
# reusable. Per-job `permissions:` below provides the per-job floor.
# The schedule path inherits the same per-job grant.

jobs:
  scan:
    if: ${{ !github.event.repository.private }}     # [CI-032]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      total-violations: ${{ steps.aggregate.outputs.total-violations }}
    strategy:
      fail-fast: false
      matrix:
        sub-org:
          - swift-ietf
          - swift-iso
          - swift-w3c
          - swift-whatwg
          - swift-ecma
          - swift-incits
          - swift-ieee
          - swift-iec
          - swift-arm-ltd
          - swift-intel
          - swift-riscv
          - swift-linux-foundation
          - swift-microsoft
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Mint installation token
        id: mint-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ matrix.sub-org }}

      - name: Checkout swift-institute/.github (validator)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: swift-institute/.github
          path: institute-github
          ref: main

      - name: Run validation against ${{ matrix.sub-org }}/.github
        env:
          GH_TOKEN: ${{ steps.mint-token.outputs.token }}
          VALIDATOR: ${{ github.workspace }}/institute-github/.github/scripts/validate-sub-org-wrappers.py
          TARGET_ORG: ${{ matrix.sub-org }}
        run: |
          set -euo pipefail
          : > /tmp/findings-${TARGET_ORG}.tsv
          workdir=$(mktemp -d)
          (
            cd "$workdir"
            if ! gh repo clone "${TARGET_ORG}/.github" . -- --depth 1 --quiet 2>/dev/null; then
              # sub-org .github repo doesn't exist — that's GOOD (no wrapper to fire on)
              exit 0
            fi
            python3 "$VALIDATOR" "${TARGET_ORG}/.github" "$workdir" >> "/tmp/findings-${TARGET_ORG}.tsv" || true
          )
          rm -rf "$workdir"

      - name: Aggregate
        id: aggregate
        run: |
          set -euo pipefail
          violations=$(cat /tmp/findings-*.tsv 2>/dev/null | grep -cE "	CI-004b") || violations=0
          echo "total-violations=$violations" >> "$GITHUB_OUTPUT"
          {
            echo "## validate-sub-org-wrappers findings"
            echo "Total: $violations"
            if [ "$violations" -gt 0 ]; then
              echo
              echo "| Repo | Rule | Message |"
              echo "|---|---|---|"
              cat /tmp/findings-*.tsv 2>/dev/null | awk -F'\t' '$2 ~ /^CI-004b/{ gsub(/\|/, "\\|", $3); printf("| `%s` | `%s` | %s |\n", $1, $2, $3) }'
            fi
          } > "$GITHUB_STEP_SUMMARY"
          if [ "$violations" -gt 0 ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            exit 1
          fi
