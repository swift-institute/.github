# validate-input-defaults.yml — verify [CI-058] reusable-workflow input defaults.
#
# Pilot 24 of `/promote-rule` (2026-05-14). Migrated to thin caller of
# validate-base.yml in Phase B-2 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14.
#
# Note: manifest currently records discovery-mode: single-target, but the
# validator iterates every workflow file in the target repo; using
# wrapper-host-multi-file to match actual behavior. Manifest correction
# queued for the Phase B-2 final report.

name: validate-input-defaults

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**.yml'
      - '.github/scripts/validate-input-defaults.py'
      - '.github/workflows/validate-input-defaults.yml'
  pull_request:
    paths:
      - '.github/workflows/**.yml'
      - '.github/scripts/validate-input-defaults.py'
      - '.github/workflows/validate-input-defaults.yml'
  workflow_call:
    inputs:
      repo:
        type: string
        required: false
        default: ''
      dry-run:
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        value: ${{ jobs.scan.outputs.total-violations }}
  workflow_dispatch:
    inputs:
      repo:
        type: string
        required: false
      dry-run:
        type: boolean
        required: false
        default: false

jobs:
  scan:
    uses: ./.github/workflows/validate-base.yml
    with:
      validator-script: .github/scripts/validate-input-defaults.py
      rule-id-regex: '^CI-058'
      discovery-mode: wrapper-host-multi-file
      target-repo: ${{ inputs.repo }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
