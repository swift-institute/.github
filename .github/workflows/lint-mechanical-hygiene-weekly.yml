# lint-mechanical-hygiene-weekly.yml — scheduled cross-org mechanical
# hygiene sweep (γ-2 consolidated).
#
# Runs yamllint + broken-symlink scans against every public, non-archived
# repo in each in-scope org via a matrix strategy at 06:45 UTC every Monday
# (offset from spine 06:30 + foundation 06:35 + license 06:40 + readme-
# presence 06:00). Per research §3.4.5: γ-2 uses a CONSOLIDATED weekly
# tracking issue covering both YAML and broken-symlink findings (small
# mechanical checks; consolidating reduces notification surface).
#
# Pilot scope: ALL ecosystem orgs (these are universal mechanical checks,
# not L1-specific like Foundation-import). Begins narrow with swift-primitives
# + swift-institute and widens as needed.
#
# yamllint scope per §3.4.5:
#   .github/workflows/**/*.{yml,yaml}
#   .github/dependabot.yml
#   .github/metadata.yaml
#   metadata.yaml
# Excludes: .swiftlint.yml, .swift-format (per-package autonomy [CI-057]).
#
# Broken-symlink scope: anywhere in repo (find -L . -type l ! -exec test -e ...).
#
# Provenance: research §3.4.5, [README-167] tracking-issue pattern.

name: lint-mechanical-hygiene-weekly

on:
  schedule:
    - cron: '45 6 * * 1'   # weekly Monday 06:45 UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run scans but skip aggregated issue create/update.'
        type: boolean
        required: false
        default: false

jobs:
  sweep:
    strategy:
      fail-fast: false
      matrix:
        org:
          - swift-primitives
          - swift-institute
          # Expansion: swift-standards, swift-foundations, etc. as needed.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ matrix.org }}
          repositories: ''

      - name: Install yamllint
        shell: bash
        run: |
          set -euo pipefail
          pip install --quiet yamllint

      - name: Write yamllint config
        shell: bash
        run: |
          cat > /tmp/yamllint.yml <<'YAMLLINT_EOF'
          extends: default
          rules:
            document-start: disable
            line-length:
              max: 200
              level: warning
            truthy:
              allowed-values: ["true", "false"]
              check-keys: false
            indentation:
              spaces: 2
            comments:
              require-starting-space: false
          YAMLLINT_EOF

      - name: Sweep org
        shell: bash
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ORG: ${{ matrix.org }}
        run: |
          set -euo pipefail
          mapfile -t targets < <(gh repo list "$ORG" --limit 2000 \
            --visibility public \
            --json nameWithOwner,isArchived \
            --jq '.[] | select(.isArchived==false) | .nameWithOwner')
          total_yaml_issues=0
          total_broken_links=0
          per_pkg=()
          for target in "${targets[@]}"; do
            workdir=$(mktemp -d)
            git clone --depth 1 --quiet \
              "https://x-access-token:${GH_TOKEN}@github.com/${target}.git" \
              "$workdir" 2>/dev/null || { rm -rf "$workdir"; continue; }
            (
              cd "$workdir"
              # yamllint scan
              paths=()
              [[ -d .github/workflows ]] && paths+=(".github/workflows")
              [[ -f .github/dependabot.yml ]] && paths+=(".github/dependabot.yml")
              [[ -f .github/metadata.yaml ]] && paths+=(".github/metadata.yaml")
              [[ -f metadata.yaml ]] && paths+=("metadata.yaml")
              yaml_issues=0
              if (( ${#paths[@]} > 0 )); then
                # Count yamllint issues; non-zero exit = issues found
                yaml_issues=$(yamllint -c /tmp/yamllint.yml "${paths[@]}" 2>&1 | grep -cE '^\s+[0-9]+:[0-9]+' || true)
              fi
              # Broken-symlink scan
              broken_links=$(find -L . -type l ! -exec test -e {} \; -print 2>/dev/null | wc -l)
              echo "${yaml_issues} ${broken_links}"
            ) > "/tmp/${target//\//__}.txt"
            read -r yi bl < "/tmp/${target//\//__}.txt"
            total_yaml_issues=$((total_yaml_issues + yi))
            total_broken_links=$((total_broken_links + bl))
            if [[ "$yi" -gt 0 || "$bl" -gt 0 ]]; then
              pkg_name=$(basename "$target")
              per_pkg+=("- \`${pkg_name}\`: yaml=${yi}, symlinks=${bl}")
            fi
            rm -rf "$workdir"
          done
          {
            echo "## Org $ORG — mechanical hygiene sweep (γ-2 consolidated)"
            echo "- yamllint issues:   $total_yaml_issues"
            echo "- Broken symlinks:   $total_broken_links"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "${total_yaml_issues},${total_broken_links}" > "/tmp/${ORG}-counts.txt"
          printf '%s\n' "${per_pkg[@]}" > "/tmp/${ORG}-pkgs.txt" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: hygiene-counts-${{ matrix.org }}
          path: |
            /tmp/${{ matrix.org }}-counts.txt
            /tmp/${{ matrix.org }}-pkgs.txt

  report:
    needs: sweep
    runs-on: ubuntu-latest
    if: always() && needs.sweep.result != 'skipped'
    steps:
      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          owner: swift-institute
          repositories: .github
          permission-issues: write

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/counts

      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          DRY_RUN: ${{ inputs.dry-run || false }}
        shell: bash
        run: |
          set -euo pipefail
          today=$(date -u '+%Y-%m-%d')
          total_yaml=0
          total_links=0
          per_org=()
          all_pkgs=""
          for f in /tmp/counts/*/*-counts.txt; do
            org=$(basename "$(dirname "$f")" | sed 's/^hygiene-counts-//')
            IFS=',' read -r y l < "$f"
            total_yaml=$((total_yaml + y))
            total_links=$((total_links + l))
            per_org+=("- \`${org}\`: yaml=${y}, symlinks=${l}")
          done
          for f in /tmp/counts/*/*-pkgs.txt; do
            [[ -s "$f" ]] && all_pkgs="${all_pkgs}$(cat "$f")"$'\n'
          done
          if [[ "$total_yaml" -eq 0 && "$total_links" -eq 0 ]]; then
            echo "Mechanical hygiene clean across all orgs — no tracking issue needed."
            exit 0
          fi
          [[ "$DRY_RUN" == "true" ]] && { echo "(dry-run; would have opened/updated issue)"; exit 0; }
          title="Mechanical hygiene sweep ${today}"
          body=$(cat <<EOF
          The weekly mechanical-hygiene sweep at 06:45 UTC on ${today} found drift.

          ## Aggregate
          - yamllint issues:   ${total_yaml}
          - Broken symlinks:   ${total_links}

          ## Per-org

          $(printf '%s\n' "${per_org[@]}")

          ## Per-package (only those with findings)

          ${all_pkgs}

          ## What this means

          γ-2 covers two mechanical-hygiene checks per research §3.4.5:

          - **yamllint**: workflow YAML, dependabot.yml, metadata.yaml conformance
            with the permissive ecosystem starter rules. Per-package
            \`.swiftlint.yml\` and \`.swift-format\` are excluded
            ([CI-057] per-package autonomy).
          - **Broken symlinks**: dangling \`find -L\` symlinks left behind
            by repo moves, branch switches, or scripted edits.

          γ-2 → gating flip authorization requires 2 consecutive clean
          weekly sweeps.

          ## What to do

          - Run \`yamllint -c <config> <paths>\` and \`find -L . -type l ! -exec test -e {} \;\` locally.
          - Fix the listed files; commit per [CI-051] surgical-commit discipline.
          - Close this issue when fixed; the next weekly sweep reopens it if drift recurs.

          *Idempotent: this issue is updated in place.*
          EOF
          )
          existing=$(gh issue list --repo swift-institute/.github \
            --state open --search "Mechanical hygiene sweep in:title" \
            --json number --jq '.[0].number // ""')
          if [[ -n "$existing" ]]; then
            gh issue edit "$existing" --repo swift-institute/.github --title "$title" --body "$body"
          else
            gh issue create --repo swift-institute/.github --title "$title" --body "$body" --label "mechanical-hygiene"
          fi
