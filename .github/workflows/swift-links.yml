name: Link Check (reusable)

# Reusable link-checking workflow for Swift Institute repos. Verifies that
# URLs in Markdown, DocC articles, HTML, and source comments resolve (no
# 404, no DNS error, no TLS failure). Uses lychee — a fast Rust-based
# checker with parallel requests, retry/backoff, response caching, and
# Markdown/DocC-aware parsing.
#
# Consume from a caller repo's .github/workflows/links.yml via:
#
#   on:
#     pull_request:
#       paths:
#         - '**/*.md'
#         - '**/*.docc/**'
#         - 'Sources/**/*.swift'
#     schedule:
#       - cron: '0 6 * * 1'   # Weekly Monday 06:00 UTC
#     workflow_dispatch:
#
#   jobs:
#     # PR gate — block new broken links.
#     pr-links:
#       if: github.event_name == 'pull_request'
#       uses: swift-institute/.github/.github/workflows/swift-links.yml@v1
#       with:
#         fail-on-error: true
#
#     # Scheduled rot detection — file/update an issue, don't redden main.
#     scheduled-links:
#       if: github.event_name != 'pull_request'
#       uses: swift-institute/.github/.github/workflows/swift-links.yml@v1
#       with:
#         fail-on-error: false
#         create-issue: true
#       permissions:
#         contents: read
#         issues: write
#
# Per-repo tuning: drop a `lychee.toml` at the caller root to set ignored
# hosts, timeout, accept-codes, exclude patterns, etc. lychee picks it up
# automatically — see https://lychee.cli.rs for the schema. Use this for
# domains that legitimately rate-limit CI (e.g. linkedin.com, x.com).
#
# `args` is deliberately conservative: scan the whole repo, follow no
# external redirects beyond the default, include URL fragments. Override
# only when a caller has structurally different layout needs.

on:
  workflow_call:
    inputs:
      args:
        type: string
        default: "--no-progress --include-fragments ."
        description: "Arguments passed to lychee. Default scans the entire repo."
      fail-on-error:
        type: boolean
        default: true
        description: "Fail the job when broken links are found. Set false for scheduled runs that file an issue instead."
      create-issue:
        type: boolean
        default: false
        description: "On broken links, open or update a tracking issue with the report. Requires issues: write on the caller job."
      issue-title:
        type: string
        default: "Link Check Report"
        description: "Title for the tracking issue when create-issue is true. Same title is updated on subsequent runs."

jobs:
  link-check:
    name: lychee
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Restore lychee response cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: lychee-${{ github.run_id }}
          restore-keys: lychee-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --cache --max-cache-age 1d ${{ inputs.args }}
          fail: ${{ inputs.fail-on-error }}
          output: ./lychee-out.md

      - name: Open or update tracking issue
        if: inputs.create-issue && steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: ${{ inputs.issue-title }}
          content-filepath: ./lychee-out.md
          labels: |
            link-check
            documentation
