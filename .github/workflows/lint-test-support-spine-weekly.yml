# lint-test-support-spine-weekly.yml — scheduled cross-org Test Support spine
# sweep.
#
# Calls preflight-test-support-spine.py against every public, non-archived
# repo in each in-scope org via a matrix strategy at 06:30 UTC every Monday
# (offset from link-check + readme-presence sweeps which run at 06:00). When
# any org has spine drift (VIOLATION or MISSING), opens or updates a single
# aggregated tracking issue in swift-institute/.github summarising the
# findings.
#
# Pilot scope: swift-primitives only (where the spine has been rolled out —
# Phase 2a). Expansion candidates after pilot (Phases 2b/c/d): swift-standards,
# swift-foundations, swift-iso. The matrix begins narrow and widens as phases
# land.
#
# Audit script source:
#   swift-institute/.github/.github/scripts/preflight-test-support-spine.py
# Public fetch URL (used by the sweep job):
#   https://raw.githubusercontent.com/swift-institute/.github/main/.github/scripts/preflight-test-support-spine.py
#
# β→γ flip trigger: this orchestrator's tracking issue MUST NOT be opened
# (or must remain closed) for two consecutive Monday runs before Phase γ
# flip is authorized (per [MOD-024] β→γ transition clause). The orchestrator
# only opens an issue on findings, so "no issue" is the success signal.
#
# Provenance: [MOD-024] (the rule); [README-167] (tracking-issue pattern);
# Research: swift-institute/Research/centralized-swift-ci-and-spine-gate.md.

name: lint-test-support-spine-weekly

on:
  schedule:
    - cron: '30 6 * * 1'   # weekly Monday 06:30 UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run audit but skip aggregated issue create/update.'
        type: boolean
        required: false
        default: false

jobs:
  sweep:
    strategy:
      fail-fast: false
      matrix:
        org:
          - swift-primitives
          # Expansion candidates (after Phases 2b/c/d):
          # - swift-standards
          # - swift-foundations
          # - swift-iso
    runs-on: ubuntu-latest
    container: swift:6.3
    permissions:
      contents: read
    steps:
      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.METADATA_APP_ID }}
          private-key: ${{ secrets.METADATA_APP_PRIVATE_KEY }}
          owner: ${{ matrix.org }}
          repositories: ''  # all repos in the org installation

      - name: Install dependencies (curl, python3, gh CLI)
        shell: bash
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -qq -y curl python3 ca-certificates gnupg
          # gh CLI install (not in swift:6.3 base; required for `gh repo list`)
          mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            > /etc/apt/sources.list.d/github-cli.list
          apt-get update -qq
          apt-get install -qq -y gh

      - name: Fetch audit script
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/preflight-test-support-spine.py \
            https://raw.githubusercontent.com/swift-institute/.github/main/.github/scripts/preflight-test-support-spine.py

      - name: Sweep org
        shell: bash
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ORG: ${{ matrix.org }}
        run: |
          set -euo pipefail
          mapfile -t targets < <(gh repo list "$ORG" --limit 2000 \
            --visibility public \
            --json nameWithOwner,isArchived \
            --jq '.[] | select(.isArchived==false) | .nameWithOwner')
          total_viol=0
          total_miss=0
          for target in "${targets[@]}"; do
            workdir=$(mktemp -d)
            json="/tmp/${target//\//__}.json"
            git clone --depth 1 --quiet \
              "https://x-access-token:${GH_TOKEN}@github.com/${target}.git" \
              "$workdir" 2>/dev/null || { rm -rf "$workdir"; continue; }
            python3 /tmp/preflight-test-support-spine.py \
              --package-dir "$workdir" \
              --json "$json" 2>/dev/null || true
            counts=$(python3 -c "import json; t=json.load(open('$json'))['aggregate']['totals']; print(t['violation_findings'], t['missing_findings'])" 2>/dev/null || echo "0 0")
            read -r v m <<< "$counts"
            total_viol=$((total_viol + v))
            total_miss=$((total_miss + m))
            rm -rf "$workdir"
          done
          {
            echo "## Org $ORG — spine sweep"
            echo "- VIOLATION total: $total_viol"
            echo "- MISSING total:   $total_miss"
          } >> "$GITHUB_STEP_SUMMARY"
          # Persist counts as artifacts for the report job
          echo "${total_viol},${total_miss}" > "/tmp/${ORG}-counts.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: spine-counts-${{ matrix.org }}
          path: /tmp/${{ matrix.org }}-counts.txt

  report:
    needs: sweep
    runs-on: ubuntu-latest
    if: always() && needs.sweep.result != 'skipped'
    steps:
      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.METADATA_APP_ID }}
          private-key: ${{ secrets.METADATA_APP_PRIVATE_KEY }}
          owner: swift-institute
          repositories: .github
          permission-issues: write

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/counts

      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          DRY_RUN: ${{ inputs.dry-run || false }}
        run: |
          set -euo pipefail
          today=$(date -u '+%Y-%m-%d')
          total_viol=0
          total_miss=0
          per_org=()
          for f in /tmp/counts/*/*.txt; do
            org=$(basename "$(dirname "$f")" | sed 's/^spine-counts-//')
            IFS=',' read -r v m < "$f"
            total_viol=$((total_viol + v))
            total_miss=$((total_miss + m))
            per_org+=("- \`${org}\`: $v violations, $m missing")
          done
          if [[ "$total_viol" -eq 0 && "$total_miss" -eq 0 ]]; then
            echo "Spine clean across all orgs — no tracking issue needed."
            exit 0
          fi
          [[ "$DRY_RUN" == "true" ]] && { echo "(dry-run)"; exit 0; }
          title="Test Support spine sweep ${today}"
          body=$(cat <<EOF
          The weekly Test Support spine sweep at 06:30 UTC on ${today} found drift.

          ## Aggregate
          - VIOLATION total: ${total_viol}
          - MISSING total:   ${total_miss}

          ## Per-org

          $(printf '%s\n' "${per_org[@]}")

          See the per-org run summaries for the file-level breakdown.

          ## What this means

          One or more packages drifted from [MOD-024] Test Support Spine
          Discipline. A \`* Test Support\` target is either missing (the
          package has tests but no TS) or its dependencies include a non-TS
          cross-package product, breaking the SLI conformance chain under
          MemberImportVisibility.

          ## What to do

          - Run the audit script locally to identify the drifted packages:
            \`\`\`
            python3 swift-institute/.github/.github/scripts/preflight-test-support-spine.py --org primitives
            \`\`\`
          - For VIOLATION: replace the non-TS cross-package dep with the
            corresponding \`* Test Support\` product. The spine-anchor
            algorithm (lowest-level TS in product deps) determines the
            target.
          - For MISSING: add an empty TS shell per the [MOD-024] template.
          - Close this issue when fixed; the next weekly sweep reopens it
            if drift recurs.

          Phase β→γ flip authorization requires two consecutive weeks of
          zero VIOLATION + MISSING across all in-scope orgs.

          *Idempotent: this issue is updated in place.*
          EOF
          )
          existing=$(gh issue list --repo swift-institute/.github \
            --state open --search "Test Support spine sweep in:title" \
            --json number --jq '.[0].number // ""')
          if [[ -n "$existing" ]]; then
            gh issue edit "$existing" --repo swift-institute/.github --title "$title" --body "$body"
          else
            gh issue create --repo swift-institute/.github --title "$title" --body "$body" --label "spine-audit"
          fi
