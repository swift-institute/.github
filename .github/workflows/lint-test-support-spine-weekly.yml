# lint-test-support-spine-weekly.yml — scheduled cross-org Test Support
# spine sweep.
#
# Calls audit-test-support-spine.py against every public, non-archived
# repo in each in-scope org via a matrix strategy at 06:30 UTC every Monday
# (offset from link-check + readme-presence sweeps which run at 06:00). When
# any org has spine drift (VIOLATION or MISSING), opens or updates a single
# aggregated tracking issue in swift-institute/.github summarising the
# findings.
#
# Pilot scope: swift-primitives only (where the spine has been rolled out —
# Phase 2a). Expansion candidates after pilot (Phases 2b/c/d): swift-standards,
# swift-foundations, swift-iso. The matrix begins narrow and widens as phases
# land.
#
# Audit script source: swift-institute/.github/.github/scripts/audit-test-support-spine.py
#
# β→γ flip trigger: this orchestrator's tracking issue MUST NOT be opened
# (or must remain closed) for two consecutive Monday runs before Phase γ
# flip is authorized (per [MOD-024] β→γ transition clause). The orchestrator
# only opens an issue on findings, so "no issue" is the success signal.
#
# Container: swift:6.3 because audit-test-support-spine.py invokes
# `swift package dump-package`. The literal is hardcoded — env.* and
# matrix.* are unavailable at the container: field per Actions context-
# availability rules. vars.* (org/repo variables) is the only working
# centralization mechanism for cross-workflow container pinning.
#
# Provenance: [MOD-024] (the rule); [README-167] (tracking-issue pattern);
# Research: swift-institute/Research/centralized-swift-ci-and-spine-gate.md.
# Skeleton extracted to cron-audit-base.yml@main reusable.

name: lint-test-support-spine-weekly

# [CI-090] Deny-all floor; per-job blocks below declare the actual grants.
permissions: {}

on:
  schedule:
    - cron: '30 6 * * 1'   # weekly Monday 06:30 UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run audit but skip aggregated issue create/update.'
        type: boolean
        required: false
        default: false

jobs:
  config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      orgs: ${{ steps.read.outputs.orgs }}
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - id: read
        uses: swift-institute/.github/.github/actions/read-orgs@main
        with:
          filter: 'select(.name=="swift-primitives") | .name'

  audit:
    needs: config
    # [CI-106] Caller must grant equivalent or greater than the called
    # reusable's per-job permissions (cron-audit-base.yml `sweep` + `report`
    # jobs: contents: read).
    permissions:
      contents: read
    uses: ./.github/workflows/cron-audit-base.yml
    secrets: inherit
    with:
      matrix-orgs: ${{ needs.config.outputs.orgs }}
      container: 'swift:6.3'
      audit-script-path: .github/scripts/audit-test-support-spine.py
      audit-runner-args: |
        {
          "json_totals_path": "aggregate.totals",
          "count_keys": ["violation_findings", "missing_findings"],
          "summary_label": "spine sweep"
        }
      count-labels: violation,missing
      issue-title-prefix: Test Support spine sweep
      issue-label: spine-audit
      dry-run: ${{ inputs.dry-run || false }}
      issue-body-template: |
        The weekly Test Support spine sweep at 06:30 UTC on ${TODAY} found drift.

        ## Aggregate
        - VIOLATION total: ${COUNT_VIOLATION}
        - MISSING total:   ${COUNT_MISSING}

        ## Per-org

        ${PER_ORG_LIST}

        See the per-org run summaries for the file-level breakdown.

        ## What this means

        One or more packages drifted from [MOD-024] Test Support Spine
        Discipline. A `* Test Support` target is either missing (the
        package has tests but no TS) or its dependencies include a non-TS
        cross-package product, breaking the SLI conformance chain under
        MemberImportVisibility.

        ## What to do

        - Run the audit script locally to identify the drifted packages:
          ```
          python3 swift-institute/.github/.github/scripts/audit-test-support-spine.py --org primitives
          ```
        - For VIOLATION: replace the non-TS cross-package dep with the
          corresponding `* Test Support` product. The spine-anchor
          algorithm (lowest-level TS in product deps) determines the
          target.
        - For MISSING: add an empty TS shell per the [MOD-024] template.
        - Close this issue when fixed; the next weekly sweep reopens it
          if drift recurs.

        Phase β→γ flip authorization requires two consecutive weeks of
        zero VIOLATION + MISSING across all in-scope orgs.

        *Idempotent: this issue is updated in place.*
