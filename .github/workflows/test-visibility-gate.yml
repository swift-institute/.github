name: Test Visibility Gate

# Temporary reusable workflow to empirically verify
# `github.event.repository.private` resolves correctly inside workflow_call
# context (i.e., that reusable workflows inherit the calling repo's
# `github.event.repository`, not the .github repo's).
#
# Will be deleted after both the PUBLIC + PRIVATE canary runs are observed.

on:
  workflow_call:

jobs:
  probe:
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.private }}
    steps:
      - run: echo "PUBLIC PATH — gate evaluated true"
