# metadata-pr-preview.yml — PR-time preview comment for metadata.yaml changes.
#
# Called by per-repo metadata.yml callers when a PR modifies .github/metadata.yaml.
# Posts a comment on the PR showing what `gh repo edit` invocations sync-metadata.yml
# will run when the PR merges.
#
# Provenance: Skills/github-repository [GH-REPO-070] / [GH-REPO-071];
# Research/github-metadata-harmonization.md § 4.2 / § 4.6.

name: metadata-pr-preview

on:
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of the PR repo.'
        type: string
        required: true
      pr-number:
        description: 'PR number to comment on.'
        type: number
        required: true
      pr-head-sha:
        description: 'PR head commit SHA (used to read the changed metadata.yaml).'
        type: string
        required: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Compute auth scope
        id: scope
        run: |
          input="${{ inputs.repo }}"
          owner="${input%/*}"
          name="${input#*/}"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "repositories=${name}" >> "$GITHUB_OUTPUT"

      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.METADATA_APP_ID }}
          private-key: ${{ secrets.METADATA_APP_PRIVATE_KEY }}
          owner: ${{ steps.scope.outputs.owner }}
          repositories: ${{ steps.scope.outputs.repositories }}
          permissions: |
            metadata: read
            contents: read
            pull-requests: write
            administration: read

      - name: Compute proposed sync diff
        id: diff
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          REPO: ${{ inputs.repo }}
          PR_HEAD_SHA: ${{ inputs.pr-head-sha }}
        run: |
          set -euo pipefail

          # Read the YAML at the PR's head commit.
          yaml_content=$(gh api "repos/${REPO}/contents/.github/metadata.yaml?ref=${PR_HEAD_SHA}" \
            --jq '.content' | base64 -d) || {
            echo "result=missing" >> "$GITHUB_OUTPUT"
            exit 0
          }

          desired=$(echo "$yaml_content" | yq -o=json) || {
            echo "result=malformed" >> "$GITHUB_OUTPUT"
            exit 0
          }

          desired_desc=$(echo "$desired" | jq -r '.description // ""')
          desired_homepage=$(echo "$desired" | jq -r '.homepage // ""')
          desired_topics=$(echo "$desired" | jq -r '.topics // [] | .[]' | sort -u)
          desired_issues=$(echo "$desired" | jq -r '.settings.hasIssuesEnabled // true')
          desired_disc=$(echo "$desired" | jq -r '.settings.hasDiscussionsEnabled // false')
          desired_wiki=$(echo "$desired" | jq -r '.settings.hasWikiEnabled // false')
          desired_branch=$(echo "$desired" | jq -r '.settings.defaultBranch // "main"')

          current=$(gh repo view "$REPO" \
            --json description,repositoryTopics,homepageUrl,hasIssuesEnabled,hasDiscussionsEnabled,hasWikiEnabled,defaultBranchRef)

          current_desc=$(echo "$current" | jq -r '.description // ""')
          current_homepage=$(echo "$current" | jq -r '.homepageUrl // ""')
          current_topics=$(echo "$current" | jq -r '.repositoryTopics // [] | .[].name' | sort -u)
          current_issues=$(echo "$current" | jq -r '.hasIssuesEnabled')
          current_disc=$(echo "$current" | jq -r '.hasDiscussionsEnabled')
          current_wiki=$(echo "$current" | jq -r '.hasWikiEnabled')
          current_branch=$(echo "$current" | jq -r '.defaultBranchRef.name // "main"')

          edit_lines=()
          [[ "$desired_desc" != "$current_desc" ]] && edit_lines+=("--description ${desired_desc@Q}")
          [[ "$desired_homepage" != "$current_homepage" ]] && edit_lines+=("--homepage ${desired_homepage@Q}")

          while IFS= read -r t; do
            [[ -z "$t" ]] && continue
            edit_lines+=("--add-topic ${t}")
          done < <(comm -23 <(echo "$desired_topics") <(echo "$current_topics") || true)
          while IFS= read -r t; do
            [[ -z "$t" ]] && continue
            edit_lines+=("--remove-topic ${t}")
          done < <(comm -13 <(echo "$desired_topics") <(echo "$current_topics") || true)

          [[ "$desired_issues" != "$current_issues" ]] && edit_lines+=("--enable-issues=${desired_issues}")
          [[ "$desired_disc"   != "$current_disc"   ]] && edit_lines+=("--enable-discussions=${desired_disc}")
          [[ "$desired_wiki"   != "$current_wiki"   ]] && edit_lines+=("--enable-wiki=${desired_wiki}")
          [[ "$desired_branch" != "$current_branch" ]] && edit_lines+=("--default-branch ${desired_branch}")

          if [[ ${#edit_lines[@]} -eq 0 ]]; then
            echo "result=converged" >> "$GITHUB_OUTPUT"
          else
            {
              echo "result=diff"
              echo "diff-count=${#edit_lines[@]}"
              echo "diff-block<<DIFF_EOF"
              echo "gh repo edit ${REPO} \\"
              for i in "${!edit_lines[@]}"; do
                if [[ $i -eq $((${#edit_lines[@]} - 1)) ]]; then
                  echo "  ${edit_lines[$i]}"
                else
                  echo "  ${edit_lines[$i]} \\"
                fi
              done
              echo "DIFF_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Post preview comment
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          REPO: ${{ inputs.repo }}
          PR_NUMBER: ${{ inputs.pr-number }}
          RESULT: ${{ steps.diff.outputs.result }}
          DIFF_COUNT: ${{ steps.diff.outputs.diff-count }}
          DIFF_BLOCK: ${{ steps.diff.outputs.diff-block }}
        run: |
          set -euo pipefail
          case "$RESULT" in
            missing)
              body="**Metadata sync preview** — \`.github/metadata.yaml\` was not found at the PR head. No sync will run on merge."
              ;;
            malformed)
              body="**Metadata sync preview** — \`.github/metadata.yaml\` is malformed and will be rejected by sync. Fix the YAML before merging."
              ;;
            converged)
              body=$'**Metadata sync preview** — `.github/metadata.yaml` matches GitHub state. On merge, sync-metadata.yml will run and produce zero edits (idempotent).'
              ;;
            diff)
              body=$(cat <<EOF
          **Metadata sync preview** — on merge, the following will be applied to \`${REPO}\`:

          \`\`\`bash
          ${DIFF_BLOCK}
          \`\`\`

          *${DIFF_COUNT} field(s) converging. Idempotent re-run produces zero edits.*
          EOF
          )
              ;;
          esac

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
