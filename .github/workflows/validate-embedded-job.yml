# validate-embedded-job.yml — verify [CI-021] embedded-job posture.
#
# Pilot 23 of `/promote-rule` (2026-05-14). Migrated to thin caller of
# validate-base.yml in Phase B-2 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14
# (single-target mode per manifest; default target swift-primitives/.github).

name: validate-embedded-job

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/swift-ci.yml'
      - '.github/scripts/validate-embedded-job.py'
      - '.github/workflows/validate-embedded-job.yml'
  pull_request:
    paths:
      - '.github/workflows/swift-ci.yml'
      - '.github/scripts/validate-embedded-job.py'
      - '.github/workflows/validate-embedded-job.yml'
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of the wrapper-host repo to validate (default: swift-primitives/.github).'
        type: string
        required: false
        default: 'swift-primitives/.github'
      dry-run:
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        value: ${{ jobs.scan.outputs.total-violations }}
  workflow_dispatch:
    inputs:
      repo:
        description: 'Owner/name of the wrapper-host repo to validate (default: swift-primitives/.github).'
        type: string
        required: false
        default: 'swift-primitives/.github'
      dry-run:
        type: boolean
        required: false
        default: false

jobs:
  scan:
    uses: ./.github/workflows/validate-base.yml
    with:
      validator-script: .github/scripts/validate-embedded-job.py
      rule-id-regex: '^CI-021'
      discovery-mode: single-target
      target-repo: ${{ inputs.repo }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
