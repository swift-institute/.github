name: Swift CI (reusable)

# ─── Third-party consumer notice ────────────────────────────────────────
# These reusable workflows are designed for swift-institute ecosystem
# packages. Outside callers consume at their own risk and should pin to
# an immutable SHA (`@<sha>`) rather than `@main`. The input/output
# surface and behavior may change without notice; the swift-institute/
# .github repo offers no compatibility guarantee to outside consumers.
# Per swift-institute/Research/ci-cd-cross-ecosystem-reuse.md v1.1.1 §Q4
# (third-party consumers are unintended-but-permitted).
# ────────────────────────────────────────────────────────────────────────

# Reusable CI workflow for Swift Institute packages. Provides the universal
# test matrix that applies across all five layers: macOS 26 (Swift 6.3 debug)
# + Ubuntu (Swift 6.3 release) + Ubuntu (Swift 6.4-dev nightly,
# continue-on-error) + Windows (Swift 6.3).
#
# Consume from a caller package's .github/workflows/ci.yml via:
#
#   jobs:
#     ci:
#       uses: swift-institute/.github/.github/workflows/swift-ci.yml@main
#       secrets: inherit
#
# Default `enable-private-repos: true` covers the canonical case (the
# vast majority of consumers depend on private intra-Institute siblings
# and need PRIVATE_REPO_TOKEN-rewritten github.com URLs for
# `swift package resolve`); pass `with: { enable-private-repos: false }`
# only for the rare public-deps-only consumer that wants to suppress
# the configure-git step. `secrets: inherit` is uniform across all
# consumers per [CI-031]/[CI-058]/[CI-059] post-uniformity-sweep.
#
# Inputs are deliberately minimal. Toolchain versions, runner images, and
# the matrix shape are hard-coded ecosystem-wide; if a package needs a
# different shape, fork the workflow rather than parameterizing this one.
#
# Caching policy: this workflow does NOT cache `.build/`. Every run does
# a fresh `swift package resolve` + clone + compile. This matches Apple's
# canonical `swiftlang/github-workflows/swift_package_test.yml` (995 lines,
# zero `actions/cache` uses) and is the right answer for our constraint
# set: `Package.resolved` is gitignored ecosystem-wide as a permanent
# library convention, so cache invalidation cannot key on resolved-graph
# state, and `restore-keys` partial-prefix matching silently serves stale
# branch-pinned dep checkouts. See
# `swift-institute/Research/ci-cache-strategy-branch-pinned-dependencies.md`.
#
# Layer-specific verification jobs (e.g. embedded-build verification for L1
# primitives) live in per-layer wrapper workflows under
# `<layer>/.github/.github/workflows/`, not here. swift-institute owns the
# universal floor; layers own their own invariants.

on:
  workflow_call:
    inputs:
      swift-version:
        type: string
        default: "6.3"
        description: "Swift version for the macOS, Ubuntu release, and Windows jobs. The nightly job is always 6.4-dev."
      enable-private-repos:
        type: boolean
        default: true
        description: "If true, configure git to use PRIVATE_REPO_TOKEN for github.com clones. Default true: most consumers in the swift-primitives ecosystem have private deps and need the token; public-only consumers may pass false explicitly."
      macos-runner:
        type: string
        default: "macos-26"
        description: "macOS runner image. Bump annually when GitHub adds a new image version. env.* is invalid in runs-on: per Actions context-availability rules — input is the working centralization mechanism."
    secrets:
      PRIVATE_REPO_TOKEN:
        required: false

# ─── Tool-version pins ──────────────────────────────────────────────────
# Workflow-level env vars centralize tool versions so each release bump
# is a single edit instead of N grep-and-replace sites. Per
# feedback_latest_versions_only.md these MUST track the latest stable
# release of each tool; bump on every workflow touch where a newer
# release exists.
env:
  SWIFTLINT_VERSION: "0.63.2"
  XCODE_VERSION: "26.4"

jobs:
  macos-release:
    name: macOS (Swift ${{ inputs.swift-version }}, debug)
    if: ${{ !github.event.repository.private }}
    runs-on: ${{ inputs.macos-runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - uses: swift-institute/.github/.github/actions/configure-private-repos@main
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          enabled: ${{ inputs.enable-private-repos }}

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app"

      - name: Print Swift version
        run: swift --version

      - name: Test
        run: swift test -c debug

  linux-release:
    name: Ubuntu (Swift ${{ inputs.swift-version }}, release)
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    container: swift:${{ inputs.swift-version }}
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - uses: swift-institute/.github/.github/actions/configure-private-repos@main
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          enabled: ${{ inputs.enable-private-repos }}

      - name: Test (release)
        run: swift test -c release

  linux-nightly:
    name: Ubuntu (Swift 6.4-dev nightly, release)
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-main-jammy
    continue-on-error: true
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - uses: swift-institute/.github/.github/actions/configure-private-repos@main
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          enabled: ${{ inputs.enable-private-repos }}

      - name: Print Swift version
        run: swift --version

      - name: Test (release)
        run: swift test -c release

  windows-release:
    name: Windows (Swift ${{ inputs.swift-version }}, debug)
    if: ${{ !github.event.repository.private }}
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - uses: swift-institute/.github/.github/actions/configure-private-repos@main
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          enabled: ${{ inputs.enable-private-repos }}

      - name: Install Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ inputs.swift-version }}

      - name: Print Swift version
        run: swift --version

      - name: Test
        run: swift test -c debug

  # ─── Ecosystem-wide quality gates ─────────────────────────────────────
  # `format` and `lint` run on every consumer CI in parallel with the
  # matrix. They read each consumer's own `.swift-format` and
  # `.swiftlint.yml` configs (per-package customization preserved); the
  # tools find their config by walking up from the working directory.
  # Per-repo `swift-format.yml` / `swiftlint.yml` workflow files are
  # forbidden once these absorbed jobs land — see [CI-031].
  #
  # Developer contract: CI runs `swift-format lint --strict` (NOT
  # `format --in-place + auto-commit`). Run `swift-format format
  # --in-place Sources Tests` locally before pushing.

  format:
    name: swift-format lint
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    container: swift:${{ inputs.swift-version }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Print swift-format version
        run: swift-format --version

      - name: Lint formatting (--strict)
        # Path exclusions ([Phase 1.5] 2026-05-05):
        #   *.docc/Resources/  — DocC tutorial code samples (didactic fixtures)
        #   Tests/Support/     — Test_Support fixture modules
        #   Tests/Tutorial/    — Tutorial verification tests (same didactic
        #                        code as DocC tutorials, just under Tests/)
        # Other Tests/** paths are still linted — rules like NeverForceUnwrap,
        # NeverUseForceTry, ValidateDocumentationComments remain valuable on
        # actual test code outside fixture/tutorial modules.
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find Sources Tests -name '*.swift' \
            -not -path '*/*.docc/Resources/*' \
            -not -path 'Tests/Support/*' \
            -not -path 'Tests/Tutorial/*' \
            -print0 2>/dev/null || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Swift files to lint."
            exit 0
          fi
          swift-format lint --strict --ignore-unparsable-files "${files[@]}"

  lint:
    name: SwiftLint
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    container: swift:${{ inputs.swift-version }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Cache SwiftLint binary
        id: cache-swiftlint
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/swiftlint
          key: ${{ runner.os }}-swiftlint-${{ env.SWIFTLINT_VERSION }}

      - name: Install SwiftLint ${{ env.SWIFTLINT_VERSION }}
        if: steps.cache-swiftlint.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -qq -y curl unzip
          curl -fsSL -o /tmp/swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/${{ env.SWIFTLINT_VERSION }}/swiftlint_linux_amd64.zip"
          unzip -q /tmp/swiftlint.zip -d /tmp/swiftlint_extracted
          mv /tmp/swiftlint_extracted/swiftlint /usr/local/bin/
          chmod +x /usr/local/bin/swiftlint
          rm -rf /tmp/swiftlint.zip /tmp/swiftlint_extracted

      - name: Print SwiftLint version
        run: swiftlint --version

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  # ─── swift-linter (Phase 1 advisory; swiftsyntax-based AST linter) ───────
  # SwiftSyntax-based AST linter at swift-foundations/swift-linter. Phase 1
  # ships R5 (`unchecked_call_site`): flags `__unchecked:` argument labels
  # at call sites only — distinguishing call-site uses (anti-pattern per
  # [CONV-016] tier 5) from declaration-site uses (legitimate extension-init
  # machinery per [CONV-001]). The structural distinction is invisible to
  # regex but trivial on the AST.
  #
  # See swift-institute/Research/swiftsyntax-based-custom-linter-investigation.md
  # for the architecture (Option C standalone CLI, Option F symbol-graph
  # extension) and 6-phase phasing.
  #
  # Phase 1: advisory (continue-on-error: true). The linter is run-from-source
  # via `swift run --package-path` against a checkout of swift-linter. Once
  # the package is published with a binary release, this step swaps to a
  # cached-binary install (mirroring the SwiftLint job above).

  swift-linter:
    name: swift-linter (Phase 1, advisory)
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    container: swift:${{ inputs.swift-version }}
    timeout-minutes: 15
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          path: consumer

      - uses: actions/checkout@v6
        with:
          repository: swift-foundations/swift-linter
          path: swift-linter
          # NOTE: repository is not yet published in Phase 1 — this step will
          # fail until the linter package is created on GitHub. continue-on-error
          # at the job level keeps the consumer build green during the gap.

      - name: Run swift-linter
        working-directory: swift-linter
        run: swift run swift-linter ../consumer

  # ════════════════════════════════════════════════════════════════════════
  # Advisory CI gates — grouped by category for UI clarity.
  # Each gate takes an `advisory: bool` input; γ flip = drop the `with:`
  # block at the calling site (default false = gating). Job declaration
  # order here drives the order in the consumer's CI sidebar.
  # ════════════════════════════════════════════════════════════════════════

  # ─── γ-2 Mechanical hygiene ──────────────────────────────────────────────
  # Workflow YAML + filesystem checks. Cheap, run on ubuntu-latest no-container.
  # γ-2 flip after 2 clean weekly cron sweeps (consolidated tracking issue).

  lint-yaml:
    name: yamllint (γ-2, advisory)
    if: ${{ !github.event.repository.private }}
    uses: ./.github/workflows/lint-yaml.yml
    with:
      advisory: true

  lint-broken-symlink:
    name: Broken symlinks (γ-2, advisory)
    if: ${{ !github.event.repository.private }}
    uses: ./.github/workflows/lint-broken-symlink.yml
    with:
      advisory: true

  # ─── γ-1 L1 identity invariants + Phase β [MOD-024] ──────────────────────
  # Per-package source-content audits. License-header runs on ubuntu-latest
  # no-container (pure Python). Test Support Spine uses swift:6.3 because
  # it invokes `swift package dump-package`. Each has its own flip schedule
  # per research §3.4.
  #
  # Foundation-import (γ-1a) was migrated 2026-05-05 from this advisory
  # workflow to the Tier 2 SwiftLint custom rule pair (no_foundation_import_*)
  # at swift-primitives/.github/.swiftlint.yml — see swift-institute/Research/
  # rollout-phase-1-results.md.

  lint-license-header:
    name: License header (γ-1b Stage 1, advisory)
    if: ${{ !github.event.repository.private }}
    uses: ./.github/workflows/lint-license-header.yml
    with:
      advisory: true

  lint-test-support-spine:
    name: Test Support Spine ([MOD-024], advisory)
    if: ${{ !github.event.repository.private }}
    uses: ./.github/workflows/lint-test-support-spine.yml
    with:
      advisory: true     # Phase β. Drop in Phase γ.
      swift-version: ${{ inputs.swift-version }}

  # ─── PR-only conventions ─────────────────────────────────────────────────
  # Fire on pull_request events only; skipped on push/dispatch.

  lint-api-breakage:
    name: API breakage (γ-1c, advisory pilot)
    if: ${{ github.event_name == 'pull_request' && !github.event.repository.private }}
    uses: ./.github/workflows/lint-api-breakage.yml
    with:
      advisory: true
      swift-version: ${{ inputs.swift-version }}
    secrets: inherit

  lint-pr-title:
    name: PR title format (γ-4, advisory)
    if: ${{ github.event_name == 'pull_request' && !github.event.repository.private }}
    uses: ./.github/workflows/lint-pr-title.yml
    with:
      advisory: true

  # γ-2b dep-graph submission lives in submit-dep-graph-weekly.yml (a
  # centralized per-org cron orchestrator), not as a per-PR caller here.
  # The transitive consumer-→layer-→universal call chain can't grant
  # `contents: write` cleanly under [CI-031] minimum (v1.3.0 §3.5.4),
  # so the architecture is centralized: one workflow at swift-institute/
  # .github fires Monday 06:50 UTC and submits dep-graphs for all public
  # consumer repos via `gh api -X POST /repos/<target>/dependency-graph/snapshots`.

  # ─── Conclusion aggregator ────────────────────────────────────────────────
  # Single required-status-check name for branch protection. needs: lists
  # every job that should gate the merge; ci-ok succeeds iff every needed
  # job succeeded (or was skipped — visibility-gate path on private repos).
  # Cancelled or failed needs propagate to ci-ok failing.
  #
  # Rationale: branch protection on consumer repos requires only `ci-ok`
  # rather than every individual job name. Adding/removing jobs in this
  # workflow is a local edit (update needs:); branch-protection rules don't
  # need per-repo updates. Closes the M6 "required-check names interpolate
  # ${{ inputs.swift-version }}" drift class — ci-ok's name doesn't
  # interpolate anything.
  #
  # Excluded from needs: by design:
  #   - linux-nightly (continue-on-error: true; nightly toolchain
  #     instability is not the consumer's defect to fix)
  #   - All advisory linters (lint-yaml, lint-broken-symlink,
  #     lint-foundation-family-import [retired], lint-license-header,
  #     lint-test-support-spine, lint-api-breakage, lint-pr-title) — they
  #     pass with `with: { advisory: true }` and aren't gating until their
  #     respective γ-flips land
  ci-ok:
    if: ${{ always() && !github.event.repository.private }}
    needs:
      - macos-release
      - linux-release
      - windows-release
      - format
      - lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Aggregate required-job results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          # success or skipped → pass; failure or cancelled → fail.
          # ubuntu-latest pre-installs jq.
          jq --exit-status 'all(.result == "success" or .result == "skipped")' <<< "$NEEDS_JSON"
