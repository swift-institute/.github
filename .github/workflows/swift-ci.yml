name: Swift CI (reusable)

# Reusable CI workflow for Swift Institute packages. Provides the universal
# test matrix that applies across all five layers: macOS 26 (Swift 6.3 debug)
# + Ubuntu (Swift 6.3 release) + Ubuntu (Swift 6.4-dev nightly,
# continue-on-error) + Windows (Swift 6.3).
#
# Consume from a caller package's .github/workflows/ci.yml via:
#
#   jobs:
#     ci:
#       uses: swift-institute/.github/.github/workflows/swift-ci.yml@main
#       with:
#         enable-private-repos: true   # only if package depends on private repos
#       secrets:
#         PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
#
# Inputs are deliberately minimal. Toolchain versions, runner images, and
# the matrix shape are hard-coded ecosystem-wide; if a package needs a
# different shape, fork the workflow rather than parameterizing this one.
#
# `enable-private-repos: true` rewrites github.com URLs to embed
# PRIVATE_REPO_TOKEN so `swift package resolve` can clone private deps.
# Omit when the package has no private dependencies.
#
# Caching policy: this workflow does NOT cache `.build/`. Every run does
# a fresh `swift package resolve` + clone + compile. This matches Apple's
# canonical `swiftlang/github-workflows/swift_package_test.yml` (995 lines,
# zero `actions/cache` uses) and is the right answer for our constraint
# set: `Package.resolved` is gitignored ecosystem-wide as a permanent
# library convention, so cache invalidation cannot key on resolved-graph
# state, and `restore-keys` partial-prefix matching silently serves stale
# branch-pinned dep checkouts. See
# `swift-institute/Research/ci-cache-strategy-branch-pinned-dependencies.md`.
#
# Layer-specific verification jobs (e.g. embedded-build verification for L1
# primitives) live in per-layer wrapper workflows under
# `<layer>/.github/.github/workflows/`, not here. swift-institute owns the
# universal floor; layers own their own invariants.

on:
  workflow_call:
    inputs:
      swift-version:
        type: string
        default: "6.3"
        description: "Swift version for the macOS, Ubuntu release, and Windows jobs. The nightly job is always 6.4-dev."
      enable-private-repos:
        type: boolean
        default: true
        description: "If true, configure git to use PRIVATE_REPO_TOKEN for github.com clones. Default true: most consumers in the swift-primitives ecosystem have private deps and need the token; public-only consumers may pass false explicitly."
    secrets:
      PRIVATE_REPO_TOKEN:
        required: false

jobs:
  macos-release:
    name: macOS (Swift ${{ inputs.swift-version }}, debug)
    if: ${{ !github.event.repository.private }}
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Print Swift version
        run: swift --version

      - name: Test
        run: swift test -c debug

  linux-release:
    name: Ubuntu (Swift ${{ inputs.swift-version }}, release)
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    container: swift:6.3
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Test (release)
        run: swift test -c release

  linux-nightly:
    name: Ubuntu (Swift 6.4-dev nightly, release)
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-main-jammy
    continue-on-error: true
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Print Swift version
        run: swift --version

      - name: Test (release)
        run: swift test -c release

  windows-release:
    name: Windows (Swift ${{ inputs.swift-version }})
    if: ${{ !github.event.repository.private }}
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ inputs.swift-version }}

      - name: Print Swift version
        run: swift --version

      - name: Test
        run: swift test -c debug

  # ─── Ecosystem-wide quality gates ─────────────────────────────────────
  # `format` and `lint` run on every consumer CI in parallel with the
  # matrix. They read each consumer's own `.swift-format` and
  # `.swiftlint.yml` configs (per-package customization preserved); the
  # tools find their config by walking up from the working directory.
  # Per-repo `swift-format.yml` / `swiftlint.yml` workflow files are
  # forbidden once these absorbed jobs land — see [CI-031].
  #
  # Developer contract: CI runs `swift-format lint --strict` (NOT
  # `format --in-place + auto-commit`). Run `swift-format format
  # --in-place Sources Tests` locally before pushing.

  format:
    name: swift-format lint
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    container: swift:6.3
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Print swift-format version
        run: swift-format --version

      - name: Lint formatting (--strict)
        run: swift-format lint --recursive --strict --ignore-unparsable-files Sources Tests

  lint:
    name: SwiftLint
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    container: swift:6.3
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache SwiftLint binary
        id: cache-swiftlint
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/swiftlint
          key: ${{ runner.os }}-swiftlint-0.63.2

      - name: Install SwiftLint 0.63.2
        if: steps.cache-swiftlint.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -qq -y curl unzip
          curl -fsSL -o /tmp/swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/0.63.2/swiftlint_linux_amd64.zip"
          unzip -q /tmp/swiftlint.zip -d /tmp/swiftlint_extracted
          mv /tmp/swiftlint_extracted/swiftlint /usr/local/bin/
          chmod +x /usr/local/bin/swiftlint
          rm -rf /tmp/swiftlint.zip /tmp/swiftlint_extracted

      - name: Print SwiftLint version
        run: swiftlint --version

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  # ─── Advisory CI gates (per-PR) ───────────────────────────────────────
  # All advisory in their respective Phase-β/γ-* observation windows.
  # Each takes an `advisory: bool` input; flip to gating = drop the
  # `with:` block at the calling site (default false = gating).

  # [MOD-024] Test Support Spine — Phase β advisory; γ flip after two
  # consecutive zero-violation weekly runs of lint-test-support-spine-weekly.
  lint-test-support-spine:
    name: Test Support Spine ([MOD-024], advisory)
    if: ${{ !github.event.repository.private }}
    uses: ./.github/workflows/lint-test-support-spine.yml
    with:
      advisory: true     # Phase β. Drop in Phase γ.

  # γ-4 PR-title format — pull_request events only. Advisory by design
  # (monthly noise:value review; drop entirely if friction-theater per §3.4.7).
  lint-pr-title:
    name: PR title format (γ-4, advisory)
    if: ${{ github.event_name == 'pull_request' && !github.event.repository.private }}
    uses: ./.github/workflows/lint-pr-title.yml
    with:
      advisory: true

  # γ-2 yamllint scan. Advisory; γ-2 flip after two consecutive clean
  # weekly cron sweeps (consolidated mechanical-hygiene tracking issue).
  # Scope per §3.4.5: workflows + dependabot.yml + metadata.yaml + top-level metadata.yaml.
  lint-yaml:
    name: yamllint (γ-2, advisory)
    if: ${{ !github.event.repository.private }}
    uses: ./.github/workflows/lint-yaml.yml
    with:
      advisory: true

  # γ-2 broken-symlink scan. Advisory; γ-2 flip after two consecutive clean
  # weekly cron sweeps (consolidated mechanical-hygiene tracking issue).
  lint-broken-symlink:
    name: Broken symlinks (γ-2, advisory)
    if: ${{ !github.event.repository.private }}
    uses: ./.github/workflows/lint-broken-symlink.yml
    with:
      advisory: true

  # γ-1a Foundation-family import audit. Two-track flip after 2 clean
  # weekly cron runs (BOTH public CI sweep AND principal-side audit per
  # Decision #8). Catches all attribute/access-modifier permutations.
  lint-foundation-family-import:
    name: Foundation import (γ-1a, advisory)
    if: ${{ !github.event.repository.private }}
    uses: ./.github/workflows/lint-foundation-family-import.yml
    with:
      advisory: true

  # γ-1b Apache 2.0 license-header audit (Stage 1 advisory). Stage 2 codemod
  # and Stage 3 gating-flip require separate per-action authorization per
  # research §3.4.3 + [HANDOFF-023] bulk-push class.
  lint-license-header:
    name: License header (γ-1b Stage 1, advisory)
    if: ${{ !github.event.repository.private }}
    uses: ./.github/workflows/lint-license-header.yml
    with:
      advisory: true

  # γ-1c API-breakage advisory pilot. PR-only; baseline = PR base SHA.
  # 4-week observation; flip decision after A:B:C:D ratio review per §3.4.4.
  lint-api-breakage:
    name: API breakage (γ-1c, advisory pilot)
    if: ${{ github.event_name == 'pull_request' && !github.event.repository.private }}
    uses: ./.github/workflows/lint-api-breakage.yml
    with:
      advisory: true
    secrets: inherit

  # γ-2b GitHub dependency-graph submission — TEMPORARILY DISABLED.
  #
  # The submit-dep-graph.yml reusable declares `permissions: contents: write`
  # which the consumer-→layer-→universal call chain doesn't grant by default,
  # causing startup_failure across every consumer CI run. Re-enable once a
  # permissions-chain spike establishes the right pattern (per [CI-026]
  # Path B). The reusable file itself stays in place; only this caller is
  # commented out.
  # submit-dep-graph:
  #   name: Submit dep graph (γ-2b, advisory)
  #   if: ${{ github.event_name == 'push' && !github.event.repository.private && github.event.repository.fork == false }}
  #   uses: ./.github/workflows/submit-dep-graph.yml
  #   with:
  #     advisory: true
  #   secrets: inherit
