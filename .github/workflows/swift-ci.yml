name: Swift CI (reusable)

# ─── Third-party consumer notice ────────────────────────────────────────
# These reusable workflows are designed for swift-institute ecosystem
# packages. Outside callers consume at their own risk and should pin to
# an immutable SHA (`@<sha>`) rather than `@main`. The input/output
# surface and behavior may change without notice; the swift-institute/
# .github repo offers no compatibility guarantee to outside consumers.
# Per swift-institute/Research/ci-cd-cross-ecosystem-reuse.md v1.1.1 §Q4
# (third-party consumers are unintended-but-permitted).
# ────────────────────────────────────────────────────────────────────────

# Reusable CI workflow for Swift Institute packages. Provides the universal
# test matrix that applies across all five layers: macOS 26 (Swift 6.3 debug)
# + Ubuntu (Swift 6.3 release) + Ubuntu (Swift main nightly,
# continue-on-error) + Windows (Swift 6.3).
#
# TIERED SCHEDULING (R1/R2 principal ruling 2026-07-20): the matrix SHAPE
# above remains the ecosystem platform contract ([CI-010]/[CI-091] unchanged),
# but its full execution is scheduled, not per-push. A `plan` job classifies
# each run into a tier — lint (format+lint+swift-linter), build (+
# linux-release; the default), or full (everything, incl. advisory legs).
# Tags, '[ci full]', consumer workflow_dispatch, and ci-sweep.yml always get
# full; '[ci lint]' or docs/lint-config-only diffs get lint. The nightly
# ci-sweep.yml rotation re-verifies the full contract fleet-wide. Rationale:
# free-tier runner CONCURRENCY (5 macOS/org) — not minutes — is the binding
# budget; per-push full matrices spent it on advisory legs and produced
# multi-hour queue tails (measured 2026-07-20).
#
# Consume from a caller package's .github/workflows/ci.yml via:
#
#   jobs:
#     ci:
#       uses: swift-institute/.github/.github/workflows/swift-ci.yml@main
#       secrets: inherit
#
# Default `enable-private-repos: true` covers the canonical case (the
# vast majority of consumers depend on private intra-Institute siblings
# and need credentialed github.com URL rewrites for `swift package
# resolve`); pass `with: { enable-private-repos: false }` only for the
# rare public-deps-only consumer that wants to suppress the
# configure-git step. Credential resolution order (see the
# configure-private-repos composite): per-job swift-institute-bot App
# installation tokens (contents:read, auto-expiring) minted from the
# org-level SWIFT_INSTITUTE_BOT_APP_CLIENT_ID (or legacy-era
# SWIFT_INSTITUTE_BOT_APP_ID) + _APP_PRIVATE_KEY secrets; legacy
# PRIVATE_REPO_TOKEN as github.com-wide fallback. `secrets:
# inherit` is uniform across all consumers per
# [CI-031]/[CI-058]/[CI-059] post-uniformity-sweep, so the org-level
# secrets flow through without per-package ci.yml edits.
#
# Inputs are deliberately minimal. Toolchain versions, runner images, and
# the matrix shape are hard-coded ecosystem-wide; if a package needs a
# different shape, fork the workflow rather than parameterizing this one.
# The three dispatch-only inputs (target-repo, job, ref) are the sanctioned
# exception to that doctrine: they are DEFAULT-INERT — all empty on every
# push/PR/wrapper call, so a push builds the caller's own repo at the
# triggering ref, running every job, exactly as before — and change NOTHING
# for consumers. They exist solely so ci-dispatch.yml can retarget one job of
# this universal at another package on demand (a debug surface). Default-
# inertness is precisely what the fork-doctrine protects, so parameterizing
# for dispatch does not violate it. Seat-ruled 2026-07-03: this expands the
# ratified D3 spec from two dispatch inputs to three (target-repo + job + ref).
#
# `platform-support` is the second sanctioned exception (CI platform-support
# arc, 2026-07-14): a DEFAULT-INERT platform-identity declaration. Empty
# (every existing caller) = the full hard-coded matrix, bit-identical to
# before the input existed. Non-empty = the caller declares which platform
# families its package targets, and each platform leg consults the
# declaration in its `if:` guard. This does NOT re-open matrix derivation —
# the matrix is still never derived from Package.swift `platforms:` and
# cost-based collapse is still rejected ([CI-091]/[CI-096]). It exists
# because a platform-blind matrix MANUFACTURES architectural violations:
# the only way a POSIX specification package (ISO/IEC 9945 IS POSIX) can
# green a Windows leg is to emulate POSIX inside the POSIX spec package
# (swift-iso-9945 06fc4b2 — the manufactured violation this input exists
# to reverse), corrupting the exact package the leg claims to verify. The platform seam lives at the designated L3 boundary
# per [PLAT-ARCH-001], never inside an L2 spec package — so the honest fix
# is a CI-level identity declaration, not source-level platform emulation.
# Rule promotion tracked in the ci-cd-workflows skill.
#
# Caching policy: this workflow does NOT cache `.build/`. Every run does
# a fresh `swift package resolve` + clone + compile. This matches Apple's
# canonical `swiftlang/github-workflows/swift_package_test.yml` (995 lines,
# zero `actions/cache` uses) and is the right answer for our constraint
# set: `Package.resolved` is gitignored ecosystem-wide as a permanent
# library convention, so cache invalidation cannot key on resolved-graph
# state, and `restore-keys` partial-prefix matching silently serves stale
# branch-pinned dep checkouts. See
# `swift-institute/Research/ci-cache-strategy-branch-pinned-dependencies.md`.
#
# Layer-specific verification jobs (e.g. embedded-build verification for L1
# primitives) live in per-layer wrapper workflows under
# `<layer>/.github/.github/workflows/`, not here. swift-institute owns the
# universal floor; layers own their own invariants.

on:
  workflow_call:
    inputs:
      swift-version:
        type: string
        default: "6.3"
        description: "Swift version for the macOS, Ubuntu release, and Windows jobs. The nightly job is always Swift main (currently tracks 6.5-dev; floats as main moves)."
      enable-private-repos:
        type: boolean
        default: true
        description: "If true, configure credentialed git url rewrites (App-token primary, PRIVATE_REPO_TOKEN fallback) for github.com clones. Default true: most consumers in the swift-primitives ecosystem have private deps and need the credentials; public-only consumers may pass false explicitly."
      macos-runner:
        type: string
        default: "macos-26"
        description: "macOS runner image. Bump annually when GitHub adds a new image version. env.* is invalid in runs-on: per Actions context-availability rules — input is the working centralization mechanism."
      test-filter:
        type: string
        default: ""
        description: "If non-empty, append `--filter <value>` to every `swift test` invocation in this workflow. Hyphens in the value are converted to underscores so the regex matches Swift module identifiers (SwiftPM converts hyphenated target names to underscored module names). Used by per-issue consumer matrices (e.g., swift-institute/Issues calling this reusable per swift-issue-*). Empty default preserves existing consumer behavior."
      platform-support:
        type: string
        default: ""
        description: "Per-package CI platform-support declaration. Empty default — every existing caller passes nothing — runs the full matrix, bit-identical to before this input existed. Non-empty = comma-separated subset of `apple,linux,windows` (lowercase, no spaces): each platform leg runs only when its family token is present (apple → macos-release + apple-simulator-build; linux → linux-release + linux-nightly + linux-6-4; windows → windows-release). Quality gates (format, lint, swift-linter, advisory linters) are platform-neutral and never consult this input; ci-ok already treats skipped legs as passing. Declare ONLY platform-identity exclusions — a package whose specification or identity excludes a platform (POSIX/ISO-9945 spec packages, per-platform roots like swift-linux / swift-windows). This is NOT a cost knob ([CI-096]) and is NOT derived from Package.swift `platforms:` ([CI-091] — that block is a SwiftPM deployment-target declaration, not a CI-coverage signal). Rationale: a platform-blind matrix forces platform emulation into L2 spec packages to green an illegitimate leg; the platform seam is L3 per [PLAT-ARCH-001]. ci-dispatch.yml passes nothing, so single-job dispatch can still force any leg on any package (debug surface preserved)."
      tier:
        type: string
        default: ""
        description: "Verification-tier override (sanctioned default-inert input; R1/R2 principal ruling 2026-07-20). Empty default — existing push/PR/wrapper calls pass nothing — routes tier selection to the plan job's classifier: tag refs, workflow_dispatch, and '[ci full]' → full; '[ci lint]' or a docs/lint-config-only diff → lint; everything else → build. Non-empty forces 'lint' | 'build' | 'full' (ci-sweep.yml passes 'full' for the nightly rotation sweep). The tier gates SCHEDULING only — the matrix SHAPE ([CI-010]/[CI-091]) is untouched: every leg stays defined in this file and the full tier runs all of them; tags and sweeps always get the complete platform contract."
      target-repo:
        type: string
        default: ""
        description: "Dispatch-only target selector (set by ci-dispatch.yml). When non-empty, every build/test/lint job checks out this `owner/name` repo instead of the caller's own. Empty default — every push/PR/wrapper call passes nothing — so each checkout's repository field falls back to github.repository (the `|| github.repository` tail of the expression), bit-identical to the pre-dispatch implicit-default checkout. See ci-dispatch.yml."
      job:
        type: string
        default: ""
        description: "Dispatch-only single-job selector (set by ci-dispatch.yml). When non-empty, only the job whose id equals this value runs; every other selectable job skips via the composed `inputs.job == '' || inputs.job == '<id>'` guard. Empty default — every push/PR/wrapper call passes nothing — so the `inputs.job == ''` disjunct is true for every job and all jobs run exactly as before. The dispatch enum is fixed to the 13 dispatch-meaningful jobs; see ci-dispatch.yml for the list and the ci-ok / lint-api-breakage / lint-pr-title exclusions."
      ref:
        type: string
        default: ""
        description: "Dispatch-only target ref (set by ci-dispatch.yml). Selects the branch/tag/SHA of `target-repo` to build. Threaded into the `ref:` field of the 9 target checkouts only — NOT the swift-linter engine checkout, which pins its own tool SHA via steps.linter-sha.outputs.sha. Empty default — every push/PR/wrapper call passes nothing — so `actions/checkout` resolves the TRIGGERING ref (github.ref/SHA, i.e. the pushed branch), bit-identical to the pre-dispatch implicit-default checkout. See ci-dispatch.yml."
    secrets:
      PRIVATE_REPO_TOKEN:
        required: false
        description: |
          Legacy github.com-wide fallback credential for private-dep
          clones. Superseded by the App-token path; retained for orgs
          not yet provisioned with the App secrets.
      SWIFT_INSTITUTE_BOT_APP_CLIENT_ID:
        required: false
        description: |
          swift-institute-bot App client ID (org-level secret). With the
          private key, lets configure-private-repos mint per-job
          contents:read installation tokens for the layer orgs so
          `swift package resolve` can clone private intra-Institute deps.
      SWIFT_INSTITUTE_BOT_APP_ID:
        required: false
        description: |
          Legacy-era App ID secret name carried by some orgs (e.g.
          swift-primitives; numeric App ID value class). Accepted as
          fallback when _APP_CLIENT_ID is absent; client-id wins when
          both exist (create-github-app-token@v3 resolution order).
      SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY:
        required: false
        description: |
          swift-institute-bot App private key (org-level secret).
          Counterpart of SWIFT_INSTITUTE_BOT_APP_CLIENT_ID.

# ─── Tool-version pins ──────────────────────────────────────────────────
# Workflow-level env vars centralize tool versions so each release bump
# is a single edit instead of N grep-and-replace sites. Per
# feedback_latest_versions_only.md these MUST track the latest stable
# release of each tool; bump on every workflow touch where a newer
# release exists.
env:
  SWIFTLINT_VERSION: "0.63.3"
  # [CI-082] sha256sum -c pin for swiftlint_linux_amd64.zip at SWIFTLINT_VERSION.
  # Re-lock on every version bump per the rule body's bump protocol.
  SWIFTLINT_SHA256: "26db741d43f2f2dc26c0cf16911100a3e186c3d1dbb59e55ad3ac87b0de4538f"
  XCODE_VERSION: "26.6"

jobs:
  # ─── Tier plan (R1/R2 principal ruling 2026-07-20) ───────────────────────
  # Selects the verification tier for this run and runs the identity-conflict
  # fast-check ONCE (previously duplicated into every leg). Tier semantics:
  #   lint  — format + lint + swift-linter (Linux-only; the mass lint-
  #           compliance fast path; target <2min wall-clock)
  #   build — lint tier + linux-release (default for ordinary pushes)
  #   full  — the complete [CI-010]/[CI-091] platform contract including the
  #           advisory legs; unconditional on tag refs; forced by ci-sweep.yml
  #           and the '[ci full]' commit token.
  # ci-ok includes plan in its needs:, so a plan failure (e.g. an identity
  # conflict) fails the run even though every leg skips. Single-job dispatch
  # bypasses the plan entirely (inputs.job != '' → plan skips; each leg's
  # job-selector disjunct still fires), preserving ci-dispatch's
  # exactly-one-job property. Every leg guard composes `!cancelled()` so a
  # SKIPPED plan (dispatch) doesn't auto-skip the selected leg, while a
  # FAILED plan yields empty legs output → every leg skips → ci-ok red via
  # plan in needs.
  plan:
    name: Plan (tier + identity fast-check)
    if: ${{ !github.event.repository.private && inputs.job == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      tier: ${{ steps.classify.outputs.tier }}
      legs: ${{ steps.classify.outputs.legs }}
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target-repo || github.repository }}
          ref: ${{ inputs.ref }}

      # Identity-conflict fast-check ([PKG-DEP-009] class): fails in <1s with
      # the exact edge named when this repo's manifests spell one identity two
      # ways — the org-drift class that otherwise hangs SwiftPM 6.2/6.3 until
      # timeout-minutes fires (catalog §A26). Runs ONCE here for the whole run
      # (R1 consolidation 2026-07-20; previously duplicated into all 6 legs);
      # plan sits in ci-ok's needs so a conflict still fails the run.
      - name: Identity-conflict fast-check
        shell: bash
        run: |
          command -v curl >/dev/null 2>&1 && command -v python3 >/dev/null 2>&1 || { sudo apt-get update -qq && sudo apt-get install -qq -y curl python3; }
          curl -fsSL -o /tmp/fastcheck.py https://raw.githubusercontent.com/swift-institute/.github/main/.github/scripts/ci-identity-conflict-fastcheck.py
          python3 /tmp/fastcheck.py "${GITHUB_WORKSPACE}"

      - name: Classify tier
        id: classify
        shell: bash
        env:
          FORCED_TIER: ${{ inputs.tier }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          TIER="$FORCED_TIER"
          # Tag refs always get the full platform contract (release boundary).
          if [ -z "$TIER" ]; then
            case "$GITHUB_REF" in refs/tags/*) TIER="full" ;; esac
          fi
          # Commit-token override (push events; HEAD_MSG empty on PR events).
          if [ -z "$TIER" ]; then
            case "$HEAD_MSG" in
              *"[ci full]"*)  TIER="full" ;;
              *"[ci lint]"*)  TIER="lint" ;;
              *"[ci build]"*) TIER="build" ;;
            esac
          fi
          # Manual consumer dispatch = someone asking for verification → full.
          if [ -z "$TIER" ] && [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TIER="full"
          fi
          # Auto-downgrade to lint when the pushed range touches ONLY
          # docs/metadata/lint-config classes. Fail-safe: any classification
          # obstacle (force-push zeros, unfetchable before-SHA, empty diff)
          # falls through to the build tier.
          if [ -z "$TIER" ] && [ "$EVENT_NAME" = "push" ] && [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git fetch --no-tags --depth=1 origin "$BEFORE_SHA" 2>/dev/null || true
            if git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              CHANGED=$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" || true)
              if [ -n "$CHANGED" ]; then
                NON_MECHANICAL=false
                while IFS= read -r f; do
                  case "$f" in
                    *.md|LICENSE*|CITATION*|.gitignore|.spi.yml|.github/*|Lint.swift|Lint/*|.swiftlint.yml|.swift-format|*.docc/*) ;;
                    *) NON_MECHANICAL=true; break ;;
                  esac
                done <<< "$CHANGED"
                if [ "$NON_MECHANICAL" = "false" ]; then TIER="lint"; fi
              fi
            fi
          fi
          [ -n "$TIER" ] || TIER="build"
          case "$TIER" in
            lint)  LEGS="format,lint,swift-linter" ;;
            build) LEGS="format,lint,swift-linter,linux-release" ;;
            full)  LEGS="format,lint,swift-linter,linux-release,macos-release,windows-release,linux-nightly,linux-6-4,apple-simulator-build,lint-yaml,lint-broken-symlink,lint-license-header,lint-test-support-spine,advisory-summary" ;;
            *) echo "::error::Unknown tier '$TIER' (expected lint|build|full)"; exit 1 ;;
          esac
          echo "tier=$TIER" >> "$GITHUB_OUTPUT"
          echo "legs=$LEGS" >> "$GITHUB_OUTPUT"
          echo "Selected tier: $TIER"
          echo "legs: $LEGS"
          {
            echo "## CI tier: \`$TIER\`"
            echo ""
            echo "Selected legs: \`$LEGS\`. Tags, '[ci full]', ci-sweep, and consumer workflow_dispatch force the full platform contract; ci-ok attests the SELECTED tier (R1/R2 ruling 2026-07-20)."
          } >> "$GITHUB_STEP_SUMMARY"

  macos-release:
    name: macOS (Swift ${{ inputs.swift-version }}, debug)
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'macos-release' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',macos-release,'))) && (inputs.platform-support == '' || contains(format(',{0},', inputs.platform-support), ',apple,')) }}
    runs-on: ${{ inputs.macos-runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target-repo || github.repository }}
          ref: ${{ inputs.ref }}

      - uses: swift-institute/.github/.github/actions/configure-private-repos@main
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          app-client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          app-private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          enabled: ${{ inputs.enable-private-repos }}

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app"

      - name: Print toolchain info
        run: |
          swift --version
          echo "Runner image: ${{ runner.os }} on ${{ inputs.macos-runner }}"
          echo "Xcode: $(xcode-select -p)"

      - name: Test
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
        run: |
          if [ -n "$TEST_FILTER" ]; then
            FILTER=$(echo "$TEST_FILTER" | tr '-' '_')
            swift test -c debug --filter "$FILTER"
          else
            swift test -c debug
          fi

  linux-release:
    name: Ubuntu (Swift ${{ inputs.swift-version }}, release)
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'linux-release' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',linux-release,'))) && (inputs.platform-support == '' || contains(format(',{0},', inputs.platform-support), ',linux,')) }}
    runs-on: ubuntu-latest
    container: swift:${{ inputs.swift-version }}
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target-repo || github.repository }}
          ref: ${{ inputs.ref }}

      - uses: swift-institute/.github/.github/actions/configure-private-repos@main
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          app-client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          app-private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          enabled: ${{ inputs.enable-private-repos }}

      - uses: swift-institute/.github/.github/actions/install-system-deps@main

      - name: Print toolchain info
        run: |
          swift --version
          echo "Container image: ${{ job.container.image }}"
          echo "Container hostname: $(hostname)"
          echo "OS release:"
          cat /etc/os-release 2>/dev/null || true

      - name: Test (release)
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
        run: |
          if [ -n "$TEST_FILTER" ]; then
            FILTER=$(echo "$TEST_FILTER" | tr '-' '_')
            swift test -c release --filter "$FILTER"
          else
            swift test -c release
          fi

  linux-nightly:
    name: Ubuntu (Swift main nightly, release)
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'linux-nightly' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',linux-nightly,'))) && (inputs.platform-support == '' || contains(format(',{0},', inputs.platform-support), ',linux,')) }}
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-main-jammy
    continue-on-error: true
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target-repo || github.repository }}
          ref: ${{ inputs.ref }}

      - uses: swift-institute/.github/.github/actions/configure-private-repos@main
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          app-client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          app-private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          enabled: ${{ inputs.enable-private-repos }}

      - uses: swift-institute/.github/.github/actions/install-system-deps@main

      - name: Print toolchain info
        run: |
          swift --version
          echo "Container image: ${{ job.container.image }}"
          echo "Container hostname: $(hostname)"
          echo "OS release:"
          cat /etc/os-release 2>/dev/null || true

      - name: Test (release)
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
        run: |
          if [ -n "$TEST_FILTER" ]; then
            FILTER=$(echo "$TEST_FILTER" | tr '-' '_')
            swift test -c release --filter "$FILTER"
          else
            swift test -c release
          fi

  # ─── Swift 6.4.x release-branch nightly (advisory; upcoming-release signal) ──
  # Mirrors linux-nightly but pins the release/6.4.x nightly container instead
  # of nightly-main (=6.5-dev). This is the upcoming-RELEASE signal — the same
  # leg Apple/swiftlang run as `nightly-6.4.x` in
  # swiftlang/github-workflows/.github/workflows/swift_package_test.yml — and it
  # answers "does 6.4 specifically pass" without conflating 6.4 + 6.5 changes.
  # Advisory per [CI-021]/[CI-091]: continue-on-error, excluded from ci-ok
  # needs, listed in advisory-summary. continue-on-error is valid at job level
  # here because this is a runs-on job, not a `uses:` job ([CI-105]). At 6.4 GA
  # (~Sept 2026) this graduates to a gating `swift:6.4` stable leg, retiring the
  # `compiler(<6.4)` §A9 gates (swift-xml / swift-w3c-xml / swift-graph / swift-plist).
  linux-6-4:
    name: Ubuntu (Swift 6.4.x nightly, release)
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'linux-6-4' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',linux-6-4,'))) && (inputs.platform-support == '' || contains(format(',{0},', inputs.platform-support), ',linux,')) }}
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-6.4.x-jammy
    continue-on-error: true
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target-repo || github.repository }}
          ref: ${{ inputs.ref }}

      - uses: swift-institute/.github/.github/actions/configure-private-repos@main
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          app-client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          app-private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          enabled: ${{ inputs.enable-private-repos }}

      - uses: swift-institute/.github/.github/actions/install-system-deps@main

      - name: Print toolchain info
        run: |
          swift --version
          echo "Container image: ${{ job.container.image }}"
          echo "Container hostname: $(hostname)"
          echo "OS release:"
          cat /etc/os-release 2>/dev/null || true

      - name: Test (release)
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
        run: |
          if [ -n "$TEST_FILTER" ]; then
            FILTER=$(echo "$TEST_FILTER" | tr '-' '_')
            swift test -c release --filter "$FILTER"
          else
            swift test -c release
          fi

  windows-release:
    name: Windows (Swift ${{ inputs.swift-version }}, debug)
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'windows-release' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',windows-release,'))) && (inputs.platform-support == '' || contains(format(',{0},', inputs.platform-support), ',windows,')) }}
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target-repo || github.repository }}
          ref: ${{ inputs.ref }}

      - uses: swift-institute/.github/.github/actions/configure-private-repos@main
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          app-client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          app-private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          enabled: ${{ inputs.enable-private-repos }}

      - name: Install Swift
        uses: SwiftyLab/setup-swift@38f54a76b70d989321de9dc7c840618c08cf56e9  # v1.14.0
        with:
          swift-version: ${{ inputs.swift-version }}

      - name: Print toolchain info
        run: |
          swift --version
          echo "Runner: ${{ runner.os }}"
          echo "Hostname: $(hostname)"

      - name: Test
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
        run: |
          if ("$env:TEST_FILTER") {
            $filter = $env:TEST_FILTER -replace '-', '_'
            swift test -c debug --filter $filter
          } else {
            swift test -c debug
          }

  # ─── Apple-simulator build (γ advisory; resource-bundle CodeSign gate) ──
  # `swift build` / `swift test` (the macOS/Linux/Windows legs above) never
  # run the resource-bundle CodeSign phase. `xcodebuild` against a simulator
  # destination does — it is the only leg that catches resource bundles that
  # fail iOS codesign. Known trigger: a SwiftPM resource bundle containing a
  # top-level directory named `Resources` (from `.copy("Resources")`) collides
  # with the reserved bundle layout and fails with "bundle format unrecognized,
  # invalid, or unsuitable" on the simulator — invisible to `swift test`.
  # (Origin: swift-iso/swift-iso-639#3; fix = rename the copied dir, e.g.
  # `.copy("Data")`.) Per [CI-091] the matrix
  # covers all four Apple simulator platforms and is never collapsed.
  apple-simulator-build:
    name: ${{ matrix.platform }} Simulator (Swift ${{ inputs.swift-version }}, debug)
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'apple-simulator-build' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',apple-simulator-build,'))) && (inputs.platform-support == '' || contains(format(',{0},', inputs.platform-support), ',apple,')) }}
    runs-on: ${{ inputs.macos-runner }}
    # [CI-021]/[CI-091] advisory leg during the apple-simulator soak window.
    # continue-on-error keeps these legs non-gating (excluded from ci-ok
    # needs, like linux-nightly) while the ecosystem absorbs the new platform
    # coverage. Valid at job level because this is a runs-on job, not a
    # `uses:` job — [CI-105] only forbids the combo on workflow_call jobs.
    # Promote to gating (drop this line + add to ci-ok needs) per the soak
    # protocol once the legs are green ecosystem-wide.
    continue-on-error: true
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # [CI-091] uniform-platform-matrix doctrine: the four Apple simulator
        # platforms are the platform contract, never collapsed to a
        # representative subset (M4 REJECT 2026-05-06).
        platform: [iOS, tvOS, watchOS, visionOS]
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target-repo || github.repository }}
          ref: ${{ inputs.ref }}

      - uses: swift-institute/.github/.github/actions/configure-private-repos@main
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          app-client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          app-private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          enabled: ${{ inputs.enable-private-repos }}

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app"

      - name: Print toolchain info
        run: |
          swift --version
          echo "Runner image: ${{ runner.os }} on ${{ inputs.macos-runner }}"
          echo "Xcode: $(xcode-select -p)"
          echo "Platform: ${{ matrix.platform }} Simulator"

      - name: Discover SwiftPM-generated scheme
        # The scheme name is NOT always the package name — a package may
        # rename its product/namespace (e.g. [MOD-031]), so deriving the
        # scheme from the manifest name alone breaks. Probe
        # `xcodebuild -list -json`; fall back to `swift package describe`.
        # (Matches the proven L1-wrapper discovery shape.)
        shell: bash
        run: |
          set -euo pipefail
          SCHEME=$(xcodebuild -list -json 2>/dev/null | jq -r '.project.schemes[0] // .workspace.schemes[0] // ""')
          if [ -z "$SCHEME" ]; then
            SCHEME=$(swift package describe --type json | jq -r '.name')
          fi
          if [ -z "$SCHEME" ]; then
            echo "Could not determine scheme name" >&2
            exit 1
          fi
          echo "Discovered scheme: ${SCHEME}"
          echo "SCHEME=${SCHEME}" >> "$GITHUB_ENV"

      - name: Build for ${{ matrix.platform }} Simulator
        # A generic simulator destination is sufficient — no booted simulator
        # is needed and it reproduces the same resource-bundle CodeSign failure
        # as a concrete device id. No `.build` cache per [CI-040]. This is the
        # only leg that runs the resource-bundle CodeSign phase.
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild build \
            -scheme "${SCHEME}" \
            -destination "generic/platform=${{ matrix.platform }} Simulator" \
            -skipPackagePluginValidation \
            -skipMacroValidation

  # ─── Ecosystem-wide quality gates ─────────────────────────────────────
  # `format` and `lint` run on every consumer CI in parallel with the
  # matrix. They read each consumer's own `.swift-format` and
  # `.swiftlint.yml` configs (per-package customization preserved); the
  # tools find their config by walking up from the working directory.
  # Per-repo `swift-format.yml` / `swiftlint.yml` workflow files are
  # forbidden once these absorbed jobs land — see [CI-031].
  #
  # Developer contract: CI runs `swift-format lint --strict` (NOT
  # `format --in-place + auto-commit`). Run `swift-format format
  # --in-place Sources Tests` locally before pushing.

  format:
    name: swift-format lint
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'format' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',format,'))) }}
    runs-on: ubuntu-latest
    container: swift:${{ inputs.swift-version }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target-repo || github.repository }}
          ref: ${{ inputs.ref }}

      - name: Print swift-format version
        run: swift-format --version

      - name: Lint formatting (--strict)
        # Path exclusions ([Phase 1.5] 2026-05-05):
        #   *.docc/Resources/  — DocC tutorial code samples (didactic fixtures)
        #   Tests/Support/     — Test_Support fixture modules
        #   Tests/Tutorial/    — Tutorial verification tests (same didactic
        #                        code as DocC tutorials, just under Tests/)
        # Other Tests/** paths are still linted — rules like NeverForceUnwrap,
        # NeverUseForceTry, ValidateDocumentationComments remain valuable on
        # actual test code outside fixture/tutorial modules.
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find Sources Tests -name '*.swift' \
            -not -path '*/*.docc/Resources/*' \
            -not -path 'Tests/Support/*' \
            -not -path 'Tests/Tutorial/*' \
            -print0 2>/dev/null || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Swift files to lint."
            exit 0
          fi
          swift-format lint --strict --ignore-unparsable-files "${files[@]}"

  lint:
    name: SwiftLint
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'lint' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',lint,'))) }}
    runs-on: ubuntu-latest
    container: swift:${{ inputs.swift-version }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target-repo || github.repository }}
          ref: ${{ inputs.ref }}

      - name: Cache SwiftLint binary
        id: cache-swiftlint
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/swiftlint
          key: ${{ runner.os }}-swiftlint-${{ env.SWIFTLINT_VERSION }}

      - name: Install SwiftLint ${{ env.SWIFTLINT_VERSION }}
        if: steps.cache-swiftlint.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -qq -y curl unzip
          curl -fsSL -o /tmp/swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/${{ env.SWIFTLINT_VERSION }}/swiftlint_linux_amd64.zip"
          # [CI-082] verify against pinned SHA-256 before unpack/install. Fails
          # closed on digest mismatch (no `|| true` swallow).
          echo "${SWIFTLINT_SHA256}  /tmp/swiftlint.zip" | sha256sum -c -
          unzip -q /tmp/swiftlint.zip -d /tmp/swiftlint_extracted
          mv /tmp/swiftlint_extracted/swiftlint /usr/local/bin/
          chmod +x /usr/local/bin/swiftlint
          rm -rf /tmp/swiftlint.zip /tmp/swiftlint_extracted

      - name: Print SwiftLint version
        run: swiftlint --version

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  # ─── swift-linter (gating; swiftsyntax-based AST linter) ─────────────────
  # SwiftSyntax-based AST linter at swift-foundations/swift-linter. Phase 1
  # ships R5 (`unchecked_call_site`): flags `__unchecked:` argument labels
  # at call sites only — distinguishing call-site uses (anti-pattern per
  # [CONV-016] tier 5) from declaration-site uses (legitimate extension-init
  # machinery per [CONV-001]). The structural distinction is invisible to
  # regex but trivial on the AST.
  #
  # See swift-institute/Research/swiftsyntax-based-custom-linter-investigation.md
  # for the architecture (Option C standalone CLI, Option F symbol-graph
  # extension) and 6-phase phasing.
  #
  # GATING (principal ruling 2026-07-19; the Phase-1 "advisory" label is
  # retired): the job is in ci-ok's needs, and `--exit-policy strict` exits
  # non-zero exactly when any finding has severity `.error` — warning-severity
  # findings are emitted but never fail the run. The linter is run-from-source
  # via `swift run --package-path` against a checkout of swift-linter. Once
  # the package is published with a binary release, this step swaps to a
  # cached-binary install (mirroring the SwiftLint job above).
  #
  # Phase 3 (2026-06-25): adds a composite-keyed prebuilt "standard runner"
  # cache so pure-bundle consumers lint warm in ~0.65s instead of paying the
  # per-run eval recompile. See the runner-cache steps below and the research
  # doc's Phase-3 § (A-dynamic composite key).

  swift-linter:
    name: swift-linter
    # FILE-GATED: lints only consumers
    # that ship a `Lint.swift` at the repo root (the consumer config shape per
    # swift-linter [LINT-SETUP-001]); consumers without one short-circuit at the
    # detect step (cheap no-op). No opt-in input — the file IS the activation
    # signal, so coverage grows as packages add one.
    #
    # Re-enabled 2026-06-24 after swift-foundations/swift-linter went public
    # (was DISABLED 2026-05-08 while the linter repo was private). Builds the
    # linter from source via `swift run`; private-dep auth comes from the same
    # configure-private-repos step the build/test matrix jobs use.
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'swift-linter' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',swift-linter,'))) }}
    runs-on: ubuntu-latest
    container: swift:${{ inputs.swift-version }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target-repo || github.repository }}
          ref: ${{ inputs.ref }}
          path: consumer

      - name: Detect Lint.swift
        id: detect
        shell: bash
        working-directory: consumer
        run: |
          if [ -f Lint.swift ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Found Lint.swift — running swift-linter."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No Lint.swift at repo root — skipping swift-linter (no-op)."
          fi

      # ── Prebuilt-binary fast path (approved 2026-07-20) ──
      # Downloads the dispatcher + standard runner published by
      # swift-foundations/swift-linter's publish-ci-binaries.yml (rolling
      # non-semver `ci-binaries` release; built inside swift:6.3, the same
      # image this job runs in). Replaces the per-repo cache bake: Actions
      # caches are REPOSITORY-scoped, so the old composite-key cache made
      # every consumer repo rebuild after any engine/rule-pack commit
      # (measured 2026-07-20: 18 of 28 runs cold, 393-1450s; median job
      # 502s). Verification: sha256sum -c against the release's SHA256SUMS
      # ([CI-082]-class; trust anchor is GitHub TLS + release write-control,
      # the same anchor the previous ls-remote + main-ref checkout relied
      # on). On ANY download/verify failure this step reports ok=false and
      # the legacy source-build fallback below runs instead — never red on
      # a missing/misshapen release.
      - name: Download prebuilt linter binaries
        if: ${{ steps.detect.outputs.present == 'true' }}
        id: binaries
        shell: bash
        run: |
          set -uo pipefail
          command -v curl >/dev/null 2>&1 || { apt-get update -qq && apt-get install -qq -y curl ca-certificates; }
          base="https://github.com/swift-foundations/swift-linter/releases/download/ci-binaries"
          dir=$(mktemp -d)
          ok=true
          for f in SHA256SUMS MANIFEST.txt swift-linter swift-linter-runner; do
            curl -fsSL --retry 2 -o "$dir/$f" "$base/$f" || { ok=false; break; }
          done
          if [ "$ok" = "true" ]; then
            (cd "$dir" && sha256sum -c SHA256SUMS) || ok=false
          fi
          if [ "$ok" = "true" ]; then
            install -m 0755 "$dir/swift-linter" /usr/local/bin/swift-linter
            install -m 0755 "$dir/swift-linter-runner" /usr/local/bin/swift-linter-runner
            echo "Prebuilt binaries installed. Build manifest:"
            cat "$dir/MANIFEST.txt"
          else
            echo "::warning::ci-binaries download/verify failed; falling back to per-repo source build."
          fi
          echo "ok=$ok" >> "$GITHUB_OUTPUT"

      - name: Configure private-dep access
        if: ${{ steps.detect.outputs.present == 'true' }}
        uses: swift-institute/.github/.github/actions/configure-private-repos@main
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          app-client-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
          app-id: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
          app-private-key: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}
          enabled: ${{ inputs.enable-private-repos }}

      # swift-linter's dependency graph pulls swift-linux-standard, whose
      # CLinuxKernelShim #includes <uuid/uuid.h> — absent from the minimal
      # swift:N image ([CI-092]). Install libuuid headers before building
      # (covers both the dispatcher build and the Lint.swift eval-project build).
      - name: Install system libraries (libuuid)
        if: ${{ steps.detect.outputs.present == 'true' }}
        run: apt-get update -qq && apt-get install -qq -y uuid-dev

      # ── Tag-free engine-binary cache (Phase 1 of
      # near-instant-lint-with-external-rule-loading.md) ──
      # Build the swift-linter dispatcher CLI once per engine `main` HEAD and
      # reuse it, removing the ~270s engine build from every run where main is
      # unchanged. The cache key is the immutable engine commit sha (+ Swift
      # version): a [CI-044] versioned-tool-binary cache (single binary, NOT a
      # `.build/` cache — [CI-040] honored), exact-match with no restore-keys
      # ([CI-042]). No tag / no release: tracks `main` per the ecosystem
      # branch:"main" convention.
      # ── Legacy source-build FALLBACK (runs only when the prebuilt-binary
      # download above failed; see steps.binaries) ──
      - name: Resolve swift-linter main HEAD
        if: ${{ steps.detect.outputs.present == 'true' && steps.binaries.outputs.ok != 'true' }}
        id: linter-sha
        run: echo "sha=$(git ls-remote https://github.com/swift-foundations/swift-linter.git main | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache swift-linter dispatcher binary
        if: ${{ steps.detect.outputs.present == 'true' && steps.binaries.outputs.ok != 'true' }}
        id: cache-swift-linter
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/swift-linter
          key: ${{ runner.os }}-swift${{ inputs.swift-version }}-linterbin-${{ steps.linter-sha.outputs.sha }}

      # ── Standard-runner full-bake cache (Phase 3 of
      # near-instant-lint-with-external-rule-loading.md) ──
      # A prebuilt "standard runner" (engine + SwiftSyntax + the standard
      # primitives rule packs — `Runner/` in the swift-linter repo) lints
      # pure-bundle consumers WARM in ~0.65s, skipping the per-run eval
      # materialize-compile (the ~155s SwiftSyntax-from-source floor that
      # dominates a cold eval). The dispatcher's CLI fast path
      # (Lint.File.Single.Classifier) routes a bare-`Bundle.primitives` consumer
      # to this runner via SWIFT_LINTER_RUNNER; inline/custom-rule consumers fall
      # back to the eval path, so external/consumer-declared rule loading stays
      # intact on both paths.
      #
      # The cache key ([CI-044] tool-binary carve-out — single binary, NOT a
      # `.build` cache so [CI-040] is honored; exact-match with NO restore-keys
      # per [CI-042]) is a COMPOSITE over the engine HEAD AND the standard
      # rule-pack HEADs on branch:"main" ("A-dynamic"): a commit to the engine
      # (which carries Runner/ too) or to ANY standard rule pack busts the key →
      # one shared rebuild → instant warm thereafter, so the baked rule set
      # always tracks latest-committed main. No tag / no version pin.
      - name: Resolve standard rule-pack HEADs (composite runner key)
        if: ${{ steps.detect.outputs.present == 'true' && steps.binaries.outputs.ok != 'true' }}
        id: runner-key
        shell: bash
        run: |
          set -euo pipefail
          engine='${{ steps.linter-sha.outputs.sha }}'
          # The rule-source repos baked into the runner. Their `main` HEADs +
          # the engine HEAD are the freshness coordinate; primitive support
          # libs (cardinal/byte/tagged/…) are deliberately NOT keyed (they do
          # not define rules and would tank the warm-hit rate — see the
          # research doc Phase-3 §, composite-key scope).
          primrules=$(git ls-remote https://github.com/swift-primitives/swift-primitives-linter-rules.git main | cut -f1)
          instrules=$(git ls-remote https://github.com/swift-foundations/swift-institute-linter-rules.git main | cut -f1)
          unirules=$(git ls-remote https://github.com/swift-foundations/swift-linter-rules.git main | cut -f1)
          linterprim=$(git ls-remote https://github.com/swift-primitives/swift-linter-primitives.git main | cut -f1)
          digest=$(printf '%s\n' "$engine" "$primrules" "$instrules" "$unirules" "$linterprim" | sort | sha256sum | cut -d' ' -f1)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Runner composite digest=$digest (engine=$engine primrules=$primrules instrules=$instrules unirules=$unirules linterprim=$linterprim)"

      - name: Cache swift-linter standard runner
        if: ${{ steps.detect.outputs.present == 'true' && steps.binaries.outputs.ok != 'true' }}
        id: cache-runner
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/swift-linter-runner
          key: ${{ runner.os }}-swift${{ inputs.swift-version }}-linterrunner-${{ steps.runner-key.outputs.digest }}

      # Checkout the engine source when EITHER the dispatcher or the runner
      # cache missed — both build from this checkout (Runner/ ships inside it).
      - name: Checkout swift-linter (cache miss)
        if: ${{ steps.detect.outputs.present == 'true' && steps.binaries.outputs.ok != 'true' && (steps.cache-swift-linter.outputs.cache-hit != 'true' || steps.cache-runner.outputs.cache-hit != 'true') }}
        uses: actions/checkout@v6
        with:
          repository: swift-foundations/swift-linter
          ref: ${{ steps.linter-sha.outputs.sha }}
          path: swift-linter

      - name: Build swift-linter dispatcher (cache miss)
        if: ${{ steps.detect.outputs.present == 'true' && steps.binaries.outputs.ok != 'true' && steps.cache-swift-linter.outputs.cache-hit != 'true' }}
        shell: bash   # the swift:N container's default run-shell is dash; need bash for `set -o pipefail`
        run: |
          set -euo pipefail
          swift build --package-path swift-linter --product swift-linter
          install -m 0755 swift-linter/.build/debug/swift-linter /usr/local/bin/swift-linter

      - name: Build swift-linter standard runner (cache miss)
        if: ${{ steps.detect.outputs.present == 'true' && steps.binaries.outputs.ok != 'true' && steps.cache-runner.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          # One-time full bake (~310–560s): engine + SwiftSyntax + standard rule
          # packs, debug. Shared across all consumers via the composite-keyed
          # cache until a keyed HEAD moves.
          swift build --package-path swift-linter/Runner --product runner
          install -m 0755 swift-linter/Runner/.build/debug/runner /usr/local/bin/swift-linter-runner

      - name: Run swift-linter
        if: ${{ steps.detect.outputs.present == 'true' }}
        # The dispatcher binary references the engine by branch:"main" (Phase 0)
        # — NO SWIFT_LINTER_PATH — so it dispatches without an engine source tree.
        # SWIFT_LINTER_RUNNER provisions the fast path: a bare-`Bundle.primitives`
        # consumer is linted by the prebuilt runner (~0.65s warm); any inline/
        # custom-rule consumer falls through to the eval path, which compiles the
        # consumer's declared rule packs + the engine `Linter` library exactly as
        # before (private-dep auth configured above; libuuid present).
        env:
          SWIFT_LINTER_RUNNER: /usr/local/bin/swift-linter-runner
        run: swift-linter "$GITHUB_WORKSPACE/consumer" --exit-policy strict

  # ════════════════════════════════════════════════════════════════════════
  # Advisory CI gates — grouped by category for UI clarity.
  # Each gate takes an `advisory: bool` input; γ flip = drop the `with:`
  # block at the calling site (default false = gating). Job declaration
  # order here drives the order in the consumer's CI sidebar.
  # ════════════════════════════════════════════════════════════════════════

  # ─── γ-2 Mechanical hygiene ──────────────────────────────────────────────
  # Workflow YAML + filesystem checks. Cheap, run on ubuntu-latest no-container.
  # γ-2 flip after 2 clean weekly cron sweeps (consolidated tracking issue).

  lint-yaml:
    name: yamllint (γ-2, advisory)
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'lint-yaml' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',lint-yaml,'))) }}
    uses: ./.github/workflows/lint-yaml.yml
    with:
      advisory: true

  lint-broken-symlink:
    name: Broken symlinks (γ-2, advisory)
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'lint-broken-symlink' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',lint-broken-symlink,'))) }}
    uses: ./.github/workflows/lint-broken-symlink.yml
    with:
      advisory: true

  # ─── γ-1 L1 identity invariants + Phase β [MOD-024] ──────────────────────
  # Per-package source-content audits. License-header runs on ubuntu-latest
  # no-container (pure Python). Test Support Spine uses swift:6.3 because
  # it invokes `swift package dump-package`. Each has its own flip schedule
  # per research §3.4.
  #
  # Foundation-import (γ-1a) was migrated 2026-05-05 from this advisory
  # workflow to the Tier 2 SwiftLint custom rule pair (no_foundation_import_*)
  # at swift-primitives/.github/.swiftlint.yml — see swift-institute/Research/
  # rollout-phase-1-results.md.

  lint-license-header:
    name: License header (γ-1b Stage 1, advisory)
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'lint-license-header' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',lint-license-header,'))) }}
    uses: ./.github/workflows/lint-license-header.yml
    with:
      advisory: true

  lint-test-support-spine:
    name: Test Support Spine ([MOD-024], advisory)
    needs: plan
    if: ${{ !cancelled() && !github.event.repository.private && (inputs.job == 'lint-test-support-spine' || (inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',lint-test-support-spine,'))) }}
    uses: ./.github/workflows/lint-test-support-spine.yml
    with:
      advisory: true     # Phase β. Drop in Phase γ.
      swift-version: ${{ inputs.swift-version }}

  # ─── PR-only conventions ─────────────────────────────────────────────────
  # Fire on pull_request events only; skipped on push/dispatch.

  lint-api-breakage:
    name: API breakage (γ-1c, advisory pilot)
    if: ${{ github.event_name == 'pull_request' && !github.event.repository.private }}
    uses: ./.github/workflows/lint-api-breakage.yml
    with:
      advisory: true
      swift-version: ${{ inputs.swift-version }}
    secrets: inherit

  lint-pr-title:
    name: PR title format (γ-4, advisory)
    if: ${{ github.event_name == 'pull_request' && !github.event.repository.private }}
    uses: ./.github/workflows/lint-pr-title.yml
    with:
      advisory: true

  # γ-2b dep-graph submission lives in submit-dep-graph-weekly.yml (a
  # centralized per-org cron orchestrator), not as a per-PR caller here.
  # The transitive consumer-→layer-→universal call chain can't grant
  # `contents: write` cleanly under [CI-031] minimum (v1.3.0 §3.5.4),
  # so the architecture is centralized: one workflow at swift-institute/
  # .github fires Monday 06:50 UTC and submits dep-graphs for all public
  # consumer repos via `gh api -X POST /repos/<target>/dependency-graph/snapshots`.

  # ─── Advisory results surface (informational, non-gating) ─────────────────
  # Renders one row per advisory leg (leg name + result) to the run summary so
  # advisory red is legible in ONE place, instead of scattered across the job
  # sidebar. Informational ONLY: it is excluded from ci-ok's needs (never a
  # merge gate) and carries `continue-on-error: true` so a rendering hiccup can
  # never fail the run. Keyed on always() + not-private + `inputs.job == ''`
  # EXACTLY like ci-ok, so it SKIPS on any single-job dispatch (preserving
  # ci-dispatch's exactly-one-job property) and runs only on push/PR. It carries
  # no `inputs.job == '<id>'` selector and is absent from ci-dispatch.yml's `job`
  # enum. `needs:` enumerates every advisory
  # leg per [CI-002] (the continue-on-error legs linux-nightly / linux-6-4 /
  # apple-simulator-build + the six nested advisory:true linters; swift-linter
  # is GATING — it sits in ci-ok's needs, not here).
  advisory-summary:
    name: Advisory results (informational)
    # Tier-gated (R2 ruling 2026-07-20): the advisory legs it renders run only
    # in the full tier, so the summary is meaningful only there. On lint/build
    # tiers it skips with the legs.
    if: ${{ !cancelled() && !github.event.repository.private && inputs.job == '' && contains(format(',{0},', needs.plan.outputs.legs), ',advisory-summary,') }}
    continue-on-error: true
    needs:
      - plan
      - linux-nightly
      - linux-6-4
      - apple-simulator-build
      - lint-yaml
      - lint-broken-symlink
      - lint-license-header
      - lint-test-support-spine
      - lint-api-breakage
      - lint-pr-title
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit-mode egress logging)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Render advisory leg results to the run summary
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          # Informational only — this job is excluded from ci-ok's needs and
          # never gates the merge. One row per advisory leg (name + result).
          # ubuntu-latest pre-installs jq.
          {
            echo "## Advisory leg results"
            echo ""
            echo "Informational only — advisory legs never gate the merge (see \`ci-ok\`)."
            echo ""
            echo "| Advisory leg | Result |"
            echo "| --- | --- |"
            jq -r 'to_entries | sort_by(.key)[] | "| \(.key) | \(.value.result) |"' <<< "$NEEDS_JSON"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Conclusion aggregator ────────────────────────────────────────────────
  # Single required-status-check name for branch protection. needs: lists
  # every job that should gate the merge; ci-ok succeeds iff every needed
  # job succeeded (or was skipped — visibility-gate path on private repos).
  # Cancelled or failed needs propagate to ci-ok failing.
  #
  # Rationale: branch protection on consumer repos requires only `ci-ok`
  # rather than every individual job name. Adding/removing jobs in this
  # workflow is a local edit (update needs:); branch-protection rules don't
  # need per-repo updates. Closes the M6 "required-check names interpolate
  # ${{ inputs.swift-version }}" drift class — ci-ok's name doesn't
  # interpolate anything.
  #
  # Excluded from needs: by design:
  #   - linux-nightly (continue-on-error: true; nightly toolchain
  #     instability is not the consumer's defect to fix)
  #   - All advisory linters (lint-yaml, lint-broken-symlink,
  #     lint-foundation-family-import [retired], lint-license-header,
  #     lint-test-support-spine, lint-api-breakage, lint-pr-title) — they
  #     pass with `with: { advisory: true }` and aren't gating until their
  #     respective γ-flips land
  ci-ok:
    # plan sits in needs (R1 ruling 2026-07-20): a plan failure (identity
    # conflict / classifier error) fails ci-ok even though every leg skips.
    # Tier-skipped legs pass via the existing skipped-as-passing semantics —
    # ci-ok attests "the SELECTED tier passed"; the full-contract attestation
    # lives at tag refs and the nightly ci-sweep rotation.
    if: ${{ always() && !github.event.repository.private && inputs.job == '' }}
    needs:
      - plan
      - macos-release
      - linux-release
      - windows-release
      - format
      - lint
      - swift-linter
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Aggregate required-job results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          # success or skipped → pass; failure or cancelled → fail.
          # ubuntu-latest pre-installs jq.
          jq --exit-status 'all(.result == "success" or .result == "skipped")' <<< "$NEEDS_JSON"
