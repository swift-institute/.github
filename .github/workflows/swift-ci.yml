name: Swift CI (reusable)

# Reusable CI workflow for Swift Institute packages. Provides the test
# matrix: macOS 26 (Swift 6.3 debug) + Ubuntu (Swift 6.3 release) +
# Ubuntu (Swift 6.4-dev nightly, continue-on-error) + Windows (Swift 6.3),
# plus an opt-in Ubuntu Embedded Swift build job (Swift 6.4-dev,
# continue-on-error) for Foundation-free packages that maintain embedded
# compatibility per swift-package-build [PKG-BUILD-007]–[PKG-BUILD-008].
#
# Consume from a caller package's .github/workflows/ci.yml via:
#
#   jobs:
#     ci:
#       uses: swift-institute/.github/.github/workflows/swift-ci.yml@main
#       with:
#         cache-key-prefix: swift63-spm-v1
#         enable-private-repos: true       # only if package depends on private repos
#         enable-embedded-check: true      # only if package is Foundation-free and embedded-buildable
#       secrets:
#         PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
#
# Inputs are deliberately minimal. Toolchain versions, runner images, and
# the matrix shape are hard-coded ecosystem-wide; if a package needs a
# different shape, fork the workflow rather than parameterizing this one.
#
# `enable-private-repos: true` rewrites github.com URLs to embed
# PRIVATE_REPO_TOKEN so `swift package resolve` can clone private deps.
# Omit when the package has no private dependencies.
#
# `enable-embedded-check: true` runs an additional `swift build` under
# `-enable-experimental-feature Embedded` against the Swift 6.4-dev
# nightly Linux container. Build-only (no `swift test` — no embedded
# test runner). continue-on-error: true (matches linux-nightly precedent;
# the embedded job uses the nightly container and inherits its instability
# profile). Opt in only when the package satisfies [PRIM-FOUND-001]
# (Foundation-free) and uses `#if !hasFeature(Embedded)` source guards
# per [PKG-BUILD-007]; opt out for L3+ packages with Foundation deps.

on:
  workflow_call:
    inputs:
      cache-key-prefix:
        type: string
        default: "swift63-spm-v1"
        description: "Cache-key prefix, typically '{swift-version tag}-spm-v{cache bump}'."
      swift-version:
        type: string
        default: "6.3"
        description: "Swift version for the macOS, Ubuntu release, and Windows jobs. The nightly job is always 6.4-dev."
      enable-private-repos:
        type: boolean
        default: false
        description: "If true, configure git to use PRIVATE_REPO_TOKEN for github.com clones."
      enable-embedded-check:
        type: boolean
        default: false
        description: "If true, run an additional `swift build` under `-enable-experimental-feature Embedded` against the 6.4-dev nightly Linux container. Opt in only for Foundation-free, embedded-buildable packages per [PKG-BUILD-007]/[PKG-BUILD-008]."
    secrets:
      PRIVATE_REPO_TOKEN:
        required: false

jobs:
  macos-release:
    name: macOS (Swift ${{ inputs.swift-version }}, debug)
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Print Swift version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: macos-${{ inputs.cache-key-prefix }}-${{ hashFiles('Package.swift', 'Package@*.swift') }}
          restore-keys: |
            macos-${{ inputs.cache-key-prefix }}-

      - name: Test
        run: swift test -c debug

  linux-release:
    name: Ubuntu (Swift ${{ inputs.swift-version }}, release)
    runs-on: ubuntu-latest
    container: swift:6.3
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: linux-${{ inputs.cache-key-prefix }}-${{ hashFiles('Package.swift', 'Package@*.swift') }}
          restore-keys: linux-${{ inputs.cache-key-prefix }}-

      - name: Test (release)
        run: swift test -c release

  linux-nightly:
    name: Ubuntu (Swift 6.4-dev nightly, release)
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-main-jammy
    continue-on-error: true
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Print Swift version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: linux-nightly-${{ inputs.cache-key-prefix }}-${{ hashFiles('Package.swift', 'Package@*.swift') }}
          restore-keys: linux-nightly-${{ inputs.cache-key-prefix }}-

      - name: Test (release)
        run: swift test -c release

  embedded-check:
    name: Ubuntu (Swift 6.4-dev nightly, Embedded build)
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-main-jammy
    if: inputs.enable-embedded-check
    continue-on-error: true
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Print Swift version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: linux-embedded-${{ inputs.cache-key-prefix }}-${{ hashFiles('Package.swift', 'Package@*.swift') }}
          restore-keys: linux-embedded-${{ inputs.cache-key-prefix }}-

      - name: Build (Embedded)
        run: swift build -Xswiftc -enable-experimental-feature -Xswiftc Embedded

  windows-release:
    name: Windows (Swift ${{ inputs.swift-version }})
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ inputs.swift-version }}

      - name: Print Swift version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: windows-${{ inputs.cache-key-prefix }}-${{ hashFiles('Package.swift', 'Package@*.swift') }}
          restore-keys: windows-${{ inputs.cache-key-prefix }}-

      - name: Test
        run: swift test -c debug
