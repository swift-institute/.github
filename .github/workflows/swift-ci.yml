name: Swift CI (reusable)

# Reusable CI workflow for Swift Institute packages. Consume from a caller
# package's .github/workflows/ci.yml via:
#
#   jobs:
#     ci:
#       uses: swift-institute/.github/.github/workflows/swift-ci.yml@main
#       with:
#         cache-key-prefix: swift63-spm-v1
#       secrets: inherit
#
# Jobs provided:
#   - macos-release  (macOS 26 Xcode 26.4, debug, swift test + package dump + optional API-breakage check)
#   - linux-release  (swift:6.3 container, release)
#   - linux-nightly  (swiftlang/swift:nightly-main-jammy, release, continue-on-error: true)
#   - windows-release (SwiftyLab/setup-swift 6.3, debug)
#
# Toggle individual jobs via inputs (enable-nightly, enable-windows, enable-api-check).
# Provide PRIVATE_REPO_TOKEN via secrets inheritance if your package depends on
# private repos (enable-private-repos: true).

on:
  workflow_call:
    inputs:
      xcode-version:
        type: string
        default: "26.4"
      macos-runner:
        type: string
        default: "macos-26"
      swift-version:
        type: string
        default: "6.3"
      linux-image:
        type: string
        default: "swift:6.3"
      linux-nightly-image:
        type: string
        default: "swiftlang/swift:nightly-main-jammy"
      cache-key-prefix:
        type: string
        default: "swift63-spm-v1"
        description: "Cache-key prefix, typically '{swift-version tag}-spm-v{cache bump}'."
      enable-api-check:
        type: boolean
        default: true
      api-breakage-allowlist:
        type: string
        default: ".swift-api-breakage-allowlist"
      enable-nightly:
        type: boolean
        default: true
      enable-windows:
        type: boolean
        default: true
      enable-private-repos:
        type: boolean
        default: false
        description: "If true, configure git to use PRIVATE_REPO_TOKEN for github.com clones."
    secrets:
      PRIVATE_REPO_TOKEN:
        required: false

jobs:
  macos-release:
    name: macOS (Swift ${{ inputs.swift-version }}, debug)
    runs-on: ${{ inputs.macos-runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Select Xcode ${{ inputs.xcode-version }}
        run: sudo xcode-select -s /Applications/Xcode_${{ inputs.xcode-version }}.app

      - name: Print Swift version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: macos-${{ inputs.cache-key-prefix }}-${{ hashFiles('Package.swift', 'Package@*.swift') }}
          restore-keys: |
            macos-${{ inputs.cache-key-prefix }}-

      - name: Test
        run: swift test -c debug

      - name: Validate Package.swift
        run: swift package dump-package

      - if: inputs.enable-api-check
        name: Check for API breaking changes
        continue-on-error: true
        run: |
          echo "## API Breaking Changes Check" >> $GITHUB_STEP_SUMMARY
          if swift package diagnose-api-breaking-changes --breakage-allowlist-path ${{ inputs.api-breakage-allowlist }} 2>&1 | tee api-diff.txt; then
            echo "No API breaking changes detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "API breaking changes detected:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat api-diff.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::warning::API breaking changes detected. Review changes before release."
          fi

  linux-release:
    name: Ubuntu (Swift ${{ inputs.swift-version }}, release)
    runs-on: ubuntu-latest
    container: ${{ inputs.linux-image }}
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: linux-${{ inputs.cache-key-prefix }}-${{ hashFiles('Package.swift', 'Package@*.swift') }}
          restore-keys: linux-${{ inputs.cache-key-prefix }}-

      - name: Test (release)
        run: swift test -c release

  linux-nightly:
    if: inputs.enable-nightly
    name: Ubuntu (Swift 6.4-dev nightly, release)
    runs-on: ubuntu-latest
    container: ${{ inputs.linux-nightly-image }}
    continue-on-error: true
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Print Swift version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: linux-nightly-${{ inputs.cache-key-prefix }}-${{ hashFiles('Package.swift', 'Package@*.swift') }}
          restore-keys: linux-nightly-${{ inputs.cache-key-prefix }}-

      - name: Test (release)
        run: swift test -c release

  windows-release:
    if: inputs.enable-windows
    name: Windows (Swift ${{ inputs.swift-version }})
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ inputs.swift-version }}

      - name: Print Swift version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: windows-${{ inputs.cache-key-prefix }}-${{ hashFiles('Package.swift', 'Package@*.swift') }}
          restore-keys: windows-${{ inputs.cache-key-prefix }}-

      - name: Test
        run: swift test -c debug
