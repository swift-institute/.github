name: Swift CI (reusable)

# Reusable CI workflow for Swift Institute packages. Provides the universal
# test matrix that applies across all five layers: macOS 26 (Swift 6.3 debug)
# + Ubuntu (Swift 6.3 release) + Ubuntu (Swift 6.4-dev nightly,
# continue-on-error) + Windows (Swift 6.3).
#
# Consume from a caller package's .github/workflows/ci.yml via:
#
#   jobs:
#     ci:
#       uses: swift-institute/.github/.github/workflows/swift-ci.yml@main
#       with:
#         enable-private-repos: true   # only if package depends on private repos
#       secrets:
#         PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
#
# Inputs are deliberately minimal. Toolchain versions, runner images, and
# the matrix shape are hard-coded ecosystem-wide; if a package needs a
# different shape, fork the workflow rather than parameterizing this one.
#
# `enable-private-repos: true` rewrites github.com URLs to embed
# PRIVATE_REPO_TOKEN so `swift package resolve` can clone private deps.
# Omit when the package has no private dependencies.
#
# Caching policy: this workflow does NOT cache `.build/`. Every run does
# a fresh `swift package resolve` + clone + compile. This matches Apple's
# canonical `swiftlang/github-workflows/swift_package_test.yml` (995 lines,
# zero `actions/cache` uses) and is the right answer for our constraint
# set: `Package.resolved` is gitignored ecosystem-wide as a permanent
# library convention, so cache invalidation cannot key on resolved-graph
# state, and `restore-keys` partial-prefix matching silently serves stale
# branch-pinned dep checkouts. See
# `swift-institute/Research/ci-cache-strategy-branch-pinned-dependencies.md`.
#
# Layer-specific verification jobs (e.g. embedded-build verification for L1
# primitives) live in per-layer wrapper workflows under
# `<layer>/.github/.github/workflows/`, not here. swift-institute owns the
# universal floor; layers own their own invariants.

on:
  workflow_call:
    inputs:
      swift-version:
        type: string
        default: "6.3"
        description: "Swift version for the macOS, Ubuntu release, and Windows jobs. The nightly job is always 6.4-dev."
      enable-private-repos:
        type: boolean
        default: false
        description: "If true, configure git to use PRIVATE_REPO_TOKEN for github.com clones."
    secrets:
      PRIVATE_REPO_TOKEN:
        required: false

jobs:
  macos-release:
    name: macOS (Swift ${{ inputs.swift-version }}, debug)
    if: ${{ !github.event.repository.private }}
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Print Swift version
        run: swift --version

      - name: Test
        run: swift test -c debug

  linux-release:
    name: Ubuntu (Swift ${{ inputs.swift-version }}, release)
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    container: swift:6.3
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Test (release)
        run: swift test -c release

  linux-nightly:
    name: Ubuntu (Swift 6.4-dev nightly, release)
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-main-jammy
    continue-on-error: true
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Print Swift version
        run: swift --version

      - name: Test (release)
        run: swift test -c release

  windows-release:
    name: Windows (Swift ${{ inputs.swift-version }})
    if: ${{ !github.event.repository.private }}
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - if: inputs.enable-private-repos
        name: Configure git for private repos
        run: git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ inputs.swift-version }}

      - name: Print Swift version
        run: swift --version

      - name: Test
        run: swift test -c debug
