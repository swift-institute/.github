# validate-binary-install-checksum.yml — verify [CI-082] binary-install checksum verification.
#
# Pilot 18 of `/promote-rule` (2026-05-14). Migrated to thin caller of
# validate-base.yml in Phase B-2 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14
# (wrapper-host-multi-file mode per manifest).
#
# Rules checked: [CI-082]. See companion script for details.

name: validate-binary-install-checksum

# Self-firing push/pull_request triggers ACTIVATED 2026-05-14 after the
# [CI-082] baseline batch-fix landed (4 install steps across 4 files in
# `swift-institute/.github` — SwiftLint, lychee, gh CLI keyring ×2 — gained
# SHA-256 env vars + `sha256sum -c` verification before install). See
# `Audits/PROMOTE-CI-082-2026-05-14.md` Pending section, now closed.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**.yml'
      - '.github/scripts/validate-binary-install-checksum.py'
      - '.github/workflows/validate-binary-install-checksum.yml'
  pull_request:
    paths:
      - '.github/workflows/**.yml'
      - '.github/scripts/validate-binary-install-checksum.py'
      - '.github/workflows/validate-binary-install-checksum.yml'
  workflow_call:
    inputs:
      repo:
        description: 'Owner/name of the wrapper-host repo to validate (default: this repo).'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false
    outputs:
      total-violations:
        description: 'Total count of individual violations.'
        value: ${{ jobs.scan.outputs.total-violations }}

  workflow_dispatch:
    inputs:
      repo:
        description: 'Owner/name of the wrapper-host repo to validate (optional).'
        type: string
        required: false
      dry-run:
        description: 'Run checks but do not fail the job on findings.'
        type: boolean
        required: false
        default: false

jobs:
  scan:
    uses: ./.github/workflows/validate-base.yml
    with:
      validator-script: .github/scripts/validate-binary-install-checksum.py
      rule-id-regex: '^CI-082'
      discovery-mode: wrapper-host-multi-file
      target-repo: ${{ inputs.repo }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
