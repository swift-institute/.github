# ── inferred_min (computed from workflow `permission-*` flags) ────────────
# This block is the union of `permission-*` flags appearing across
# `swift-institute/.github/.github/workflows/*.yml` plus per-job
# `permissions:` declarations. Computed once per audit cycle; recompute
# when a workflow's `permission-*` set changes.
inferred_min:
  contents: write          # generate-metadata.yml, submit-dep-graph-weekly (POST snapshot)
  pull_requests: write     # generate-metadata.yml
  issues: write            # cron-audit-base report job, lint-readme-presence-weekly,
                           # link-check.yml, submit-dep-graph-weekly report,
                           # sync-metadata-nightly report
  administration: write    # sync-metadata.yml (`gh repo edit`)
  metadata: read           # universal: every gh api call requires it

# ── kept_over_inferred_min (deliberately-kept dev-ergonomics grants) ──────
# These 10 permissions are not exercised by any workflow in the corpus
# today but are deliberately retained on the App's installation across
# all 17 orgs for dev-ergonomics during alpha. Each grant is revisited
# under one of two triggers: (a) a future workflow exercises the grant
# (move into `inferred_min` and remove here), or (b) branch protection
# lands on swift-institute/.github (G1 / Cohort B Phase 2) at which
# point the alpha dev-ergonomics rationale weakens — defense-in-depth
# becomes the conservative default and per-grant trimming is reconsidered
# under the priority axis (correctness > security > speed; cost not an
# axis per `feedback_ci_priority_axes.md`).
kept_over_inferred_min:
  actions: write
  actions_variables: write
  custom_properties_for_organizations: write
  environments: write
  organization_administration: write
  organization_custom_properties: write
  organization_self_hosted_runners: write
  pages: write
  repository_custom_properties: write
  repository_hooks: write

# ── trimmed (removed 2026-05-06 via App-owner edit; do NOT re-add) ────────
# `secrets: write` and `members: write` were removed across all 17 orgs
# because (a) zero exercise across the workflow corpus and (b) catastrophic
# blast radius if the App credentials leak: `secrets: write` would let an
# attacker rotate org-level secrets ecosystem-wide; `members: write` would
# let an attacker manipulate org membership across the ecosystem. These
# two grants are flagged here so a future audit cycle does not silently
# re-add them via "uniform install" tooling.
trimmed:
  secrets: write       # removed 2026-05-06
  members: write       # removed 2026-05-06
