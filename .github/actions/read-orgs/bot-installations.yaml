# swift-institute-bot installation manifest.
#
# Per-org declared permissions of the swift-institute-bot GitHub App
# installation. Source authority: this file; principal-admin maintains
# manually. Audited via `gh api orgs/<org>/installations` (works with
# read:org scope; admin:org is NOT required for the read path despite
# brief's prior framing).
#
# Pairs with `orgs.yaml` (the canonical 17-org manifest); same row order.
# Updated quarterly per the [CI-080] / G10 audit-log review cadence
# (`swift-institute/Research/ci-cd-security-review.md` v1.1.0 § Phase 5).
#
# ── Ecosystem-uniform declared block ──────────────────────────────────────
# All 17 orgs share the same 15-permission declared set as of 2026-05-06.
# Per-row `notes:` is empty unless that org's declared set diverges from
# the uniform pattern (no current divergences). The uniform set is:
#
#     declared:
#       actions: write
#       actions_variables: write
#       administration: write
#       contents: write
#       custom_properties_for_organizations: write
#       environments: write
#       issues: write
#       metadata: read
#       organization_administration: write
#       organization_custom_properties: write
#       organization_self_hosted_runners: write
#       pages: write
#       pull_requests: write
#       repository_custom_properties: write
#       repository_hooks: write
#
# The keep-the-10 decision (principal-stated, ecosystem-wide):
#     declared = inferred_min ∪ {10 deliberately-kept over-permissions
#     per principal's dev-ergonomics decision during alpha}.
# `secrets: write` and `members: write` were trimmed 2026-05-06 by
# App-owner edit because (a) zero exercise across the workflow corpus
# and (b) catastrophic blast radius if the App credentials leak (org
# secret rotation + membership manipulation across all 17 orgs).
# The remaining 10 over-permissions (see `kept_over_inferred_min:`
# block at the bottom of this file) are revisited per-grant when
# either (a) a workflow needs the grant and the rule moves it into
# `inferred_min`, or (b) branch protection on swift-institute/.github
# lands as additional defense-in-depth (per `swift-institute/Research/
# ci-cd-security-review.md` v1.1.0 G1 / Cohort B Phase 2), at which
# point the alpha dev-ergonomics rationale weakens and trimming
# becomes the conservative default.
#
# Status legend:
#   ENUMERATED       — `gh api orgs/<org>/installations` returned the
#                      swift-institute-bot record; `permissions:` reflects
#                      the App's currently-granted installation permissions
#                      on that org.
#   NOT_INSTALLED    — installations list does not contain swift-institute-bot.
#                      App is NOT installed on this org. Action: install if
#                      this org is meant to host CI-running consumer repos
#                      per [CI-060].
#   PENDING_ENUMERATION
#                    — not yet enumerated; principal-admin to run
#                      `gh api orgs/<org>/installations --jq '.installations[]
#                      | select(.app_slug=="swift-institute-bot")'`
#                      and paste the returned `permissions:` block here.
#   SCOPE_BLOCKED    — gh API returned 403/404 in a way that suggests the
#                      caller's token scope is insufficient. Action:
#                      `gh auth refresh -h github.com -s read:org`.

