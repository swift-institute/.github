# validators-manifest.yaml — single source-of-truth for rule-ID ↔
# validator-script ↔ workflow-file binding.
#
# Phase B-1 of CI-REVIEW-PHASE-B-DESIGN-2026-05-14 §3. The binding
# validator (validate-manifest-binding.py) cross-checks this manifest
# for internal consistency. Phase B-1 scope = checks 2 + 4 only
# (internal consistency); checks 1 + 3 (Skills cross-references)
# DEFERRED to Phase B-2 per supervisor adjudication 2026-05-14:
# auth-surface design for Skills checkout / Skills-scoped App-token
# mint OR alternative (sync-skills.sh-style [VERIFICATION:]-index
# mirror) made deliberately in B-2 rather than conflated into the
# B-1 canary.
#
# Schema:
#   - rule-id            (string) — the rule this entry binds.
#   - validator-script   (string) — path under swift-institute/.github
#                                   to the validator .py; empty when
#                                   status=deprecated.
#   - workflow-file      (string) — path under swift-institute/.github
#                                   to the validator workflow .yml;
#                                   empty when status=deprecated or
#                                   when the validator runs only via
#                                   another workflow (e.g., embedded
#                                   in a cron orchestrator).
#   - status             (enum)   — active | deferred | deprecated.
#   - self-firing        (enum)   — active | deferred | deprecated.
#   - discovery-mode     (string) — single-target |
#                                   wrapper-host-multi-file |
#                                   per-package-org-sweep | (empty for
#                                   non-base-eligible).
#   - rule-id-regex      (string) — awk-compatible regex matching
#                                   column 2 of /tmp/findings.tsv.
#                                   Empty for deprecated entries.
#   - migrate-to-base    (string) — yes | no | <reason>. Annotated 'no
#                                   (chain-C; see CI-REVIEW-PHASE-B-DESIGN
#                                   §5)' for validate-thin-callers.yml
#                                   and validate-file-naming.yml per
#                                   the 4-level workflow_call limit.
#
# Writer / reader contract:
#   - Appended in the same Phase 7 transaction as a new validator
#     mechanization per [PROMOTE-006].
#   - Read by validate-manifest-binding.py weekly (Phase D's
#     lint-validators-weekly when authored) and on every
#     .github/scripts/validate-*.py edit (paths-trigger).
#
# Cross-references: CI-REVIEW-PHASE-B-DESIGN-2026-05-14.md §3 (schema)
#                  + supervisor adjudication 2026-05-14 (B-1 scope).

