name: Swift CI (reusable)

# CI-010 fail fixture: apple-simulator-build is present and advisory, but its
# matrix is collapsed to a single platform. Per [CI-091] uniform-platform-
# matrix doctrine the matrix MUST cover all four Apple simulator platforms
# (never collapsed; M4 REJECT 2026-05-06). Expect a CI-010 finding (missing
# tvOS / watchOS / visionOS).

on:
  workflow_call:

jobs:
  macos-release:
    name: macOS (Swift 6.3, debug)
    runs-on: macos-26
    steps:
      - run: echo "macos-release"

  linux-release:
    name: Ubuntu (Swift 6.3, release)
    runs-on: ubuntu-latest
    steps:
      - run: echo "linux-release"

  linux-nightly:
    name: Ubuntu (Swift main nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - run: echo "linux-nightly"

  windows-release:
    name: Windows (Swift 6.3)
    runs-on: windows-latest
    steps:
      - run: echo "windows-release"

  apple-simulator-build:
    name: ${{ matrix.platform }} Simulator
    runs-on: macos-26
    continue-on-error: true
    strategy:
      matrix:
        platform: [iOS]
    steps:
      - run: echo "apple-simulator-build ${{ matrix.platform }}"
