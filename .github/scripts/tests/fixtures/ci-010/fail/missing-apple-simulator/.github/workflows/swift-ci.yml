name: Swift CI (reusable)

# CI-010 fail fixture: the four core jobs are correct, but the advisory
# apple-simulator-build leg is absent — no leg exercises the resource-bundle
# CodeSign phase. Expect a CI-010 finding (apple-simulator-build missing).

on:
  workflow_call:

jobs:
  macos-release:
    name: macOS (Swift 6.3, debug)
    runs-on: macos-26
    steps:
      - run: echo "macos-release"

  linux-release:
    name: Ubuntu (Swift 6.3, release)
    runs-on: ubuntu-latest
    steps:
      - run: echo "linux-release"

  linux-nightly:
    name: Ubuntu (Swift main nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - run: echo "linux-nightly"

  windows-release:
    name: Windows (Swift 6.3)
    runs-on: windows-latest
    steps:
      - run: echo "windows-release"
