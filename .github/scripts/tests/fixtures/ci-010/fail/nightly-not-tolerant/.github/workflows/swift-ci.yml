name: Swift CI (reusable, nightly intolerant)

on:
  workflow_call:

jobs:
  macos-release:
    runs-on: macos-26
    steps:
      - run: echo "macos-release"

  linux-release:
    runs-on: ubuntu-latest
    steps:
      - run: echo "linux-release"

  linux-nightly:
    runs-on: ubuntu-latest
    # continue-on-error: true MISSING — [CI-010] violation
    steps:
      - run: echo "linux-nightly"

  windows-release:
    runs-on: windows-latest
    steps:
      - run: echo "windows-release"
