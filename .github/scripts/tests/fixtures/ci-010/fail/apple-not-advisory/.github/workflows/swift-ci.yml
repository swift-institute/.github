name: Swift CI (reusable)

# CI-010 fail fixture: apple-simulator-build is present with the full
# four-platform matrix, but lacks `continue-on-error: true`. During the soak
# window the leg MUST be advisory per [CI-021]/[CI-091]. Expect a CI-010
# finding (apple-simulator-build not advisory).

on:
  workflow_call:

jobs:
  macos-release:
    name: macOS (Swift 6.3, debug)
    runs-on: macos-26
    steps:
      - run: echo "macos-release"

  linux-release:
    name: Ubuntu (Swift 6.3, release)
    runs-on: ubuntu-latest
    steps:
      - run: echo "linux-release"

  linux-nightly:
    name: Ubuntu (Swift main nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - run: echo "linux-nightly"

  windows-release:
    name: Windows (Swift 6.3)
    runs-on: windows-latest
    steps:
      - run: echo "windows-release"

  apple-simulator-build:
    name: ${{ matrix.platform }} Simulator
    runs-on: macos-26
    strategy:
      matrix:
        platform: [iOS, tvOS, watchOS, visionOS]
    steps:
      - run: echo "apple-simulator-build ${{ matrix.platform }}"
