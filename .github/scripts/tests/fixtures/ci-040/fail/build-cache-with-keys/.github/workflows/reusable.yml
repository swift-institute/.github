name: Fail — actions/cache targeting .build with restore-keys

# Job caches .build/ AND has restore-keys partial-prefix fallback.
# Tagged as CI-040 violation; CI-042 (no restore-keys) composes in a
# separate pilot. Expected: 1 CI-040 finding.

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Cache Swift packages (with restore-keys — also violates CI-042)
        uses: actions/cache@v5
        with:
          path: .build
          key: ubuntu-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ubuntu-spm-
      - run: swift test
