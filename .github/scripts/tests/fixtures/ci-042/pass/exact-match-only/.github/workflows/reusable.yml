name: Pass — cache with exact-match-only key (no restore-keys)

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Cache SwiftLint binary
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/swiftlint
          key: ubuntu-swiftlint-0.63.2
      - run: swiftlint lint
