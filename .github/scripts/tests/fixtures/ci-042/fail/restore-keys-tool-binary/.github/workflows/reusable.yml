name: Fail — tool-binary cache with restore-keys (CI-042 only)

# Path is a tool binary so [CI-040] doesn't fire, but [CI-042]'s
# no-restore-keys-anywhere rule does. Expected: 1 CI-042 finding.

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Cache SwiftLint binary (forbidden restore-keys)
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/swiftlint
          key: ubuntu-swiftlint-0.63.2
          restore-keys: |
            ubuntu-swiftlint-
      - run: swiftlint lint
