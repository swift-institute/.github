name: Cron (standalone)

# PASS: standalone with `permissions: {}` floor + per-job grants. Canonical
# least-permissions pattern per [CI-097].

on:
  schedule:
    - cron: '0 6 * * 1'

permissions: {}

jobs:
  sweep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: echo "sweep"
