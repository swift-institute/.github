name: Reusable with non-empty top-perms

# Edge: reusable with top-level permissions that is NOT the empty-dict
# `{}`. This is a [CI-090] violation (top-perms on reusable in general)
# but NOT specifically a [CI-097] violation (which targets the deny-all
# case). The validator fires CI-090, not CI-097, for diagnostic clarity.

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - run: echo "ci"
