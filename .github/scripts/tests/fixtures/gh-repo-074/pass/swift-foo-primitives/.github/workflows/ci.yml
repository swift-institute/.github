name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: swift-primitives/.github/.github/workflows/swift-ci.yml@main
    secrets: inherit

  docs:
    uses: swift-institute/.github/.github/workflows/swift-docs.yml@main
    secrets: inherit
