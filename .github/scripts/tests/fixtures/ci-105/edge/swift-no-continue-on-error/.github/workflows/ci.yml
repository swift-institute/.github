name: CI

# Edge: canonical thin caller with no continue-on-error anywhere. Trivially
# permitted under [CI-105]. Confirms the validator silences on the most
# common ecosystem shape.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    uses: swift-primitives/.github/.github/workflows/swift-ci.yml@main
    secrets: inherit
  docs:
    uses: swift-institute/.github/.github/workflows/swift-docs.yml@main
    secrets: inherit
